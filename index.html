<style>
*{margin:0;box-sizing:border-box}
html,body{min-height:100%;background:#000;color:#fff;font:400 14px/1.4 system-ui,sans-serif}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:clamp(16px,4vw,48px)}
.box{position:relative;width:100%;max-width:960px;aspect-ratio:16/9;background:#111;border-radius:12px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.6)}
mux-player{width:100%;height:100%;--media-object-fit:contain}
.qr{position:absolute;bottom:clamp(12px,2vw,20px);right:clamp(12px,2vw,20px);width:clamp(80px,12%,128px);aspect-ratio:1;background:#fff;padding:6px;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.5);opacity:0;transition:opacity .6s ease-in;pointer-events:none;z-index:10}
.qr.show{opacity:1}
.qr img{width:100%;height:100%;display:block}

      env-key="r4akq1jdi1t2bucl95gt0e4fq"
      stream-type="live"
      autoplay="muted"
      muted
      playsinline></mux-player>
    <div class="qr" id="qr"><img src="qr.png" alt=""></div>
  </div>
</div>
<script>
(function(){
  var player = document.getElementById('player');
  var qr = document.getElementById('qr');
  var started = false;
  player.addEventListener('playing', function(){
    if (started) return;
    started = true;
    setTimeout(function(){ qr.classList.add('show'); }, 60000);
  });
})();
</script>
