<!-- Video.js — latest stable major (v8). User asked for v10 but that
     major doesn't exist on npm yet; v9 was skipped. Pinning to @8 so a
     future v9/v10 release doesn't silently break the player. -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/video.js@8/dist/video-js.min.css">
<script src="https://cdn.jsdelivr.net/npm/video.js@8/dist/video.min.js"></script>

<style>
*{margin:0;box-sizing:border-box}
html,body{
  height:100%;width:100%;
  background:#000;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;
}

/* Letterbox the 12:5 cinema asset within whatever viewport we land in. */
.stage{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
}

.video-js{
  background:#000;
  font-family:inherit;
  aspect-ratio:12 / 5;
  width:100%;
  max-width:100vw;
  max-height:100vh;
}

/* Branded big-play button — centered, slightly fancier than the default. */
.video-js .vjs-big-play-button{
  width:96px;height:96px;line-height:96px;
  border-radius:50%;border:2px solid rgba(255,255,255,.85);
  background:rgba(0,0,0,.4);
  font-size:42px;
  top:50%;left:50%;margin:-48px 0 0 -48px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:transform .15s ease,background .2s ease;
}
.video-js:hover .vjs-big-play-button,
.video-js .vjs-big-play-button:focus{
  background:rgba(0,0,0,.75);transform:scale(1.05);
}

/* Watermark — bottom-right, sits above the player chrome. */
.logo{position:fixed;bottom:clamp(20px,4vh,40px);right:clamp(20px,4vw,48px);z-index:5;pointer-events:none}
.logo svg{
  width:min(22vw,140px);height:auto;
  opacity:0;animation:f 1.4s ease-in forwards .3s;
  filter:drop-shadow(0 0 16px rgba(255,255,255,.3));
}
@keyframes f{to{opacity:.7}}
</style>
</head>
<body>

<!--
  VOD playback from Mux. Architecture:
    Mux Asset ──HLS──▶ Mux Global CDN (Fastly + edgemv) ──▶ this player

  `?rendition_order=desc` reorders the master manifest so the highest
  rendition (1920×800, the 1080p tier of this 12:5 asset) is listed
  first. video.js's bundled HLS engine starts at the first entry, so
  playback opens at 1080p and ABR only steps down if bandwidth forces
  it. For a future 4K asset, append `&max_resolution_tier=2160p` and
  re-encode to that tier in Mux.

  To swap to another asset, change the playback ID in the <source> URL.
-->
<div class="stage">
  <video-js
    id="player"
    class="video-js vjs-default-skin vjs-big-play-centered"
    controls
    preload="metadata"
    playsinline
    crossorigin="anonymous">
    <source
      src="https://stream.mux.com/Apdb9mHDmGuMt00AVKNNVx6VZEXw7602eYCcTPJIFtpVE.m3u8?rendition_order=desc"
      type="application/x-mpegURL">
  </video-js>
</div>
