<!-- ── Video.js v10 (beta) ──────────────────────────────────────────
     v10 is a full rewrite published under a new package, @videojs/html,
     organized as web components. The main bundle registers the
     <video-player> state store (used even without a UI, so the skin can
     be slotted back in trivially). The mux-video media element is a
     separate module — it wraps Mux's delivery stack so playback-id /
     stream-type / rendition-order / max-resolution become native
     attributes.

     Pinned to an exact beta because the API is still evolving; bump
     deliberately when you want to track upstream.
-->
<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html@10.0.0-beta.23/cdn/video.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html@10.0.0-beta.23/cdn/media/mux-video.js"></script>

<style>
/* ── Eurostile Next Pro ──────────────────────────────────────────────
   Embedded TTF (Adobe-licensed, user-supplied via the project's
   approved font collection). Two weights for body + one wide-bold
   cut for the masthead. Browsers handle TTF natively for @font-face;
   sacrificing ~30% over woff2 for build-step simplicity. */
@font-face{
  font-family:"Eurostile";
  src:url("fonts/EurostileNextPro-Regular.ttf") format("truetype");
  font-weight:400;font-style:normal;font-display:swap;
}
@font-face{
  font-family:"Eurostile";
  src:url("fonts/EurostileNextPro-Bold.ttf") format("truetype");
  font-weight:700;font-style:normal;font-display:swap;
}
@font-face{
  font-family:"Eurostile Wide";
  src:url("fonts/EurostileNextPro-WideBold.ttf") format("truetype");
  font-weight:700;font-style:normal;font-display:swap;
}

*{margin:0;box-sizing:border-box}
html,body{
  height:100%;width:100%;
  background:#000;color:#fff;
  font-family:"Eurostile",-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;
}

/* Chrome-less full-bleed playback. <media-container> is the v10
   interaction surface — it provides the mediaContext that <mux-video>
   needs to actually render. We give it no UI children (no controls,
   no poster, no buffering indicator), so all that draws is the video
   itself. 12:5 asset letterboxes via object-fit:contain on any aspect. */
media-container{
  display:block;
  position:fixed;inset:0;
  width:100vw;height:100vh;
  height:100dvh; /* dvh tracks the live visible viewport — when
                    iOS Safari/Chrome retracts its URL bar, the
                    media surface grows to fill the new area
                    without us needing a Fullscreen API call. */
  background:#000;
}
mux-video{
  display:block;
  width:100%;height:100%;
  object-fit:contain;
  background:#000;
}

/* ── Intro overlay ────────────────────────────────────────────────
   Pre-click: a paused <video> showing its poster (black), with the
   red+white play button as the click target overlaid on top. The
   whole overlay is clickable.

   Click → JS adds .activated, which (a) snaps the play button out
   in 90ms, (b) starts the intro video (intro.webm — pre-rendered
   bubble-up animation that's smoother than any CSS keyframe set
   could be), and (c) fires the gesture-required steps (fullscreen,
   unmute the movie, set its volume, start movie playback hidden
   behind the overlay). When the intro video fires `ended`, .done
   is added and the overlay fades over 600ms to reveal the movie. */
.intro{
  position:fixed;inset:0;z-index:20;
  height:100vh;
  height:100dvh;
  background:#000;
  display:grid;place-items:center;
  cursor:pointer;user-select:none;-webkit-user-select:none;
  transition:opacity .6s ease;
  overflow:hidden;
}
.intro.done{opacity:0;pointer-events:none}

/* Pre-rendered intro animation. Fills the overlay behind the play
   button; object-fit:contain so the 16:9 source letterboxes
   gracefully on any aspect ratio. pointer-events:none so clicks on
   the overlay reach the .intro element. */
.intro-video{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:contain;
  background:#000;
  pointer-events:none;
}

/* Play button: the only thing visible before the click. SVG element
   so it scales crisply; viewBox padded -12 so breathe scales don't
   clip. drop-shadow gives the red disc a soft glow on black. */
.play-button{
  position:relative;z-index:2;
  width:min(38vw,200px);height:auto;display:block;
  filter:drop-shadow(0 0 32px rgba(255,0,0,.35));
  animation:breathe 2.2s ease-in-out infinite;
}
@media (max-width:480px) and (orientation:portrait){
  .play-button{width:min(48vw,180px)}
}
@media (hover:hover){
  .intro:hover .play-button{animation:breathe-fast 1.4s ease-in-out infinite}
}
@keyframes breathe{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.06)}
}
@keyframes breathe-fast{
  0%,100%{transform:scale(1.04)}
  50%{transform:scale(1.10)}
}

/* On click: snap the play button out fast (90ms) so it isn't
   lingering over the intro video's first frames. */
.intro.activated .play-button{
  animation:play-button-out 90ms ease forwards;
  pointer-events:none;
}
@keyframes play-button-out{
  0%{opacity:1;transform:scale(1)}
  100%{opacity:0;transform:scale(.85)}
}

@media (prefers-reduced-motion:reduce){
  .play-button{animation:none}
  .intro.activated .play-button{animation:none;opacity:0}
}

/* Watermark — bottom-right. max() against safe-area-inset so it
   doesn't slide under the iPhone home indicator or notch. */
.logo{
  position:fixed;
  bottom:max(env(safe-area-inset-bottom,0px), clamp(12px,3vh,32px));
  right:max(env(safe-area-inset-right,0px), clamp(12px,3vw,40px));
  z-index:5;pointer-events:none;
}
.logo svg{
  width:min(20vw,120px);height:auto;
  opacity:0;animation:f 1.4s ease-in forwards .3s;
  filter:drop-shadow(0 0 16px rgba(255,255,255,.3));
}
@keyframes f{to{opacity:.7}}

/* Portrait phones — shrink the mark and pad it away from the iPhone
   Chrome / Safari bottom toolbar (which is shown when scroll is at top
   on iPhone Chrome and overlaps fixed-position elements). */
@media (max-width:480px) and (orientation:portrait){
  .logo{
    bottom:max(env(safe-area-inset-bottom,0px), 16px);
    right:max(env(safe-area-inset-right,0px), 14px);
  }
  .logo svg{width:min(26vw,72px)}
}

/* Landscape phones — wide-but-short. Keep the logo tight to the
   corner; horizontal real estate is precious. */
@media (max-height:480px) and (orientation:landscape){
  .logo{
    bottom:max(env(safe-area-inset-bottom,0px), 10px);
    right:max(env(safe-area-inset-right,0px), 12px);
  }
  .logo svg{width:min(14vh,64px)}
}

/* ─────────────────────────────────────────────────────────────────────
   ── LINEAR CHANNEL UX ────────────────────────────────────────────────
   ─────────────────────────────────────────────────────────────────────
   The site is a deterministic linear channel: every 15 minutes a new
   slot starts (00 / 15 / 30 / 45 past the hour) between 11:00–23:00
   local time. Each slot = 12:14 of Tears of Steel + 2:46 of static.
   Every viewer worldwide computes the same in-slot position from
   their wall clock, so the channel is "live" without a server.

   Three full-bleed states sit on top of the mux-video and toggle via
   JS visibility:
     1. movie       (default — the mux-video shows through)
     2. #static     (the 2:46 "no signal" interlude between slots)
     3. #offair     (outside channel hours, 23:00–11:00)

   A fourth overlay, #guide, slides in when the user hits the GUIDE
   button bottom-left. None of these affect playback timing — the
   mux-video keeps playing whether or not it's visible. */

/* ── "NO SIGNAL" static screen ────────────────────────────────────
   Canvas-driven analog snow: a 240×135 buffer of Math.random()
   pixels, upscaled to fill the viewport with image-rendering:
   pixelated for the crispy block look. CSS scan lines + a vignette
   on top complete the analog feel. */
#static{
  position:fixed;inset:0;z-index:15;
  background:#000;
  display:none;
  align-items:center;justify-content:center;
}
#static.on{display:flex}
#static canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  image-rendering:pixelated;
  opacity:.55;
}
/* Scan lines on top of the noise for the CRT feel. */
#static::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0) 0,
    rgba(0,0,0,0) 2px,
    rgba(0,0,0,.35) 3px,
    rgba(0,0,0,.35) 4px
  );
  mix-blend-mode:multiply;
}
#static .static-label{
  position:relative;z-index:2;
  text-align:center;color:#fff;
  font-family:"Eurostile Wide","Eurostile",sans-serif;
  font-weight:700;letter-spacing:.4em;
  font-size:clamp(28px,5vw,64px);
  text-shadow:0 0 24px rgba(0,0,0,.8);
  user-select:none;-webkit-user-select:none;
}
#static .static-sub{
  font-family:"Eurostile",sans-serif;
  font-weight:400;letter-spacing:.25em;
  font-size:clamp(11px,1.4vw,14px);
  text-transform:uppercase;
  margin-top:14px;opacity:.7;
}

/* ── "OFF AIR" screen (outside 11:00–23:00 local) ────────────────── */
#offair{
  position:fixed;inset:0;z-index:14;
  background:#000;
  display:none;
  flex-direction:column;
  align-items:center;justify-content:center;
  gap:18px;
}
#offair.on{display:flex}
#offair .offair-title{
  font-family:"Eurostile Wide","Eurostile",sans-serif;
  font-weight:700;letter-spacing:.4em;
  font-size:clamp(28px,5vw,56px);
}
#offair .offair-sub{
  font-family:"Eurostile",sans-serif;
  font-weight:400;letter-spacing:.25em;
  font-size:clamp(11px,1.4vw,13px);
  text-transform:uppercase;opacity:.6;
}

/* ── GUIDE button (toggle pill, bottom-left) ─────────────────────── */
#guide-button{
  position:fixed;
  bottom:max(env(safe-area-inset-bottom,0px), clamp(14px,3vh,28px));
  left:max(env(safe-area-inset-left,0px),  clamp(14px,3vw,28px));
  z-index:6;
  appearance:none;border:1px solid rgba(255,255,255,.35);
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:#fff;cursor:pointer;
  font:700 12px/1 "Eurostile",sans-serif;
  letter-spacing:.32em;text-transform:uppercase;
  padding:11px 18px 10px;border-radius:999px;
  opacity:0;transform:translateY(8px);
  transition:opacity .4s ease, transform .4s ease, background .15s ease, border-color .15s ease;
}
#guide-button.show{opacity:1;transform:translateY(0)}
#guide-button:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.8)}

/* ── FULLSCREEN button (bottom-right, auto-hide after 5s idle) ──────
   Identical pill chrome to GUIDE for visual consistency. Sits above
   the IV watermark so they stack vertically without overlap. JS shows
   it on any mousemove / touch / keydown and arms a 5-second hide
   timer; the timer resets on every activity. Icon swaps between
   "enter fullscreen" (corners outward) and "exit fullscreen"
   (corners inward) based on document.fullscreenElement. */
#fs-button{
  position:fixed;
  right:max(env(safe-area-inset-right,0px), clamp(14px,3vw,28px));
  bottom:max(env(safe-area-inset-bottom,0px), clamp(96px,15vh,128px));
  z-index:6;
  appearance:none;border:1px solid rgba(255,255,255,.35);
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:#fff;cursor:pointer;
  width:44px;height:44px;border-radius:50%;
  display:grid;place-items:center;
  opacity:0;transform:translateY(8px);pointer-events:none;
  transition:opacity .35s ease, transform .35s ease, background .15s ease, border-color .15s ease;
}
#fs-button.show{opacity:1;transform:translateY(0);pointer-events:auto}
#fs-button:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.8)}
#fs-button svg{width:18px;height:18px;display:block}
/* Default state shows "enter" icon; in-fullscreen state flips to "exit". */
#fs-button .fs-icon-exit{display:none}
#fs-button.in-fs .fs-icon-enter{display:none}
#fs-button.in-fs .fs-icon-exit{display:block}

/* ── TV GUIDE overlay ─────────────────────────────────────────────
   White gridlines on near-black, retro cable-EPG layout. Masthead +
   live clock at top; 7-day × 5-slot grid; description strip at
   bottom. Slides in via opacity + tiny translate. */
#guide{
  position:fixed;inset:0;z-index:25;
  background:radial-gradient(ellipse at top, #0a1830 0%, #000 70%);
  display:none;
  flex-direction:column;
  padding:clamp(16px,3.5vh,32px) clamp(16px,3vw,40px);
  opacity:0;transform:translateY(8px);
  transition:opacity .35s ease, transform .35s ease;
  overflow:hidden;
  font-family:"Eurostile",sans-serif;
}
#guide.on{display:flex;opacity:1;transform:translateY(0)}

.guide-mast{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding-bottom:clamp(12px,2vh,20px);
  /* Right padding clears the absolute-positioned close button so
     the day/date/time cluster never slides under the × hit area.
     Generous min (72px) so the clearance survives small viewports
     where the close-button position clamp hits its 14px floor and
     leaves only ~50px between the X's left edge and the screen
     edge. */
  padding-right:clamp(72px,8vw,108px);
  border-bottom:1px solid rgba(255,255,255,.5);
  gap:24px;flex-wrap:wrap;
}
.guide-logo{
  font-family:"Eurostile Wide","Eurostile",sans-serif;
  font-weight:700;
  font-size:clamp(36px,6.5vw,84px);
  letter-spacing:.04em;line-height:.95;
  text-transform:uppercase;
  background:linear-gradient(180deg,#fff 0%,#cfd6e0 100%);
  -webkit-background-clip:text;background-clip:text;
  color:transparent;
  text-shadow:0 0 28px rgba(180,200,255,.15);
}
.guide-clock{
  text-align:right;
  font-family:"Eurostile",sans-serif;
}
.guide-clock .day{
  font-weight:700;
  font-size:clamp(13px,1.6vw,18px);
  letter-spacing:.32em;text-transform:uppercase;
  opacity:.95;
}
.guide-clock .date{
  font-weight:400;
  font-size:clamp(11px,1.2vw,13px);
  letter-spacing:.22em;text-transform:uppercase;
  opacity:.6;margin-top:4px;
}
.guide-clock .time{
  font-weight:700;
  font-size:clamp(22px,3vw,32px);
  letter-spacing:.1em;
  margin-top:6px;
  color:#fff;
}

/* Grid: rows = days, cols = ALL 48 time slots of the channel day
   (11:00–22:45). Horizontally scrollable inside .guide-grid-wrap.
   Day-label column is sticky-left so it stays visible while
   scrolling through the schedule; time-header row is sticky-top
   for the same reason on vertical scroll. */
.guide-grid-wrap{
  flex:1;
  display:flex;flex-direction:column;
  margin-top:clamp(10px,2vh,18px);
  overflow:auto;
  border:1px solid rgba(255,255,255,.5);
  border-radius:2px;
  /* Pre-paint a dark fill behind sticky cells so content underneath
     doesn't bleed through the semi-transparent header/label bg. */
  background:#000;
}
.guide-grid{
  display:grid;
  grid-template-columns:clamp(68px,8vw,108px) repeat(48,130px);
}
.guide-header,
.guide-cell{
  border-right:1px solid rgba(255,255,255,.4);
  border-bottom:1px solid rgba(255,255,255,.4);
  padding:clamp(8px,1.4vh,14px) clamp(8px,1.2vw,16px);
  font-size:clamp(11px,1.2vw,13px);
  display:flex;flex-direction:column;justify-content:center;
  min-height:46px;
}
.guide-header{
  background:#0a1830;
  text-transform:uppercase;letter-spacing:.18em;
  font-weight:700;font-size:clamp(10px,1.1vw,12px);
  opacity:.95;
  position:sticky;top:0;z-index:2;
}
.guide-row-label{
  font-weight:700;letter-spacing:.22em;text-transform:uppercase;
  background:#000;
  position:sticky;left:0;z-index:1;
}
/* Top-left corner: needs to win both stickys. */
.guide-header.corner{
  left:0;z-index:3;background:#0a1830;
}
.guide-row-label.today{
  background:#1a0000;
  color:#ff5a5a;
}
.guide-cell{
  cursor:default;
  position:relative;
}
.guide-cell .title{
  font-weight:700;font-size:clamp(11px,1.2vw,13px);
  letter-spacing:.04em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.guide-cell .meta{
  font-size:clamp(9px,1vw,11px);
  opacity:.55;margin-top:2px;letter-spacing:.06em;
  text-transform:uppercase;
}
.guide-cell.now{
  background:linear-gradient(90deg, rgba(255,0,0,.35), rgba(255,0,0,.15));
  color:#fff;
  box-shadow:inset 0 0 0 2px #ff0000;
}
.guide-cell.now .title{color:#fff}
.guide-cell.static-slot{
  background:rgba(255,255,255,.02);
  opacity:.4;
}
.guide-cell.static-slot .title{font-weight:400}

/* Show description strip */
.guide-desc{
  margin-top:clamp(10px,2vh,18px);
  border:1px solid rgba(255,255,255,.5);
  padding:clamp(10px,1.6vh,16px) clamp(12px,1.4vw,20px);
  display:grid;
  grid-template-columns:1fr auto;
  gap:18px;align-items:center;
}
.guide-desc .desc-title{
  font-family:"Eurostile Wide","Eurostile",sans-serif;
  font-weight:700;letter-spacing:.04em;
  font-size:clamp(16px,2vw,22px);
  text-transform:uppercase;
}
.guide-desc .desc-body{
  font-size:clamp(11px,1.2vw,14px);
  opacity:.75;margin-top:4px;line-height:1.45;
}
.guide-desc .desc-tag{
  font-size:clamp(9px,1vw,11px);
  letter-spacing:.32em;text-transform:uppercase;
  border:1px solid rgba(255,255,255,.5);
  padding:8px 12px 6px;
  opacity:.8;
}

/* Close button */
.guide-close{
  position:absolute;top:clamp(14px,2.4vh,24px);right:clamp(14px,2vw,24px);
  appearance:none;background:transparent;border:1px solid rgba(255,255,255,.4);
  color:#fff;cursor:pointer;
  width:36px;height:36px;border-radius:50%;
  display:grid;place-items:center;
  font:700 16px/1 "Eurostile",sans-serif;
  transition:background .15s ease, border-color .15s ease;
}
.guide-close:hover{background:rgba(255,255,255,.12);border-color:#fff}

/* Mobile: tighter padding, smaller font scales. Columns stay 48
   wide (full schedule) but each column is narrower so swiping
   feels brisk. The sticky day-label column shrinks too. */
@media (max-width:640px){
  #guide{padding:18px 16px}
  .guide-grid{grid-template-columns:54px repeat(48,108px)}
  .guide-mast{gap:12px;padding-right:48px}
  .guide-logo{font-size:30px;letter-spacing:.06em}
  .guide-desc{grid-template-columns:1fr;gap:8px}
}
</style>
</head>
<body>

<!--
  VOD playback from Mux via Video.js v10. The video preloads
  silently while the intro overlay is up; on the first user gesture
  it unmutes, sets volume to 50%, and starts playback with sound.

  Note: v10's <mux-video> does NOT observe `playback-id` (unlike
  standalone @mux/mux-video). Its observedAttributes are plain
  HTMLVideoElement attrs + a few Cast-specific ones. So we pass the
  full Mux HLS URL via `src` and push playback-ladder hints into
  Mux's manifest query params:

    rendition_order=desc        — order the master manifest top-down so
                                  hls.js opens at 1080p; ABR steps down
                                  only if bandwidth forces it
    max_resolution_tier=1080p   — caps the ladder; documents intent for
                                  the 4K-tier swap (change to 2160p)

  Why no `autoplay`: we want playback to begin on the user's tap so
  they don't miss the opening of the movie (the v8 autoplay-muted
  flow had the video already 5–10s in by the time anyone clicked).
  metadata-video-title is kept for forward-compat with Mux Data once
  an env-key is wired. Swap asset: change the playback ID in the URL.
-->
<video-player>

<script>
// ─────────────────────────────────────────────────────────────────────
// INTERDEPENDENT TV — linear channel runtime
// ─────────────────────────────────────────────────────────────────────
//
// Schedule semantics
//   - Channel operates 11:00–23:00 local time.
//   - Slot length: 15 min (900s). Movie: 12:14 (734s). Static gap: 2:46.
//   - Slot starts on every quarter-hour boundary: :00, :15, :30, :45.
//   - The "live position" inside a slot is t = (now - slotStart)/1000.
//     If t < SHOW_SECS, the mux-video is playing at currentTime = t.
//     If t ≥ SHOW_SECS, the #static overlay is up until the next slot.
//
// Sync model
//   Pure client-side, deterministic. Every browser computes the same
//   in-slot offset from its own wall-clock, so all viewers worldwide
//   land on the same frame at the same minute without any server.
//   No Mux Live, no ffmpeg loop, no scheduling service.
//
// Lifecycle
//   load → intro overlay visible, mux-video preloads silently.
//   click → unmute prep (muted=false, volume=0), play movie at
//           the live offset, play intro.webm (now with audio).
//   intro.ended → ramp volume to 0.5, fade intro overlay.
//   after fade → handleState() takes over: ensures the movie is
//           seeked to the live position, then schedules the next
//           transition (show→static or static→show) precisely at
//           its quarter-hour boundary.
//
// ─────────────────────────────────────────────────────────────────────

const CHANNEL = {
  startHour: 11,   // 11:00 — first slot of the day starts at 11:00
  endHour:   23,   // 23:00 — last slot starts at 22:45, ends at 23:00
  slotSec:   900,  // 15 min per slot
  showSec:   734,  // Tears of Steel: 12:14 = 734s
};
CHANNEL.staticSec = CHANNEL.slotSec - CHANNEL.showSec;

const SHOW = {
  title: 'TEARS OF STEEL',
  duration: '12:14',
  description:
    'Open-source 4K sci-fi short — a fractured science team races ' +
    'to undo a future that was never theirs to write. Directed by ' +
    'Ian Hubert · Blender Foundation, 2012.',
};

// ── Wall-clock slot math ────────────────────────────────────────────
// Returns the current slot state for a given (or now) timestamp.
function getSlotInfo(now) {
  now = now || Date.now();
  const d = new Date(now);
  const hour = d.getHours();

  // Off-air outside CHANNEL.startHour ≤ hour < CHANNEL.endHour
  if (hour < CHANNEL.startHour || hour >= CHANNEL.endHour) {
    const next = new Date(d);
    next.setHours(CHANNEL.startHour, 0, 0, 0);
    if (next.getTime() <= now) next.setDate(next.getDate() + 1);
    return { offAir: true, nextOnAir: next.getTime() };
  }

  // Round down to the quarter hour
  const slotMin = Math.floor(d.getMinutes() / 15) * 15;
  const slotStart = new Date(
    d.getFullYear(), d.getMonth(), d.getDate(), hour, slotMin, 0, 0
  ).getTime();
  const tInSlot = (now - slotStart) / 1000;
  const inShow = tInSlot < CHANNEL.showSec;

  return {
    offAir: false,
    inShow,
    slotStart,
    nextSlotStart: slotStart + CHANNEL.slotSec * 1000,
    showEnd:       slotStart + CHANNEL.showSec * 1000,
    tInSlot,
    tInShow:    inShow ? tInSlot : CHANNEL.showSec,
    tInStatic:  inShow ? 0       : tInSlot - CHANNEL.showSec,
  };
}

function fmtClock(d){
  let h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;
}
function fmtSlot(d){
  let h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? 'p' : 'a';
  h = h % 12 || 12;
  return h + ':' + (m < 10 ? '0' + m : m) + ampm;
}
const DAYS_SHORT = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const DAYS_LONG  = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];

// ── Defer everything until mux-video is upgraded ────────────────────
customElements.whenDefined('mux-video').then(function(){
  const mv         = document.querySelector('mux-video');
  const intro      = document.getElementById('intro');
  const introVideo = document.getElementById('introVideo');
  const staticEl   = document.getElementById('static');
  const offairEl   = document.getElementById('offair');
  const offairNext = document.getElementById('offairNext');
  const staticCountdown = document.getElementById('staticCountdown');
  const guideBtn   = document.getElementById('guide-button');
  const fsBtn      = document.getElementById('fs-button');
  const guideEl    = document.getElementById('guide');
  const guideClose = document.getElementById('guideClose');
  const guideGrid  = document.getElementById('guideGrid');
  const guideDay   = document.getElementById('guideDay');
  const guideDate  = document.getElementById('guideDate');
  const guideTime  = document.getElementById('guideTime');
  const guideDescTag = document.getElementById('guideDescTag');
  const canvas     = staticEl.querySelector('canvas');
  if (!mv) return;

  // ── Fullscreen helpers ────────────────────────────────────────────
  function isFullscreen(){
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }
  function enterFullscreen(){
    const candidates = [document.documentElement, document.body];
    for (let i = 0; i < candidates.length; i++) {
      const el = candidates[i];
      if (!el) continue;
      const fn = el.requestFullscreen || el.webkitRequestFullscreen;
      if (typeof fn !== 'function') continue;
      try {
        const p = fn.call(el, { navigationUI: 'hide' });
        if (p && p.catch) p.catch(function(){});
        return;
      } catch (_) {
        try {
          const p2 = fn.call(el);
          if (p2 && p2.catch) p2.catch(function(){});
          return;
        } catch (__) {}
      }
    }
  }
  function exitFullscreen(){
    const fn = document.exitFullscreen || document.webkitExitFullscreen;
    if (typeof fn === 'function') {
      try {
        const p = fn.call(document);
        if (p && p.catch) p.catch(function(){});
      } catch (_) {}
    }
  }
  function toggleFullscreen(){
    isFullscreen() ? exitFullscreen() : enterFullscreen();
  }
  function syncFsIcon(){
    fsBtn.classList.toggle('in-fs', isFullscreen());
  }
  document.addEventListener('fullscreenchange', syncFsIcon);
  document.addEventListener('webkitfullscreenchange', syncFsIcon);

  // ── Auto-hide controls (FS button) ────────────────────────────────
  // Show on any mousemove / touch / keydown, hide after 5s of idle.
  // Only active after the intro finishes (channelLive flips true)
  // so the button doesn't pop up during the intro sequence.
  let channelLive = false;
  let fsHideTimer = 0;
  function pingControls(){
    if (!channelLive) return;
    fsBtn.classList.add('show');
    clearTimeout(fsHideTimer);
    fsHideTimer = setTimeout(function(){
      fsBtn.classList.remove('show');
    }, 5000);
  }
  document.addEventListener('mousemove',  pingControls);
  document.addEventListener('touchstart', pingControls, { passive: true });
  document.addEventListener('keydown',    pingControls);
  fsBtn.addEventListener('click', function(e){
    e.stopPropagation();
    toggleFullscreen();
    pingControls(); // reset the idle timer
  });

  // ── TV static canvas ──────────────────────────────────────────────
  // 240×135 ImageData of Math.random() noise, redrawn each rAF.
  // The canvas element is upscaled to viewport via CSS with
  // image-rendering: pixelated, so this stays cheap (~32 KB per frame
  // of work). Only ticks while the static overlay is visible.
  const NOISE_W = 240, NOISE_H = 135;
  canvas.width = NOISE_W; canvas.height = NOISE_H;
  const noiseCtx = canvas.getContext('2d');
  const noiseImg = noiseCtx.createImageData(NOISE_W, NOISE_H);
  let noiseRaf = 0;
  function drawNoise(){
    const data = noiseImg.data;
    for (let i = 0; i < data.length; i += 4) {
      const v = (Math.random() * 255) | 0;
      data[i] = v; data[i+1] = v; data[i+2] = v; data[i+3] = 255;
    }
    noiseCtx.putImageData(noiseImg, 0, 0);
    noiseRaf = requestAnimationFrame(drawNoise);
  }
  function startNoise(){ if (!noiseRaf) drawNoise(); }
  function stopNoise(){
    if (noiseRaf) { cancelAnimationFrame(noiseRaf); noiseRaf = 0; }
  }

  // ── Channel state machine ────────────────────────────────────────
  // Applies the right surface (movie, static, or off-air) for the
  // current wall-clock moment, then schedules a precise setTimeout
  // to the next transition. Re-entrant safe: any caller can request
  // a re-sync (e.g. visibilitychange) and we'll re-compute.
  let nextTransitionId = 0;
  function showSurface(which){
    // which ∈ 'movie' | 'static' | 'offair'
    staticEl.classList.toggle('on', which === 'static');
    offairEl.classList.toggle('on', which === 'offair');
    if (which === 'static') startNoise(); else stopNoise();
  }

  function applyState(){
    const info = getSlotInfo();

    if (info.offAir) {
      try { mv.pause(); } catch (_) {}
      const t = new Date(info.nextOnAir);
      offairNext.textContent =
        'CHANNEL RESUMES AT ' + fmtClock(t).toUpperCase();
      showSurface('offair');
      scheduleNext(info.nextOnAir - Date.now());
      return;
    }

    if (info.inShow) {
      // Seek to the live offset and play. Use a small drift tolerance
      // so we don't keep nudging the video with seeks every tick.
      const target = info.tInShow;
      const drift = Math.abs(mv.currentTime - target);
      if (drift > 0.6) {
        try { mv.currentTime = target; } catch (_) {}
      }
      if (mv.paused) {
        const p = mv.play();
        if (p && p.catch) p.catch(function(){});
      }
      showSurface('movie');
      // Next event: show ends at info.showEnd
      scheduleNext(info.showEnd - Date.now());
    } else {
      // Static interlude until next slot
      try { mv.pause(); } catch (_) {}
      showSurface('static');
      scheduleNext(info.nextSlotStart - Date.now());
    }
  }

  function scheduleNext(ms){
    clearTimeout(nextTransitionId);
    // Add a small guard so we always fire just-past the boundary
    // rather than just-before (clock skew, monotonic adjustments).
    const wait = Math.max(50, ms + 60);
    nextTransitionId = setTimeout(applyState, wait);
  }

  // If the tab was hidden across a transition, re-sync on return.
  document.addEventListener('visibilitychange', function(){
    if (!document.hidden && finished) applyState();
  });

  // Per-second countdown on the static screen.
  setInterval(function(){
    if (!staticEl.classList.contains('on')) return;
    const info = getSlotInfo();
    if (info.offAir || info.inShow) return;
    const secs = Math.max(0, Math.ceil((info.nextSlotStart - Date.now()) / 1000));
    const mm = String(Math.floor(secs / 60)).padStart(2, '0');
    const ss = String(secs % 60).padStart(2, '0');
    staticCountdown.textContent = 'UP NEXT IN ' + mm + ':' + ss;
  }, 1000);

  // ── EPG (TV Guide overlay) ───────────────────────────────────────
  // Renders a 7-day × 48-slot grid covering the full broadcast day
  // (11:00–22:45). Horizontally scrollable; the user's current slot
  // is centered on open. Day labels (left col) and time headers
  // (top row) are sticky so they stay visible while scrolling.
  // The clock + "now" highlighting update every 1s; the grid
  // structure is rebuilt only when the slot index changes (so
  // scroll position survives ticks).
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const SLOTS_PER_DAY = (CHANNEL.endHour - CHANNEL.startHour) * 4; // 48

  function slotForCol(col){
    const totalMin = CHANNEL.startHour * 60 + col * 15;
    return { hour: Math.floor(totalMin / 60), minute: totalMin % 60 };
  }
  function nowSlotCol(d){
    if (d.getHours() < CHANNEL.startHour || d.getHours() >= CHANNEL.endHour) return -1;
    return (d.getHours() - CHANNEL.startHour) * 4 + Math.floor(d.getMinutes() / 15);
  }

  function buildGuideGrid(){
    const now = new Date();
    const todayDow = now.getDay();

    guideGrid.innerHTML = '';

    // Top-left corner cell (sticky both axes).
    const corner = document.createElement('div');
    corner.className = 'guide-header corner';
    corner.textContent = '';
    guideGrid.appendChild(corner);

    // Time column headers (sticky-top). All 48 slots of the day.
    for (let c = 0; c < SLOTS_PER_DAY; c++) {
      const s = slotForCol(c);
      const t = new Date(now.getFullYear(), now.getMonth(), now.getDate(), s.hour, s.minute);
      const h = document.createElement('div');
      h.className = 'guide-header';
      h.textContent = fmtSlot(t).toUpperCase();
      guideGrid.appendChild(h);
    }

    // Day rows.
    for (let r = 0; r < 7; r++) {
      const dow = (todayDow + r) % 7;
      const isToday = r === 0;
      const label = document.createElement('div');
      label.className = 'guide-cell guide-row-label' + (isToday ? ' today' : '');
      label.textContent = DAYS_SHORT[dow];
      guideGrid.appendChild(label);
      for (let c = 0; c < SLOTS_PER_DAY; c++) {
        const cell = document.createElement('div');
        cell.className = 'guide-cell';
        cell.dataset.row = String(r);
        cell.dataset.col = String(c);
        if (!isToday) cell.style.opacity = '.65';
        cell.innerHTML =
          '<div class="title">' + SHOW.title + '</div>' +
          '<div class="meta">' + SHOW.duration + '</div>';
        guideGrid.appendChild(cell);
      }
    }
  }

  function updateGuideClockAndNow(){
    const now = new Date();
    const todayDow = now.getDay();
    guideDay.textContent  = DAYS_LONG[todayDow];
    guideDate.textContent = MONTHS[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
    guideTime.textContent = fmtClock(now);

    // Refresh "now" highlight — strip old, mark new.
    const prev = guideGrid.querySelector('.guide-cell.now');
    if (prev) prev.classList.remove('now');
    const col = nowSlotCol(now);
    if (col >= 0) {
      const nowCell = guideGrid.querySelector(
        '.guide-cell[data-row="0"][data-col="' + col + '"]'
      );
      if (nowCell) nowCell.classList.add('now');
    }

    const live = getSlotInfo();
    if (live.offAir)      guideDescTag.textContent = 'CHANNEL OFF AIR';
    else if (live.inShow) guideDescTag.textContent = 'NOW PLAYING · ' + SHOW.duration;
    else                  guideDescTag.textContent = 'NO SIGNAL · NEXT SLOT';
  }

  let guideTick = 0;
  function openGuide(){
    buildGuideGrid();
    updateGuideClockAndNow();
    guideEl.classList.add('on');

    // Center the current slot horizontally on open.
    requestAnimationFrame(function(){
      const nowCell = guideGrid.querySelector('.guide-cell.now');
      if (nowCell && nowCell.scrollIntoView) {
        try { nowCell.scrollIntoView({ inline: 'center', block: 'nearest' }); }
        catch (_) {}
      }
    });

    clearInterval(guideTick);
    guideTick = setInterval(updateGuideClockAndNow, 1000);
  }
  function closeGuide(){
    guideEl.classList.remove('on');
    clearInterval(guideTick); guideTick = 0;
  }
  guideBtn.addEventListener('click', openGuide);
  guideClose.addEventListener('click', closeGuide);
  guideEl.addEventListener('click', function(e){
    // Click on the overlay backdrop (not on its children) closes.
    if (e.target === guideEl) closeGuide();
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') closeGuide();
  });

  // ── Intro sequence (audio enabled now) + first-gesture activation ─
  function startMovie(){
    const p = mv.play();
    if (p && p.catch) p.catch(function(){
      const once = function(){
        mv.removeEventListener('canplay', once);
        mv.play().catch(function(){});
      };
      mv.addEventListener('canplay', once);
    });
  }

  let activated = false;
  let finished  = false;

  function activate(){
    if (activated) return;
    activated = true;

    enterFullscreen();

    // Open audio gate inside the gesture; hold movie at silent
    // until the intro ends. (Intro itself plays unmuted.)
    mv.muted = false;
    mv.volume = 0;
    // Seek movie to the live channel position now so it's already
    // decoding the right frames behind the overlay.
    const info = getSlotInfo();
    if (!info.offAir && info.inShow) {
      try { mv.currentTime = info.tInShow; } catch (_) {}
      startMovie();
    } else {
      // We'll snap to live position on intro-end via applyState().
    }

    intro.classList.add('activated');
    // Intro plays unmuted (has audio in this version).
    introVideo.muted = false;
    introVideo.volume = 0.85;
    const ip = introVideo.play();
    if (ip && ip.catch) ip.catch(finish);
  }

  function finish(){
    if (finished) return;
    finished = true;

    mv.volume = 0.5;
    applyState();
    // Reveal the guide button now that the channel is live, and
    // flip the channelLive flag so subsequent mousemove / touch /
    // keydown events ping the auto-hiding FS button.
    guideBtn.classList.add('show');
    channelLive = true;
    syncFsIcon();
    pingControls(); // give the FS button its first 5s visibility burst

    intro.classList.add('done');
    setTimeout(function(){
      if (intro.parentNode) intro.parentNode.removeChild(intro);
    }, 700);
  }

  introVideo.addEventListener('ended', finish);
  introVideo.addEventListener('error', finish);
  setTimeout(function(){ if (activated) finish(); }, 7000);

  intro.addEventListener('click', activate);
  intro.addEventListener('touchstart', activate, { passive: true });
  intro.tabIndex = 0;
  intro.addEventListener('keydown', function(e){
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); }
  });
});
</script>
