<script>
// ─────────────────────────────────────────────────────────────────────
// INTERDEPENDENT TV — linear channel runtime
// ─────────────────────────────────────────────────────────────────────
//
// Schedule semantics
//   - Channel operates 11:00–23:00 local time.
//   - Slot length: 15 min (900s). Movie: 12:14 (734s). Static gap: 2:46.
//   - Slot starts on every quarter-hour boundary: :00, :15, :30, :45.
//   - The "live position" inside a slot is t = (now - slotStart)/1000.
//     If t < SHOW_SECS, the mux-video is playing at currentTime = t.
//     If t ≥ SHOW_SECS, the #static overlay is up until the next slot.
//
// Sync model
//   Pure client-side, deterministic. Every browser computes the same
//   in-slot offset from its own wall-clock, so all viewers worldwide
//   land on the same frame at the same minute without any server.
//   No Mux Live, no ffmpeg loop, no scheduling service.
//
// Lifecycle
//   load → intro overlay visible, mux-video preloads silently.
//   click → unmute prep (muted=false, volume=0), play movie at
//           the live offset, play intro.webm (now with audio).
//   intro.ended → ramp volume to 0.5, fade intro overlay.
//   after fade → handleState() takes over: ensures the movie is
//           seeked to the live position, then schedules the next
//           transition (show→static or static→show) precisely at
//           its quarter-hour boundary.
//
// ─────────────────────────────────────────────────────────────────────

const CHANNEL = {
  // The channel runs 6 AM – 9 PM Pacific (anchored to the
  // America/Los_Angeles zone so PST↔PDT shifts are automatic
  // — "6 AM PT" stays 6 AM PT year-round). Every viewer on
  // Earth is on-air during the same UTC moments. Last slot of
  // the day starts at 20:45 PT, ends at 21:00 PT.
  startHour: 6,                       // 6 AM PT
  endHour:   21,                      // 9 PM PT
  slotSec:   900,                     // 15 min per slot
  showSec:   734,                     // Tears of Steel: 12:14
  timezone:  'America/Los_Angeles',
};
CHANNEL.staticSec = CHANNEL.slotSec - CHANNEL.showSec;

// ── PT timezone helpers ────────────────────────────────────────────
// Used everywhere we need to map between a UTC timestamp and the
// channel's broadcast wall clock. Built on Intl.DateTimeFormat so
// DST is handled by the runtime — no hardcoded offsets.
const PT_DTF = new Intl.DateTimeFormat('en-US', {
  timeZone: CHANNEL.timezone,
  year: 'numeric', month: 'numeric', day: 'numeric',
  hour: 'numeric', minute: 'numeric', second: 'numeric',
  hour12: false,
});

// Components of `nowMs` as observed in PT.
function ptParts(nowMs){
  const parts = PT_DTF.formatToParts(new Date(nowMs));
  const g = (t) => Number(parts.find(p => p.type === t).value);
  return {
    year:   g('year'),
    month:  g('month'),               // 1-12
    day:    g('day'),
    hour:   g('hour') % 24,           // Some engines emit "24" for midnight
    minute: g('minute'),
    second: g('second'),
  };
}

// Map a PT wall-clock (year/month/day/hour/minute/second) to its UTC
// timestamp. Naïve `Date.UTC(...)` is off by the PT offset; we
// converge by re-projecting through the formatter (2 iterations cover
// every DST case including spring-forward / fall-back boundaries).
function ptToUtc(year, month, day, hour, minute, second){
  let ts = Date.UTC(year, month - 1, day, hour, minute, second);
  for (let i = 0; i < 2; i++) {
    const back = ptParts(ts);
    const reqUTC = Date.UTC(year, month - 1, day, hour, minute, second);
    const backUTC = Date.UTC(back.year, back.month - 1, back.day,
                             back.hour, back.minute, back.second);
    const drift = reqUTC - backUTC;
    if (drift === 0) break;
    ts += drift;
  }
  return ts;
}

const SHOW = {
  title: 'TEARS OF STEEL',
  duration: '12:14',
  description:
    'Open-source 4K sci-fi short — a fractured science team races ' +
    'to undo a future that was never theirs to write. Directed by ' +
    'Ian Hubert · Blender Foundation, 2012.',
};

// ── Wall-clock slot math ────────────────────────────────────────────
// Returns the current slot state for a given (or now) timestamp.
// All boundaries are evaluated in PT — the channel's broadcast zone —
// so every viewer worldwide is on-air during the same UTC moments.
function getSlotInfo(now) {
  now = now || Date.now();
  const pt = ptParts(now);

  // Off-air outside CHANNEL.startHour ≤ PT-hour < CHANNEL.endHour
  if (pt.hour < CHANNEL.startHour || pt.hour >= CHANNEL.endHour) {
    let next;
    if (pt.hour < CHANNEL.startHour) {
      // Same calendar day in PT, later this morning.
      next = ptToUtc(pt.year, pt.month, pt.day, CHANNEL.startHour, 0, 0);
    } else {
      // Tomorrow's 6 AM PT. Advance the PT calendar day via a UTC-
      // based shift; if that lands the wrong side of a DST seam,
      // ptToUtc's iterative refinement corrects it.
      const t = new Date(Date.UTC(pt.year, pt.month - 1, pt.day + 1));
      next = ptToUtc(
        t.getUTCFullYear(), t.getUTCMonth() + 1, t.getUTCDate(),
        CHANNEL.startHour, 0, 0
      );
    }
    return { offAir: true, nextOnAir: next };
  }

  // On-air. Slot boundaries are at PT :00 / :15 / :30 / :45.
  const slotMin = Math.floor(pt.minute / 15) * 15;
  const slotStart = ptToUtc(pt.year, pt.month, pt.day, pt.hour, slotMin, 0);
  const tInSlot = (now - slotStart) / 1000;
  const inShow = tInSlot < CHANNEL.showSec;

  return {
    offAir: false,
    inShow,
    slotStart,
    nextSlotStart: slotStart + CHANNEL.slotSec * 1000,
    showEnd:       slotStart + CHANNEL.showSec * 1000,
    tInSlot,
    tInShow:    inShow ? tInSlot : CHANNEL.showSec,
    tInStatic:  inShow ? 0       : tInSlot - CHANNEL.showSec,
  };
}

// Detect whether the viewer's locale uses 12-hour or 24-hour clocks.
// en-US, en-GB → hour12=true; de-DE, fr-FR, ja-JP, most of EU → false.
// Resolved once at module load; viewer's locale doesn't change mid-
// session. Falls back to 12-hour if the Intl API can't decide.
const USE_HOUR12 = (function(){
  try {
    const opt = new Intl.DateTimeFormat([], { hour: 'numeric' }).resolvedOptions();
    return opt.hour12 !== false;
  } catch (_) { return true; }
})();

// fmtClock: viewer's wall clock (masthead + off-air messages).
// 12-hour locales: "5:24 PM". 24-hour locales: "17:24".
function fmtClock(d){
  const h24 = d.getHours();
  const m   = d.getMinutes();
  const mm  = m < 10 ? '0' + m : m;
  if (USE_HOUR12) {
    const ampm = h24 >= 12 ? 'PM' : 'AM';
    const h    = h24 % 12 || 12;
    return h + ':' + mm + ' ' + ampm;
  }
  const hh = h24 < 10 ? '0' + h24 : h24;
  return hh + ':' + mm;
}
// fmtClockSeconds: like fmtClock but with seconds — used for the
// TV-Guide masthead clock, which ticks visibly. 12-hour locales:
// "5:24:07 PM". 24-hour locales: "17:24:07". Tabular-num styling
// (see .guide-clock .time CSS) keeps the digits from jittering as
// the seconds advance.
function fmtClockSeconds(d){
  const h24 = d.getHours();
  const m   = d.getMinutes();
  const s   = d.getSeconds();
  const mm  = m < 10 ? '0' + m : m;
  const ss  = s < 10 ? '0' + s : s;
  if (USE_HOUR12) {
    const ampm = h24 >= 12 ? 'PM' : 'AM';
    const h    = h24 % 12 || 12;
    return h + ':' + mm + ':' + ss + ' ' + ampm;
  }
  const hh = h24 < 10 ? '0' + h24 : h24;
  return hh + ':' + mm + ':' + ss;
}
// fmtSlot: column-header form. 12-hour locales: "6:00 A" / "1:00 P"
// (compact single-letter AM/PM with a space). 24-hour locales:
// "06:00" / "18:00". Headers read naturally in the viewer's idiom.
function fmtSlot(d){
  const h24 = d.getHours();
  const m   = d.getMinutes();
  const mm  = m < 10 ? '0' + m : m;
  if (USE_HOUR12) {
    const ap = h24 >= 12 ? 'P' : 'A';
    const h  = h24 % 12 || 12;
    return h + ':' + mm + ' ' + ap;
  }
  const hh = h24 < 10 ? '0' + h24 : h24;
  return hh + ':' + mm;
}
const DAYS_SHORT = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const DAYS_LONG  = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];

// ── Defer everything until mux-video is upgraded ────────────────────
customElements.whenDefined('mux-video').then(function(){
  const mv         = document.querySelector('mux-video');
  const intro      = document.getElementById('intro');
  const introVideo = document.getElementById('introVideo');
  const staticEl   = document.getElementById('static');
  const offairEl   = document.getElementById('offair');
  const offairNext = document.getElementById('offairNext');
  const staticCountdown = document.getElementById('staticCountdown');
  const guideBtn   = document.getElementById('guide-button');
  const watermark  = document.getElementById('logoFs');
  const guideEl    = document.getElementById('guide');
  const guideBack = document.getElementById('guideBack');
  const guideGrid  = document.getElementById('guideGrid');
  const guideDay   = document.getElementById('guideDay');
  const guideDate  = document.getElementById('guideDate');
  const guideTime  = document.getElementById('guideTime');
  const guideDescTag = document.getElementById('guideDescTag');
  const canvas     = staticEl.querySelector('canvas');
  if (!mv) return;

  // ── Fullscreen helpers ────────────────────────────────────────────
  function isFullscreen(){
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }
  function enterFullscreen(){
    const candidates = [document.documentElement, document.body];
    for (let i = 0; i < candidates.length; i++) {
      const el = candidates[i];
      if (!el) continue;
      const fn = el.requestFullscreen || el.webkitRequestFullscreen;
      if (typeof fn !== 'function') continue;
      try {
        const p = fn.call(el, { navigationUI: 'hide' });
        if (p && p.catch) p.catch(function(){});
        return;
      } catch (_) {
        try {
          const p2 = fn.call(el);
          if (p2 && p2.catch) p2.catch(function(){});
          return;
        } catch (__) {}
      }
    }
  }
  function exitFullscreen(){
    const fn = document.exitFullscreen || document.webkitExitFullscreen;
    if (typeof fn === 'function') {
      try {
        const p = fn.call(document);
        if (p && p.catch) p.catch(function(){});
      } catch (_) {}
    }
  }
  function toggleFullscreen(){
    isFullscreen() ? exitFullscreen() : enterFullscreen();
  }
  // Toggle body.in-fs based on the current fullscreen state. CSS
   // hides the .logo-fs-icon (and changes the cursor) while in FS,
   // so the watermark reads as the clean logo — the user has
   // "entered" the channel.
  //
   // Also blur the watermark when leaving FS: browsers return focus
   // to the element that initiated fullscreen after an ESC exit,
   // and because ESC is a keyboard event the resulting focus
   // qualifies as :focus-visible — leaving a stranded glow on the
   // watermark every time the user backs out of FS.
  function syncFsIcon(){
    const inFs = isFullscreen();
    document.body.classList.toggle('in-fs', inFs);
    if (!inFs && document.activeElement === watermark) {
      watermark.blur();
    }
  }
  document.addEventListener('fullscreenchange', syncFsIcon);
  document.addEventListener('webkitfullscreenchange', syncFsIcon);

  // ── Auto-hide on-screen controls ──────────────────────────────────
  // FS (top-left), mute (top-right), GUIDE (bottom-left), IV
  // watermark (bottom-right) all share one 5-second idle timer.
  // pingControls() runs on every mousemove / touch / keydown after
  // channelLive flips true (intro finished). The timer resets on
  // each ping; controls fade together when it expires.
  let channelLive = false;
  let hideTimer   = 0;
  function showAllControls(on){
    // Three regimes drive the corner chrome (watermark + GUIDE pill):
    //
    //   A) Pre-activation (cold-start):
    //      Watermark hidden (it would dupe the centered IV logo).
    //      GUIDE is managed by the dedicated 8s reveal timer — not
    //      touched here so we don't fight it.
    //
    //   B) Channel-live + info surface (#static interlude / #offair):
    //      Watermark hidden (centered logo dupes again).
    //      GUIDE stays put. Info states are where viewers most want
    //      the schedule — never hide it from them on touch devices.
    //
    //   C) Channel-live + active movie playback:
    //      Watermark and GUIDE fade together on idle. Active
    //      watching gets a clean picture; any mouse-move / tap /
    //      keypress brings both back via pingControls().
    const onInfoSurface =
      channelLive
      && (staticEl.classList.contains('on') || offairEl.classList.contains('on'));
    const onMovieSurface = channelLive && !onInfoSurface;

    if (onInfoSurface) {
      watermark.classList.remove('show');
      guideBtn.classList.add('show');
    } else if (onMovieSurface) {
      watermark.classList.toggle('show', on);
      guideBtn.classList.toggle('show', on);
    } else {
      // Pre-activation: watermark hidden; GUIDE governed elsewhere.
      watermark.classList.remove('show');
    }
  }
  // Idle-hide delay. Touch devices (phones, tablets) get a quicker
  // 3s fade — controls aren't useful sitting over the video on a
  // small screen, and the user can re-summon by tapping. Desktop
  // (mouse / fine pointer) keeps the 5s standard so a hovering
  // user doesn't watch them flicker.
  const HIDE_DELAY_MS =
    matchMedia('(hover: none) and (pointer: coarse)').matches ? 3000 : 5000;

  function pingControls(){
    // showAllControls() internally gates GUIDE + watermark on
    // channelLive — they only appear once the channel is live, so
    // the cold-start screen shows only the ON / OFF AIR badge.
    showAllControls(true);
    clearTimeout(hideTimer);
    hideTimer = setTimeout(function(){ showAllControls(false); }, HIDE_DELAY_MS);
  }
  document.addEventListener('mousemove',  pingControls);
  document.addEventListener('touchstart', pingControls, { passive: true });
  document.addEventListener('keydown',    pingControls);
  // The watermark IS the fullscreen toggle. Clicking the IV mark
  // toggles fullscreen (icon inside the big white disc fades on
  // hover to advertise the action). Does NOT start the channel —
  // only the PUSH PLAY button does that.
  watermark.addEventListener('click', function(e){
    e.stopPropagation();
    toggleFullscreen();
    pingControls();
    // Drop focus immediately so the next ESC (or subsequent
    // keyboard event) doesn't leave the watermark in a
    // :focus-visible state with a visible halo.
    watermark.blur();
  });

  // Feature-gate for iOS — Fullscreen API doesn't apply to non-
  // <video> elements on iPhone Safari/Chrome, so we'd be offering
  // a dead affordance. Adding body.no-fs hides the icon overlay
  // and makes the watermark non-interactive (it stays as
  // decoration only). The current FS button used to feature-gate
  // itself; the gate now lives on <body>.
  const fsApiAvailable =
    (typeof document.documentElement.requestFullscreen === 'function') ||
    (typeof document.documentElement.webkitRequestFullscreen === 'function');
  if (!fsApiAvailable) {
    document.body.classList.add('no-fs');
  }


  // ── Noise renderer (V1) ──────────────────────────────────────────
  // Port of the original index.html cold-start snow: half-resolution
  // canvas of `Math.random() * 60` greyscale pixels, redrawn every
  // 66ms via setTimeout. ImageData is freshly allocated each frame
  // (V1 did it that way and the GC cost is negligible — ~32 KB at
  // 15fps). Canvas dimensions follow window size; resizes on window
  // resize so the texture stays at the right density. Both the
  // cold-start (#introNoise) and the between-show interlude (#static
  // > canvas) use the same renderer so the brand identity reads the
  // same across both states.
  function makeNoiseRenderer(cnv){
    const ctx = cnv.getContext('2d');
    let alive = false;
    let timer = 0;
    function resize(){
      cnv.width  = Math.max(1, innerWidth  >> 1);
      cnv.height = Math.max(1, innerHeight >> 1);
    }
    function tick(){
      if (!alive) return;
      const w = cnv.width, h = cnv.height;
      const d = ctx.createImageData(w, h);
      const p = d.data;
      let i = p.length;
      while (i) {
        i -= 4;
        const v = (Math.random() * 60) | 0;
        p[i] = p[i+1] = p[i+2] = v;
        p[i+3] = 255;
      }
      ctx.putImageData(d, 0, 0);
      timer = setTimeout(tick, 66);
    }
    resize();
    window.addEventListener('resize', resize);
    return {
      start(){ if (!alive) { alive = true; tick(); } },
      stop() { alive = false; clearTimeout(timer); timer = 0; },
    };
  }

  // Between-show interlude — same V1 snow as the cold-start.
  const staticNoise = makeNoiseRenderer(canvas);
  function startNoise(){ staticNoise.start(); }
  function stopNoise(){  staticNoise.stop();  }

  // Cold-start backdrop — same V1 snow, always running on the intro
  // overlay until the user clicks PUSH PLAY (the intro video then
  // covers it).
  const introNoiseCanvas = document.getElementById('introNoise');
  const introNoise = introNoiseCanvas ? makeNoiseRenderer(introNoiseCanvas) : null;
  if (introNoise) introNoise.start();

  // ── Channel state machine ────────────────────────────────────────
  // Applies the right surface (movie, static, or off-air) for the
  // current wall-clock moment, then schedules a precise setTimeout
  // to the next transition. Re-entrant safe: any caller can request
  // a re-sync (e.g. visibilitychange) and we'll re-compute.
  let nextTransitionId = 0;
  function showSurface(which){
    // which ∈ 'movie' | 'static' | 'offair'
    staticEl.classList.toggle('on', which === 'static');
    offairEl.classList.toggle('on', which === 'offair');
    if (which === 'static') startNoise(); else stopNoise();
    // Re-evaluate watermark visibility on every surface change.
    // The watermark is hidden on the static / offair surfaces
    // (their centered IV logo would clash with the corner one);
    // when we return to 'movie', we restore whatever idle-fade
    // state the watermark was in before the surface switch.
    const wantShown = watermark.classList.contains('show');
    showAllControls(wantShown);
  }

  function applyState(){
    const info = getSlotInfo();

    if (info.offAir) {
      try { mv.pause(); } catch (_) {}
      const t = new Date(info.nextOnAir);
      offairNext.textContent =
        'CHANNEL RESUMES AT ' + fmtSlot(t).toUpperCase();
      // 6 AM PT lands at different local times across timezones,
      // so fmtClock above formats `t` in the viewer's local — they
      // see when the channel comes back ON THEIR clock.
      showSurface('offair');
      scheduleNext(info.nextOnAir - Date.now());
      return;
    }

    if (info.inShow) {
      // Seek to the live offset and play. Use a small drift tolerance
      // so we don't keep nudging the video with seeks every tick.
      const target = info.tInShow;
      const drift = Math.abs(mv.currentTime - target);
      if (drift > 0.6) {
        try { mv.currentTime = target; } catch (_) {}
      }
      if (mv.paused) {
        const p = mv.play();
        if (p && p.catch) p.catch(function(){});
      }
      showSurface('movie');
      // Next event: show ends at info.showEnd
      scheduleNext(info.showEnd - Date.now());
    } else {
      // Static interlude until next slot
      try { mv.pause(); } catch (_) {}
      showSurface('static');
      scheduleNext(info.nextSlotStart - Date.now());
    }
  }

  function scheduleNext(ms){
    clearTimeout(nextTransitionId);
    // Add a small guard so we always fire just-past the boundary
    // rather than just-before (clock skew, monotonic adjustments).
    const wait = Math.max(50, ms + 60);
    nextTransitionId = setTimeout(applyState, wait);
  }

  // If the tab was hidden across a transition, re-sync on return.
  document.addEventListener('visibilitychange', function(){
    if (!document.hidden && finished) applyState();
  });

  // Per-second countdown on the static screen.
  setInterval(function(){
    if (!staticEl.classList.contains('on')) return;
    const info = getSlotInfo();
    if (info.offAir || info.inShow) return;
    const secs = Math.max(0, Math.ceil((info.nextSlotStart - Date.now()) / 1000));
    const mm = String(Math.floor(secs / 60)).padStart(2, '0');
    const ss = String(secs % 60).padStart(2, '0');
    staticCountdown.textContent = 'OFF AIR · BACK IN ' + mm + ':' + ss;
  }, 1000);

  // ── EPG (TV Guide overlay) ───────────────────────────────────────
  // Renders a 7-day × 48-slot grid covering the full broadcast day
  // (11:00–22:45). Horizontally scrollable; the user's current slot
  // is centered on open. Day labels (left col) and time headers
  // (top row) are sticky so they stay visible while scrolling.
  // The clock + "now" highlighting update every 1s; the grid
  // structure is rebuilt only when the slot index changes (so
  // scroll position survives ticks).
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  // Schedule grid is sized in HOURS, not 15-min slots. The channel
  // still runs at 15-min slot granularity for playback (Tears of
  // Steel + 2:46 of static every quarter hour) — but the GUIDE
  // shows one cell per broadcast hour so the table reads at a
  // glance. 15 hourly columns cover the 6 AM – 9 PM PT broadcast
  // day; the trailing OFF AIR cell closes it.
  const HOURS_PER_DAY = CHANNEL.endHour - CHANNEL.startHour; // 15

  // Returns the PT hour + minute for col-th hourly column.
  // col 0 = 6:00 AM PT, col 1 = 7:00 AM PT, ... col 14 = 8:00 PM PT.
  function slotForCol(col){
    return { hour: CHANNEL.startHour + col, minute: 0 };
  }

  // Returns the hourly column index (0..HOURS_PER_DAY-1) for the
  // given moment, or -1 if outside channel hours. Boundaries
  // evaluated in PT.
  function nowSlotCol(d){
    const nowMs = d instanceof Date ? d.getTime() : (typeof d === 'number' ? d : Date.now());
    const pt = ptParts(nowMs);
    if (pt.hour < CHANNEL.startHour || pt.hour >= CHANNEL.endHour) return -1;
    return pt.hour - CHANNEL.startHour;
  }

  // Column widths: current slot is 200px (wider, so the red
   // now-line moving through it is easier to read); all others
   // are 130px. The label column is sized via clamp().
  // (Column widths live in CSS now — `.guide-cell` flex-basis 130px,
  //  `.guide-cell.now-col` 200px, `.guide-row-label` clamp(68-108px),
  //  mobile + landscape media queries override. Keeps the schedule
  //  layout declaratively responsive instead of computed in JS.)

  // 30 days of schedule. Today is row 0 (highlighted), then 29
  // future days. Each row carries its day-of-week + calendar date.
  const ROW_COUNT = 30;

  function buildGuideGrid(){
    const now = new Date();
    const nowCol = nowSlotCol(now);

    guideGrid.innerHTML = '';

    // ── Header row (sticky-top) ────────────────────────────────────
    // Corner cell is sticky on BOTH axes (top:0 + left:0). Then 15
    // hourly headers, the current hour getting the wider .now-col
    // flex-basis so the now-line + now-cell have breathing room.
    const headRow = document.createElement('div');
    headRow.className = 'guide-row guide-row-head';
    const corner = document.createElement('div');
    corner.className = 'guide-corner';
    headRow.appendChild(corner);
    const ptToday = ptParts(Date.now());
    for (let c = 0; c < HOURS_PER_DAY; c++) {
      const s = slotForCol(c);
      const slotTS = ptToUtc(ptToday.year, ptToday.month, ptToday.day,
                             s.hour, s.minute, 0);
      const t = new Date(slotTS);
      const h = document.createElement('div');
      h.className = 'guide-header' + (c === nowCol ? ' now-col' : '');
      h.textContent = fmtSlot(t).toUpperCase();
      headRow.appendChild(h);
    }
    // Trailing header: shows the END-of-broadcast moment as a
    // proper time on top ("9:00 P" — the boundary that closes the
    // 8 PM hour and starts the off-air window) and "OFF AIR" below.
    // Viewers see when programming stops without having to read
    // between the lines of a missing column. Built from a slot
    // computed at endHour:00 so the locale formatter handles 12h
    // vs 24h consistently.
    const endTS = ptToUtc(ptToday.year, ptToday.month, ptToday.day,
                          CHANNEL.endHour, 0, 0);
    const endTimeLabel = fmtSlot(new Date(endTS)).toUpperCase();
    const endHeader = document.createElement('div');
    endHeader.className = 'guide-header guide-end-cell';
    endHeader.innerHTML =
      '<div class="end-time">' + endTimeLabel + '</div>' +
      '<div class="end-label">OFF AIR</div>';
    headRow.appendChild(endHeader);
    guideGrid.appendChild(headRow);

    // ── Day rows ──────────────────────────────────────────────────
    // Each row: sticky-left day label + 48 program cells. Today is
    // row 0. Every row shows DAY + DATE so a viewer scrolling 30 days
    // always knows the calendar date — not just the abbreviation.
    for (let r = 0; r < ROW_COUNT; r++) {
      const rowDate = new Date(now);
      rowDate.setDate(now.getDate() + r);
      const isToday = r === 0;

      const row = document.createElement('div');
      row.className = 'guide-row';

      const label = document.createElement('div');
      label.className = 'guide-row-label' + (isToday ? ' today' : '');
      const dowRow = document.createElement('div');
      dowRow.className = 'label-dow';
      dowRow.textContent = DAYS_SHORT[rowDate.getDay()];
      const dateRow = document.createElement('div');
      dateRow.className = 'label-date';
      dateRow.textContent = MONTHS[rowDate.getMonth()] + ' ' + rowDate.getDate();
      label.appendChild(dowRow);
      label.appendChild(dateRow);
      row.appendChild(label);

      for (let c = 0; c < HOURS_PER_DAY; c++) {
        const cell = document.createElement('div');
        cell.className = 'guide-cell' + (c === nowCol ? ' now-col' : '');
        cell.dataset.row = String(r);
        cell.dataset.col = String(c);
        if (!isToday) cell.style.opacity = '.65';
        cell.innerHTML =
          '<div class="title">' + SHOW.title + '</div>' +
          '<div class="meta">' + SHOW.duration + '</div>';
        row.appendChild(cell);
      }
      // Trailing END-OF-DAY cell — matches the header marker above.
      // Visually closes each day so the table doesn't just stop
      // mid-air at 8:45p. data-row carries the row index so hover
      // can render the right day in the description strip.
      const endCell = document.createElement('div');
      endCell.className = 'guide-cell guide-end-cell';
      endCell.dataset.row = String(r);
      if (!isToday) endCell.style.opacity = '.65';
      endCell.innerHTML =
        '<div class="title">Off air</div>' +
        '<div class="meta">Resumes 6:00 AM</div>';
      row.appendChild(endCell);

      guideGrid.appendChild(row);
    }
    // (The vertical red "now" line is gone. The today row's
    // red-bordered .guide-cell.now does all the now-marker work
    // we need — the TV-Guide-booklet idiom highlights the current
    // cell, no ticking creep line.)
  }

  // Tracks the slot index the grid was built for. When the live
  // slot crosses a quarter-hour boundary, we rebuild so the wider
  // "current" column moves to the new slot. In between, only the
  // clock + now-cell highlight + red line are updated, so the
  // user's horizontal scroll position survives the tick.
  let lastBuiltSlot = -2;

  function updateGuideClockAndNow(){
    const now = new Date();
    const todayDow = now.getDay();
    guideDay.textContent  = DAYS_LONG[todayDow];
    guideDate.textContent = MONTHS[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
    guideTime.textContent = fmtClockSeconds(now);

    const col = nowSlotCol(now);
    // Slot rolled over → rebuild grid so the wider column moves.
    if (col !== lastBuiltSlot) {
      lastBuiltSlot = col;
      buildGuideGrid();
    }

    // Refresh "now" highlight on the today row.
    const prev = guideGrid.querySelector('.guide-cell.now');
    if (prev) prev.classList.remove('now');
    if (col >= 0) {
      const nowCell = guideGrid.querySelector(
        '.guide-cell[data-row="0"][data-col="' + col + '"]'
      );
      if (nowCell) nowCell.classList.add('now');
    }

    renderGuideDesc();
  }

  // Description strip — re-rendered every clock-tick AND whenever
  // the hovered cell changes. If the user is hovering a cell in the
  // schedule, the strip shows that cell's context (show + airing
  // day/time, or off-air for the end-of-day cell). Otherwise it
  // reflects the live channel state.
  let hoveredSlot = null; // {row, col, isOffAir} | null

  function renderGuideDesc(){
    if (hoveredSlot) {
      const now0 = new Date();
      const rowDate = new Date(now0);
      rowDate.setDate(now0.getDate() + hoveredSlot.row);
      const dow  = DAYS_SHORT[rowDate.getDay()];
      const date = MONTHS[rowDate.getMonth()] + ' ' + rowDate.getDate();
      if (hoveredSlot.isOffAir) {
        // Hovering the END-of-day cell on any row. Compute the PT
        // broadcast-end and next-morning-resume times in viewer-
        // local format, same as the schedule headers.
        const endTS = ptToUtc(rowDate.getFullYear(),
          rowDate.getMonth() + 1, rowDate.getDate(),
          CHANNEL.endHour, 0, 0);
        const resumeTS = ptToUtc(rowDate.getFullYear(),
          rowDate.getMonth() + 1, rowDate.getDate() + 1,
          CHANNEL.startHour, 0, 0);
        const offStart = fmtSlot(new Date(endTS)).toUpperCase();
        const offEnd   = fmtSlot(new Date(resumeTS)).toUpperCase();
        guideDescTitle.textContent = 'OFF AIR';
        guideDescBody.textContent  =
          'No programming scheduled overnight from ' + offStart +
          ' until ' + offEnd + ' the next morning. Browse another ' +
          'day below.';
        guideDescTag.textContent   =
          dow + ' · ' + date + ' · ' + offStart + ' – ' + offEnd;
        return;
      }
      // Regular slot — TEARS OF STEEL plays at the indicated hour.
      // Compute the slot's local time. Build a Date at the PT hour
      // (slotForCol returns PT hour:minute) then format in viewer's
      // local for header-consistent display.
      const s = slotForCol(hoveredSlot.col);
      const slotTS = ptToUtc(rowDate.getFullYear(),
                             rowDate.getMonth() + 1, rowDate.getDate(),
                             s.hour, s.minute, 0);
      const slotLocal = fmtSlot(new Date(slotTS)).toUpperCase();
      guideDescTitle.textContent = SHOW.title;
      guideDescBody.textContent  = SHOW.description;
      guideDescTag.textContent   = dow + ' · ' + date + ' · ' + slotLocal;
      return;
    }

    // No hover — show the live channel state (the previous default).
    const live = getSlotInfo();
    if (live.offAir) {
      const t = new Date(live.nextOnAir);
      guideDescTitle.textContent = 'CHANNEL OFF AIR';
      guideDescBody.textContent  =
        'Programming returns at ' + fmtSlot(t) +
        ' (the next 6:00 A Pacific). See the lineup below for what airs next.';
      guideDescTag.textContent   =
        'OFF AIR · BACK AT ' + fmtSlot(t).toUpperCase();
    } else if (live.inShow) {
      guideDescTitle.textContent = SHOW.title;
      guideDescBody.textContent  = SHOW.description;
      guideDescTag.textContent   = 'ON AIR · ' + SHOW.duration;
    } else {
      const secs = Math.max(0, Math.ceil((live.nextSlotStart - Date.now()) / 1000));
      const mm = String(Math.floor(secs / 60)).padStart(2, '0');
      const ss = String(secs % 60).padStart(2, '0');
      const nextAt = fmtSlot(new Date(live.nextSlotStart));
      guideDescTitle.textContent = 'BETWEEN SHOWS';
      guideDescBody.textContent  =
        SHOW.title + ' returns at ' + nextAt +
        '. See the lineup below for what airs next.';
      guideDescTag.textContent   = 'OFF AIR · BACK IN ' + mm + ':' + ss;
    }
  }

  let guideTick = 0;
  function openGuide(){
    // Reset the build-cache so opening always rebuilds with the
    // current slot widened (the slot may have changed since the
    // last open).
    lastBuiltSlot = -2;
    buildGuideGrid();
    updateGuideClockAndNow();
    guideEl.classList.add('on');

    // Pin the current slot to the LEFT of the visible grid, right
    // after the sticky day-label column. Past slots are reachable
    // by scrolling left (toward 11:00 AM), future slots by
    // scrolling right (toward 10:45 PM). Uses setTimeout(0) rather
    // than requestAnimationFrame because hidden tabs throttle rAF
    // to ~500ms intervals; the macrotask queue fires reliably.
    setTimeout(function(){
      const wrap = document.querySelector('.guide-grid-wrap');
      const nowCell = guideGrid.querySelector('.guide-cell.now');
      const labelCol = guideGrid.querySelector('.guide-row-label');
      if (!wrap || !nowCell) return;
      const labelW = labelCol ? labelCol.offsetWidth : 0;
      wrap.scrollLeft = Math.max(0, nowCell.offsetLeft - labelW);
    }, 0);

    clearInterval(guideTick);
    guideTick = setInterval(updateGuideClockAndNow, 1000);
  }

  // Hover-to-preview: any schedule cell, on hover, swaps the
  // description strip to that slot's day / date / time. Event-
  // delegated on the grid so we don't bind 450+ listeners
  // (30 days × 15 hours). When the cursor leaves the grid entirely,
  // hoveredSlot is cleared and the strip reverts to the live channel
  // state on the next render. Hover styling (background tint) is
  // gated to (hover: hover) so it doesn't stick on touch.
  guideGrid.addEventListener('mouseover', function(e){
    const cell = e.target.closest('.guide-cell');
    if (!cell || !guideGrid.contains(cell)) return;
    const isOffAir = cell.classList.contains('guide-end-cell');
    hoveredSlot = {
      row: parseInt(cell.dataset.row, 10),
      col: isOffAir ? -1 : parseInt(cell.dataset.col, 10),
      isOffAir: isOffAir,
    };
    renderGuideDesc();
  });
  guideGrid.addEventListener('mouseleave', function(){
    hoveredSlot = null;
    renderGuideDesc();
  });

  function closeGuide(){
    guideEl.classList.remove('on');
    clearInterval(guideTick); guideTick = 0;
    // Drop focus from any GUIDE chrome (back button, GUIDE pill,
    // etc.) so the browser's keyboard-focus ring — usually a blue
    // halo — doesn't linger on whatever was active when the user
    // pressed ESC.
    const ae = document.activeElement;
    if (ae && ae !== document.body && typeof ae.blur === 'function') {
      ae.blur();
    }
  }
  guideBtn.addEventListener('click', openGuide);
  // Netflix-style back-to-TV button sits between the masthead IV
  // mark and the day/date/time cluster, arrow pointing at the
  // brand. Clicking it closes the guide and returns the viewer to
  // whatever state they came from (cold-start if pre-activation,
  // or the live channel if mid-show). `.blur()` after the click
  // prevents the focus-ring halo from lingering once the guide
  // is gone.
  guideBack.addEventListener('click', function(){
    closeGuide();
    guideBack.blur();
  });
  guideEl.addEventListener('click', function(e){
    // Click on the overlay backdrop (not on its children) closes.
    if (e.target === guideEl) closeGuide();
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') closeGuide();
  });

  // ── Channel boot sequence ──────────────────────────────────────
  //
  // The user lands on a black surface with a centered play button.
  // The intro video is preloaded (preload="auto") and the mux-
  // video is preloading too — neither plays yet. Nothing requires
  // a gesture-gated permission at this stage.
  //
  // On click (anywhere on the intro overlay):
  //   (1) enterFullscreen() — within the gesture, so it sticks.
  //   (2) Intro plays WITH sound: the gesture authorizes autoplay-
  //       with-sound deterministically (no Media-Engagement-Index
  //       guessing), so first-visit users get audio reliably.
  //   (3) Movie audio gate opens (mv.muted=false, mv.volume=0 to
  //       hold silent until intro ends without losing the gesture
  //       authorization for subsequent volume changes).
  //   (4) Movie seeks to the live wall-clock offset and plays
  //       silently behind the intro overlay.
  //
  // On intro.ended:
  //   (5) Movie volume ramps to 0.65 (slightly above average).
  //   (6) applyState() reveals the right channel surface.
  //   (7) Overlay fades over 600ms and is removed from the DOM.
  //
  // Safety net: 8s after activation, finish() is called even if
  // the intro never fires `ended` (codec / network failure).

  function startMovieAtLive(){
    const info = getSlotInfo();
    if (!info.offAir && info.inShow) {
      try { mv.currentTime = info.tInShow; } catch (_) {}
    }
    const p = mv.play();
    if (p && p.catch) p.catch(function(){
      const once = function(){
        mv.removeEventListener('canplay', once);
        mv.play().catch(function(){});
      };
      mv.addEventListener('canplay', once);
    });
  }

  let userActivated     = false;
  let finished          = false;
  let guideRevealTimer  = 0; // set in bootstrap; cleared in activate

  function activate(e){
    if (userActivated) return;
    userActivated = true;

    // The cold-start ticker is done now; we're past the badge.
    if (typeof stopColdStartTicker === 'function') stopColdStartTicker();

    // Stop the cold-start noise — the intro video covers it now.
    if (introNoise) introNoise.stop();

    // Cancel the pending GUIDE-pill reveal (it would otherwise fire
    // mid-intro-flourish) and hide it if it has already faded in.
    // The pill will come back when the channel goes live (finish()).
    if (guideRevealTimer) { clearTimeout(guideRevealTimer); guideRevealTimer = 0; }
    guideBtn.classList.remove('show');

    // (1) Fullscreen — gesture-required, sync inside the click.
    enterFullscreen();

    // (2) Intro WITH sound — gesture authorizes autoplay-with-sound.
    introVideo.muted = false;
    introVideo.volume = 0.85;
    const ip = introVideo.play();
    if (ip && ip.catch) ip.catch(finish); // codec/network → skip to finish

    // (3) Movie audio gate opens. Held silent at volume:0 until
    //     intro.ended, then ramped to 0.65 in finish(). Setting
    //     muted=false inside the gesture preserves "unmuted with
    //     volume control" for subsequent state changes.
    mv.muted = false;
    mv.volume = 0;

    // (4) Seek + play movie silently at the live wall-clock offset.
    startMovieAtLive();

    intro.classList.add('activated');
    // Arm the safety net once we're actually committed.
    setTimeout(finish, 8000);
  }
  function onActivateKey(e){
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      activate(e);
    }
  }

  function finish(){
    if (finished) return;
    if (!userActivated) return; // shouldn't be reachable; defensive
    finished = true;

    // Movie volume ramps to listening level. 0.65 = slightly above
    // average; user adjusts via device controls from there.
    mv.volume = 0.65;

    applyState();
    // Channel is live → restore the GUIDE pill (it was hidden when
    // PUSH PLAY fired to keep the intro flourish clean). It then
    // stays visible through ON AIR, between-show interludes, and
    // OFF AIR — never re-hidden after this point.
    guideBtn.classList.add('show');
    channelLive = true;
    syncFsIcon();
    pingControls();

    intro.classList.add('done');
    setTimeout(function(){
      if (intro.parentNode) intro.parentNode.removeChild(intro);
    }, 700);
  }

  // ── Orientation-aware asset selection ────────────────────────────
  //
  // The channel ships two playback IDs for the same content + same
  // duration:
  //   - Horizontal 12:5 cinema cut         → landscape viewports
  //   - Vertical 9:16 reframe              → portrait viewports
  //
  // Detection via `matchMedia('(orientation: portrait)')`. When the
  // user rotates their device, the matchMedia listener fires; we
  // swap mv.src to the orientation-appropriate manifest, wait for
  // canplay on the new source, then snap currentTime to the live
  // wall-clock position (computed AT canplay time, not at swap
  // time, so any time spent loading is accounted for). Mute / volume
  // / play state are captured before the swap and restored after,
  // so the audio doesn't reset and a playing channel keeps playing.
  //
  // If the user rotates twice quickly, the in-flight canplay handler
  // from the first swap is unregistered before attaching the new
  // one — no handler stacking, no double-seek.
  const HORIZONTAL_PB_ID = 'Apdb9mHDmGuMt00AVKNNVx6VZEXw7602eYCcTPJIFtpVE';
  const VERTICAL_PB_ID   = 'wdN5SRMPQ3Ql8L02Cpl5Fah5L3u00lqhY13EXcSP5x02AU';
  const muxHlsSrc = function(id){
    return 'https://stream.mux.com/' + id +
           '.m3u8?rendition_order=desc&max_resolution_tier=1080p';
  };
  const portraitMQ = window.matchMedia('(orientation: portrait)');
  let currentPbId = null;
  let pendingCanplay = null;

  function applyOrientationAsset(){
    const want = portraitMQ.matches ? VERTICAL_PB_ID : HORIZONTAL_PB_ID;
    if (currentPbId === want) return;

    // Snapshot state to restore after the source-swap reload.
    const wasPlaying = userActivated && !mv.paused && !mv.ended;
    const prevMuted  = mv.muted;
    const prevVolume = mv.volume;

    // Cancel any prior canplay handler still waiting (rapid double-
    // rotate races would otherwise stack handlers).
    if (pendingCanplay) {
      mv.removeEventListener('canplay', pendingCanplay);
      pendingCanplay = null;
    }

    currentPbId = want;
    mv.src = muxHlsSrc(want);

    // Wait for the new source to be playable, then re-sync to the
    // live wall-clock position and restore prior audio + play state.
    pendingCanplay = function onReady(){
      mv.removeEventListener('canplay', pendingCanplay);
      pendingCanplay = null;
      // Setting src on a video resets some state on the underlying
      // <video> element; re-apply the bits we care about.
      mv.muted  = prevMuted;
      mv.volume = prevVolume;
      const live = getSlotInfo();
      if (!live.offAir && live.inShow) {
        try { mv.currentTime = live.tInShow; } catch (_) {}
      }
      if (wasPlaying) {
        const p = mv.play();
        if (p && p.catch) p.catch(function(){});
      }
    };
    mv.addEventListener('canplay', pendingCanplay);
  }

  // Initial selection (sets mv.src before the user can even click
  // PUSH PLAY, so preload="auto" starts buffering immediately).
  applyOrientationAsset();
  // React to rotation. addEventListener('change',...) on the
  // MediaQueryList is the modern API; supported everywhere we care.
  if (portraitMQ.addEventListener) {
    portraitMQ.addEventListener('change', applyOrientationAsset);
  } else if (portraitMQ.addListener) {
    // Safari <14 fallback (deprecated but functional)
    portraitMQ.addListener(applyOrientationAsset);
  }

  syncFsIcon();

  // The ONLY click target that activates the channel is the
  // PUSH PLAY button. Native <button> handles Enter / Space /
  // touch tap for free. Clicks elsewhere on the cold-start screen
  // do nothing (cursor is default on the snow, pointer on the
  // button — clear affordance).
  const playButton = document.getElementById('playButton');
  if (playButton) playButton.addEventListener('click', activate);

  // ── Cold-start CTA state ─────────────────────────────────────────
  // The badge speaks three different states based on the wall-clock
  // channel state, computed once per second until the user activates:
  //
  //   on-air         → "ON AIR · PUSH PLAY"      + red pulse + play
  //                    icon + clickable
  //   between shows  → "OFF AIR · BACK IN mm:ss" + gray dot   + no
  //                    play icon + disabled
  //   off-hours      → "OFF AIR · BACK AT 9:00 AM" (viewer's local
  //                    time of the next 6 AM PT) + gray dot + no
  //                    icon + disabled
  //
  // When the timer hits 0 the state machine fires and the badge
  // flips to "ON AIR · PUSH PLAY" without any page reload.
  const ctaLabel = playButton && playButton.querySelector('.live-label');
  const ctaIcon  = playButton && playButton.querySelector('.play-icon');
  let coldStartTick = 0;
  function updateColdStartCTA(){
    if (!playButton || userActivated) return;
    const info = getSlotInfo();
    if (info.offAir) {
      const t = new Date(info.nextOnAir);
      // fmtSlot for single-letter A/P consistency with the guide.
      ctaLabel.textContent =
        'OFF AIR · BACK AT ' + fmtSlot(t).toUpperCase();
      playButton.classList.add('off-air');
      playButton.disabled = true;
    } else if (info.inShow) {
      ctaLabel.textContent = 'ON AIR · PUSH PLAY';
      playButton.classList.remove('off-air');
      playButton.disabled = false;
    } else {
      const secs = Math.max(0, Math.ceil((info.nextSlotStart - Date.now()) / 1000));
      const mm = String(Math.floor(secs / 60)).padStart(2, '0');
      const ss = String(secs % 60).padStart(2, '0');
      ctaLabel.textContent = 'OFF AIR · BACK IN ' + mm + ':' + ss;
      playButton.classList.add('off-air');
      playButton.disabled = true;
    }
  }
  function startColdStartTicker(){
    if (coldStartTick) clearInterval(coldStartTick);
    updateColdStartCTA();
    coldStartTick = setInterval(updateColdStartCTA, 1000);
  }
  function stopColdStartTicker(){
    if (coldStartTick) { clearInterval(coldStartTick); coldStartTick = 0; }
  }
  startColdStartTicker();

  // GUIDE pill reveal during cold-start. Timing depends on the
  // channel state at page load:
  //
  //   ON AIR (active program): the IV logo + PUSH PLAY badge finish
  //   their entrance animations by ~3s; wait another 3s for the user
  //   to absorb the brand moment, then fade the GUIDE pill in
  //   (~6s total). PUSH PLAY is the visible CTA — GUIDE is a quiet
  //   secondary affordance that shouldn't crowd the brand reveal.
  //
  //   OFF AIR (between shows / outside hours): there's nothing for
  //   the viewer to do but check the schedule, so the GUIDE pill
  //   appears together with everything else (~3s, settling alongside
  //   the badge). It stays visible the entire wait — no one should
  //   miss the schedule while the channel is dark.
  //
  // activate() clears this timer if the user clicks PUSH PLAY first.
  // finish() re-adds `.show` after the channel goes live.
  const coldStartInfo = getSlotInfo();
  const isOnAirAtLoad = !coldStartInfo.offAir && coldStartInfo.inShow;
  const REVEAL_DELAY_MS = isOnAirAtLoad ? 6000 : 3000;
  guideRevealTimer = setTimeout(function(){
    if (!userActivated) guideBtn.classList.add('show');
    guideRevealTimer = 0;
  }, REVEAL_DELAY_MS);

  // Watermark idle-reveal: first-visit discovery ping so the FS hint
  // appears briefly under the cursor before fading out. The watermark
  // is the only chrome that participates in idle-fade now.
  pingControls();

  introVideo.addEventListener('ended', finish);
  introVideo.addEventListener('error', finish);
});
</script>
