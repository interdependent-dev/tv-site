<!-- Browser-chrome theming. The address bar / status bar / tab
     surround can't be removed in mobile Safari, Chrome, Firefox, etc.,
     but each respects a `theme-color` hint and paints the chrome to
     match. Explicit media variants force the same #000000 regardless
     of OS theme so the chrome never flips white on a light-mode
     device. Coverage:
       Safari iOS 15+         → top URL bar
       Chrome Android         → URL bar + status bar
       Firefox Android        → status bar
       Edge Android / Brave   → URL bar
       Safari macOS 15+       → window toolbar
       Edge desktop (PWA)     → title bar
     The two `apple-mobile-web-app-*` tags only kick in when the page
     is "Add to Home Screen"-installed; `black-translucent` lets the
     status bar overlay the canvas. The `msapplication-TileColor` is
     legacy Windows pin-tile support — harmless on modern browsers. -->
<meta name="theme-color" content="#000000">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="msapplication-TileColor" content="#000000">
<meta name="msapplication-navbutton-color" content="#000000">
<meta name="format-detection" content="telephone=no">

<meta property="og:description" content="INTERDEPENDENT TV">

<!-- ── Video.js v10 (beta) ──────────────────────────────────────────
     v10 is a full rewrite published under a new package, @videojs/html,
     organized as web components. The main bundle registers the
     <video-player> state store (used even without a UI, so the skin can
     be slotted back in trivially). The mux-video media element is a
     separate module — it wraps Mux's delivery stack so playback-id /
     stream-type / rendition-order / max-resolution become native
     attributes.

     Pinned to an exact beta because the API is still evolving; bump
     deliberately when you want to track upstream.
-->

<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html@10.0.0-beta.23/cdn/media/mux-video.js"></script>

<style>
/* ── Eurostile Next Pro ──────────────────────────────────────────────
   Embedded TTF (Adobe-licensed, user-supplied via the project's
   approved font collection). Two weights for body + one wide-bold
   cut for the masthead. Browsers handle TTF natively for @font-face;
   sacrificing ~30% over woff2 for build-step simplicity. */
@font-face{
  font-family:"Eurostile";
  src:url("fonts/EurostileNextPro-Regular.ttf") format("truetype");
  font-weight:400;font-style:normal;font-display:swap;
}
@font-face{
  font-family:"Eurostile";
  src:url("fonts/EurostileNextPro-Bold.ttf") format("truetype");
  font-weight:700;font-style:normal;font-display:swap;
}
@font-face{
  font-family:"Eurostile Wide";
  src:url("fonts/EurostileNextPro-WideBold.ttf") format("truetype");
  font-weight:700;font-style:normal;font-display:swap;
}

*{margin:0;box-sizing:border-box}
html,body{
  height:100%;width:100%;
  background:#000;color:#fff;
  font-family:"Eurostile",-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;
  /* `overscroll-behavior: none` on html+body kills the iOS Safari
     rubber-band effect that lets a swipe inside the guide pull
     the whole page down past its top edge. Pairs with the
     overscroll-behavior:contain on `.guide-grid-wrap`. */
  overscroll-behavior:none;
}

/* Shared positioning vars for the bottom-corner chrome — the IV
   watermark (bottom-right) and the GUIDE pill (bottom-left). The
   two should be symmetric: same distance from their respective
   screen edges (--chrome-edge), and the GUIDE pill is lifted so
   its vertical center aligns with the watermark's vertical center
   (computed from --watermark-h and --guide-pill-h). Mobile
   variants override --watermark-w / --chrome-edge below.
   The watermark IV-with-".tv" SVG uses viewBox 394×238, so the
   rendered height is width × (238/394) ≈ width × 0.604. Plain CSS
   tracks the aspect — no JS needed. */
:root{
  --chrome-edge:clamp(12px,3vw,40px);
  --chrome-bottom:clamp(12px,3vh,32px);
  --watermark-w:min(20vw,120px);
  --watermark-h:calc(var(--watermark-w) * 0.6041);
  --guide-pill-h:33px;
}
@media (max-width:480px) and (orientation:portrait){
  :root{
    --chrome-edge:14px;
    --chrome-bottom:16px;
    --watermark-w:min(26vw,72px);
  }
}
@media (max-height:480px) and (orientation:landscape){
  :root{
    --chrome-edge:12px;
    --chrome-bottom:10px;
    --watermark-w:min(14vh,64px);
  }
}

/* Chrome-less full-bleed playback. <media-container> is the v10
   interaction surface — it provides the mediaContext that <mux-video>
   needs to actually render. We give it no UI children (no controls,
   no poster, no buffering indicator), so all that draws is the video
   itself. 12:5 asset letterboxes via object-fit:contain on any aspect. */
media-container{
  display:block;
  position:fixed;inset:0;
  width:100vw;height:100vh;
  height:100dvh; /* dvh tracks the live visible viewport — when
                    iOS Safari/Chrome retracts its URL bar, the
                    media surface grows to fill the new area
                    without us needing a Fullscreen API call. */
  background:#000;
}
mux-video{
  display:block;
  width:100%;height:100%;
  object-fit:contain;
  background:#000;
}

/* ── Intro overlay ────────────────────────────────────────────────
   Black backdrop with a centered play button. Click anywhere on
   the overlay fires the user-gesture activation: fullscreen, audio
   gate open, intro plays WITH sound (gesture authorizes autoplay-
   with-sound, no MEI lottery), mux-video seeks to the live offset
   and plays silently behind. When intro.ended fires, the overlay
   fades and the channel is revealed mid-show, audible. */
.intro{
  position:fixed;inset:0;z-index:20;
  height:100vh;
  height:100dvh;
  background:#000;
  display:grid;place-items:center;
  /* Default cursor on the snow; the PUSH PLAY button has its own
     pointer cursor as the only click target. Clicks elsewhere on
     the cold-start screen are intentionally inert. */
  cursor:default;
  user-select:none;-webkit-user-select:none;
  transition:opacity .6s ease;
  overflow:hidden;
}
.intro.done{opacity:0;pointer-events:none}

/* Pre-rendered intro animation. Hidden pre-click (opacity:0) so it
   doesn't paint its solid black background over the snow canvas;
   the canvas + vignette + IV logo + PUSH PLAY badge all need to
   show through. On .activated, fades in over 350ms to take the
   screen for the catalyst animation. object-fit:contain so the
   16:9 source letterboxes gracefully on any aspect ratio. */
.intro-video{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:contain;
  background:#000;
  pointer-events:none;
  opacity:0;
  transition:opacity .35s ease;
}
.intro.activated .intro-video{opacity:1}

/* V1 cold-start snow — half-res canvas of *60 greyscale noise. No
   opacity override here so it renders at native brightness; the
   *60 baked into the renderer is the only dimming, matching V1
   verbatim and matching the interlude canvas. */
.intro-noise{
  position:absolute;inset:0;z-index:0;
  width:100%;height:100%;
  image-rendering:pixelated;
  pointer-events:none;
}
.intro-vignette{
  position:absolute;inset:0;z-index:1;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.7) 100%);
  pointer-events:none;
}

/* Centered IV logo — identical to the between-show interlude. */
.intro-logo{
  position:absolute;inset:0;z-index:2;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.intro-logo svg{
  width:min(45vw,420px);height:auto;
  opacity:0;
  filter:drop-shadow(0 0 30px rgba(255,255,255,.15));
  animation:intro-fade-in 2.5s ease-in forwards .3s;
}
@keyframes intro-fade-in{ to{opacity:.6} }

/* ── Shared "LIVE" badge (top-right pulsing red dot + label) ─────
   Used on both #intro (label is a play-icon button) and #static
   (label is the "LIVE IN mm:ss" countdown). Matches the V1 PLAY
   badge geometry: gap 10px, top/right safe-area-aware insets. */
.live-badge{
  position:absolute;z-index:3;
  top:max(env(safe-area-inset-top,0px), clamp(20px,4vh,40px));
  right:max(env(safe-area-inset-right,0px), clamp(20px,4vw,48px));
  display:flex;align-items:center;gap:10px;
  opacity:0;
  animation:intro-fade-in 2s ease-in forwards 1s;
}
.live-dot{
  width:14px;height:14px;border-radius:50%;
  background:#ff0000;
  box-shadow:0 0 12px rgba(255,0,0,.7);
  /* Pulse via SCALE not opacity — the brand red (#ff0000) must
     stay pure red throughout the animation. The dot breathes in
     and out around its center; transform-origin defaults to
     center anyway. Glow scales with it so the halo still throbs. */
  animation:live-dot-pulse 2s ease-in-out infinite;
}
@keyframes live-dot-pulse{
  0%,100%{transform:scale(1)}
  50%    {transform:scale(.55)}
}

/* Cold-start CTA — pill-shaped button that announces channel state.
   Three modes:
     on-air         → "ON AIR · PUSH PLAY" + red pulsing dot + play
                      icon + clickable
     between shows  → "OFF AIR · BACK IN mm:ss" + gray steady dot +
                      no play icon + disabled
     off-hours      → "OFF AIR · BACK AT 9:00 AM" + gray steady dot +
                      no play icon + disabled
   Shares the .live-badge positioning + .live-dot pulse with the
   interlude. */
.intro-cta{
  appearance:none;background:transparent;border:none;
  color:#fff;cursor:pointer;
  padding:6px 4px 6px 0;
  font-family:inherit;
}
.intro-cta .play-icon{
  width:clamp(18px,2.2vw,24px);height:auto;display:block;
  margin-left:4px;
  filter:drop-shadow(0 0 8px rgba(255,255,255,.2));
  transition:transform .15s ease, filter .15s ease;
}
.intro-cta:hover .play-icon,
.intro-cta:focus-visible .play-icon{
  transform:scale(1.15);
  filter:drop-shadow(0 0 10px rgba(255,255,255,.6));
}
.intro-cta:hover .live-label,
.intro-cta:focus-visible .live-label{
  text-shadow:0 0 12px rgba(255,255,255,.45), 0 0 12px rgba(0,0,0,.8);
}
.intro-cta:focus-visible{outline:none}

/* Off-air variant: gray steady dot, no play icon, no hover-grow,
   default cursor, no interactive shimmer on hover. The button is
   also `disabled` via JS so clicks don't bubble. */
.intro-cta.off-air{cursor:default}
.intro-cta.off-air .play-icon{display:none}
.intro-cta.off-air .live-dot{
  background:rgba(255,255,255,.5);
  animation:none;
  box-shadow:0 0 8px rgba(255,255,255,.15);
}
.intro-cta.off-air:hover .live-label,
.intro-cta.off-air:focus-visible .live-label,
.intro-cta.off-air:hover .play-icon,
.intro-cta.off-air:focus-visible .play-icon{
  text-shadow:none;transform:none;filter:none;
}
.intro-cta:disabled{cursor:default}

/* The interlude badge is always "off-air" by definition — gray
   dot, no pulse — to match the cold-start off-air state. */
.static-cta .live-dot{
  background:rgba(255,255,255,.5);
  animation:none;
  box-shadow:0 0 8px rgba(255,255,255,.15);
}

/* Activated → fade out the centerpiece logo + the cta badge so
   the intro video has the screen to itself. */
.intro.activated{cursor:default}
.intro.activated .intro-logo,
.intro.activated .intro-cta{
  animation:intro-out .35s ease forwards;
  pointer-events:none;
}
@keyframes intro-out{
  to{opacity:0}
}
@media (prefers-reduced-motion:reduce){
  .intro-logo svg,
  .live-badge{animation:intro-fade-in 1.2s ease-in forwards .2s}
  .intro.activated .intro-logo,
  .intro.activated .intro-cta{animation:none;opacity:0}
}

/* Watermark — bottom-right. Now a <button> doubling as the
   "enter fullscreen" CTA: the big white disc inside the IV mark
   carries a subtle corner-brackets icon (`.logo-fs-icon`) that
   shows the action; clicking the watermark toggles fullscreen.
   z-index 21 so it paints above the intro overlay (z:20) and is
   visible from page load. max() against safe-area-inset so it
   doesn't slide under the iPhone home indicator or notch. */
.logo{
  position:fixed;
  bottom:max(env(safe-area-inset-bottom,0px), var(--chrome-bottom));
  right:max(env(safe-area-inset-right,0px), var(--chrome-edge));
  z-index:21;
  /* Button reset */
  appearance:none;background:transparent;border:none;padding:0;
  /* Pointer-events only when the watermark is visible (.show) AND
     fullscreen is supported (set via the no-fs JS feature gate). */
  pointer-events:none;
  cursor:pointer;
  display:block;
  line-height:0; /* eat any inline-baseline gap under the SVG */
}
.logo.show{pointer-events:auto}
/* No outline ring — a 2px white halo around the whole watermark
   read as a visual bug, especially when ESC returned focus from
   fullscreen and triggered :focus-visible. Replaced with a subtle
   inner glow on just the FS icon below. */
.logo:focus{outline:none}
.logo:focus-visible .logo-fs-icon{
  filter:drop-shadow(0 0 5px rgba(255,255,255,.85));
}

.logo svg{
  width:var(--watermark-w);height:auto;
  opacity:0;
  filter:drop-shadow(0 0 16px rgba(255,255,255,.3));
  transition:opacity .4s ease;
  display:block;
}
.logo.show svg{opacity:.7}

/* Fullscreen-enter icon overlaid inside the big white disc. Stroke
   stays in viewBox units (8 of 394) so it scales naturally with
   the watermark. ~50% black by default for a subtle hint;
   brightens to fully opaque on hover/focus. No transform-based
   animation — the icon group already carries an SVG transform
   attribute (translate to the disc center), and a CSS `transform`
   override would replace it, yanking the icon off its position. */
.logo-fs-icon{
  opacity:.5;
  transition:opacity .12s ease;
}
.logo:hover .logo-fs-icon,
.logo:focus-visible .logo-fs-icon{
  opacity:1;
}

/* Instant tooltip pill — same chrome as the GUIDE / cold-start
   pills (Eurostile, blurred bg, white outline, uppercase letter-
   spacing). Lives inside the .logo button, positioned above-left
   so it never overflows the viewport even when the watermark sits
   tight to the corner. Hover-driven only (touch devices skip the
   tooltip and just toggle FS on tap). */
.logo-tip{
  position:absolute;
  bottom:calc(100% + 8px);
  right:0;
  white-space:nowrap;
  font:700 11px/1 "Eurostile",sans-serif;
  letter-spacing:.22em;text-transform:uppercase;
  color:#fff;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.3);
  border-radius:999px;
  padding:7px 12px 6px;
  opacity:0;
  pointer-events:none;
  transition:opacity .12s ease;
}
.logo:hover .logo-tip,
.logo:focus-visible .logo-tip{opacity:1}

/* In fullscreen mode → hide the icon entirely. Logo reverts to its
   clean decorative form ("you've entered"). Class is added on
   `fullscreenchange` by JS. Tooltip is also suppressed since the
   click would be inert (cursor is default there). */
body.in-fs .logo-fs-icon,
body.in-fs .logo-tip{visibility:hidden}
body.in-fs .logo{cursor:default}
/* Platforms without Fullscreen API support (iOS Safari / iPhone
   Chrome) — keep the watermark non-interactive and hide the icon
   and tooltip so there's no dead affordance. JS adds `.no-fs` to
   <body> when document.documentElement.requestFullscreen is
   undefined. */
body.no-fs .logo-fs-icon,
body.no-fs .logo-tip{display:none}
body.no-fs .logo{cursor:default}
body.no-fs .logo.show{pointer-events:none}

/* (Mobile portrait/landscape watermark sizes are driven by the
   :root vars above — --watermark-w + --chrome-bottom + --chrome-edge.
   Per-media-query overrides are no longer needed here.) */

/* ─────────────────────────────────────────────────────────────────────
   ── LINEAR CHANNEL UX ────────────────────────────────────────────────
   ─────────────────────────────────────────────────────────────────────
   The site is a deterministic linear channel: every 15 minutes a new
   slot starts (00 / 15 / 30 / 45 past the hour) between 11:00–23:00
   local time. Each slot = 12:14 of Tears of Steel + 2:46 of static.
   Every viewer worldwide computes the same in-slot position from
   their wall clock, so the channel is "live" without a server.

   Three full-bleed states sit on top of the mux-video and toggle via
   JS visibility:
     1. movie       (default — the mux-video shows through)
     2. #static     (the 2:46 "no signal" interlude between slots)
     3. #offair     (outside channel hours, 23:00–11:00)

   A fourth overlay, #guide, slides in when the user hits the GUIDE
   button bottom-left. None of these affect playback timing — the
   mux-video keeps playing whether or not it's visible. */

/* ── Between-show interlude ───────────────────────────────────────
   Same V1 cold-start identity as the page-load screen: dim CRT
   snow + radial vignette + a big centered IV logo (~60% opacity,
   subtle white drop-shadow). Top-right carries a "LIVE IN mm:ss"
   countdown to the next slot with a pulsing red dot — the brand
   "you're still on this channel" signal. No scan lines, no NO
   SIGNAL wordmark — the logo is the message. */
#static{
  position:fixed;inset:0;z-index:15;
  background:#000;
  display:none;
}
#static.on{display:block}
#static canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  image-rendering:pixelated;
  /* Native opacity — *60 in the renderer does the dimming; this
     matches the cold-start canvas exactly so the brand identity
     reads the same across both screens. */
}
.static-vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.7) 100%);
  pointer-events:none;z-index:1;
}
.static-logo{
  position:absolute;inset:0;z-index:2;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.static-logo svg{
  width:min(45vw,420px);height:auto;
  opacity:0;
  filter:drop-shadow(0 0 30px rgba(255,255,255,.15));
  animation:static-fade-in 2.5s ease-in forwards .3s;
}
@keyframes static-fade-in{ to{opacity:.6} }

/* The static interlude uses the shared .live-badge slot (defined
   above) with a text label instead of the play-icon button. */
.live-label{
  font:700 clamp(14px,2.2vw,22px)/1 "Eurostile","Eurostile Wide",sans-serif;
  color:#fff;letter-spacing:.18em;text-transform:uppercase;
  text-shadow:0 0 12px rgba(0,0,0,.8);
  /* Tabular numerals + matching feature setting so the digits in
     the countdown ("OFF AIR · BACK IN 02:34") are equal-width and
     the label doesn't jitter horizontally as the seconds tick. */
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum";
}

/* ── "OFF AIR" screen (outside 11:00–23:00 local) ────────────────── */
#offair{
  position:fixed;inset:0;z-index:14;
  background:#000;
  display:none;
  flex-direction:column;
  align-items:center;justify-content:center;
  gap:18px;
}
#offair.on{display:flex}
#offair .offair-title{
  font-family:"Eurostile Wide","Eurostile",sans-serif;
  font-weight:700;letter-spacing:.4em;
  font-size:clamp(28px,5vw,56px);
}
#offair .offair-sub{
  font-family:"Eurostile",sans-serif;
  font-weight:400;letter-spacing:.25em;
  font-size:clamp(11px,1.4vw,13px);
  text-transform:uppercase;opacity:.6;
}

/* ── GUIDE button (toggle pill, bottom-left) ─────────────────────────
   Timing:
   1. Page load: hidden (opacity 0). Cold-start IV logo + ON/OFF AIR
      badge animate in alone — clean brand moment.
   2. ~8s after load: fades in. (Logo + badge animations settle by
      ~3s; the 5s pause gives the user time to read the badge before
      a second affordance appears.)
   3. PUSH PLAY clicked: fades back out. The intro flourish should
      not have a corner pill competing with it.
   4. Channel-live (`finish()`): fades back in. Stays put through
      ON AIR, between-show interludes, OFF AIR — the schedule is
      always one tap away, on mobile and desktop alike.
   Watermark / FS toggle is the only chrome that does idle-fading. */
#guide-button{
  position:fixed;
  /* Symmetric placement with the watermark:
       - LEFT  = watermark's RIGHT (--chrome-edge)
       - BOTTOM lifted so the pill's vertical center aligns with
         the watermark's vertical center. Watermark height is
         intrinsic-aspect × current width; subtract the pill's
         own height and split the remainder in half. */
  bottom:calc(
    max(env(safe-area-inset-bottom,0px), var(--chrome-bottom))
    + (var(--watermark-h) - var(--guide-pill-h)) / 2
  );
  left:max(env(safe-area-inset-left,0px), var(--chrome-edge));
  z-index:21; /* above intro (z:20), below guide (z:25) */
  appearance:none;border:1px solid rgba(255,255,255,.35);
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:#fff;cursor:pointer;
  font:700 12px/1 "Eurostile",sans-serif;
  letter-spacing:.32em;text-transform:uppercase;
  padding:11px 18px 10px;border-radius:999px;
  opacity:0;
  transition:opacity 1s ease, background .15s ease, border-color .15s ease;
}
#guide-button.show{opacity:1}
/* Hover style gated to real-pointer devices so it doesn't stick
   on touch and turn the first tap into a no-op. */
@media (hover: hover){
  #guide-button:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.8)}
}
#guide-button:focus{outline:none}
/* Drop the browser default focus ring (often a blue halo) — ESC-
   close lands focus back on the pill and the halo would linger. */
#guide-button:focus-visible{outline:none;box-shadow:0 0 0 2px rgba(255,255,255,.25)}

/* (FS toggle now lives inside the IV watermark as the big white
   disc's interior — see `.logo` + `.logo-fs-icon` rules below.
   ESC handles fullscreen exit via the browser's native UI.) */

/* (Mute/unmute button removed — users control audio via their
   device volume; the channel starts at a slightly above-average
   volume of 0.65 once the user activates the first click.) */

/* ── TV GUIDE overlay ─────────────────────────────────────────────
   White gridlines on near-black, retro cable-EPG layout. Masthead +
   live clock at top; 7-day × 5-slot grid; description strip at
   bottom. Slides in via opacity + tiny translate. */
#guide{
  position:fixed;inset:0;z-index:25;
  /* Mostly-opaque dark veil + heavy backdrop blur. The live channel
     keeps playing behind the guide but is softened to a quiet hint
     so the schedule reads as the focus, not a busy backdrop. No
     blue gradient — off-brand. Only accent colors are white
     (chrome) + red (today / now). */
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(40px) saturate(.5);
  -webkit-backdrop-filter:blur(40px) saturate(.5);
  display:none;
  flex-direction:column;
  padding:clamp(16px,3.5vh,32px) clamp(16px,3vw,40px);
  opacity:0;transform:translateY(8px);
  transition:opacity .35s ease, transform .35s ease;
  overflow:hidden;
  font-family:"Eurostile",sans-serif;
}
#guide.on{display:flex;opacity:1;transform:translateY(0)}

.guide-mast{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:clamp(8px,1.4vh,14px);
  border-bottom:1px solid rgba(255,255,255,.5);
  gap:16px;flex-wrap:wrap;
}
/* Masthead IV mark — pure brand decoration. The back-to-TV action
   lives in the dedicated `.guide-back` button to the right of the
   mark (Netflix-style); the logo is no longer interactive here. */
.guide-logo{
  display:flex;align-items:center;
  line-height:0; /* eat any inline-baseline gap under the SVG */
}
.guide-logo svg{
  width:clamp(110px,12vw,160px);
  height:auto;display:block;
  filter:drop-shadow(0 0 18px rgba(180,200,255,.18));
}
@media (max-width:640px){
  .guide-logo svg{width:clamp(70px,16vw,96px)}
}
/* Mobile landscape — viewport height is the constraint. Shrink the
   masthead aggressively so the schedule grid gets at least three
   rows above the description strip. Triggered by short viewports
   regardless of pointer type. */
@media (orientation:landscape) and (max-height:500px){
  .guide-logo svg{width:clamp(56px,10vh,72px)}
}

/* Back-to-TV button — TV Guide booklet aesthetic. Pill outline,
   uppercase Eurostile, wide letter-spacing — same wordmark
   language as the GUIDE pill in the bottom corner. The full
   broadcast phrasing on desktop ("BACK TO OUR REGULARLY SCHEDULED
   PROGRAMMING") fits comfortably; on small viewports a shorter
   "BACK TO PROGRAMMING" stand-in keeps the button readable. */
.guide-back{
  appearance:none;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.4);
  color:#fff;cursor:pointer;
  font:700 11px/1.1 "Eurostile",sans-serif;
  letter-spacing:.24em;text-transform:uppercase;
  padding:10px 18px 9px;border-radius:999px;
  white-space:nowrap;
  flex-shrink:1; /* allow shrinking on tight viewports before wrap */
  transition:background .15s ease, border-color .15s ease, transform .15s ease;
}
.guide-back:focus{outline:none}
/* Hover styles ONLY on devices with a real pointer (mouse) — on
   touch devices :hover becomes sticky after the first tap (because
   there's no hoverout), which causes the first tap to apply the
   "hover" visual state and the second tap to actually fire click.
   Gating with (hover: hover) eliminates the double-tap problem. */
@media (hover: hover){
  .guide-back:hover{
    background:rgba(255,255,255,.12);
    border-color:#fff;
    transform:scale(1.03);
  }
}
.guide-back:focus-visible{
  background:rgba(255,255,255,.12);
  border-color:#fff;
  transform:scale(1.03);
  box-shadow:0 0 0 2px rgba(255,255,255,.25);
}
/* Two label spans — the long one for roomy viewports, the short
   one for phones. Pure CSS swap, no JS. */
.guide-back-long  {display:inline}
.guide-back-short {display:none}
@media (max-width:900px){
  .guide-back{font-size:10px;letter-spacing:.18em;padding:8px 14px 7px}
  .guide-back-long  {display:none}
  .guide-back-short {display:inline}
}
@media (max-width:380px){
  .guide-back{font-size:9px;letter-spacing:.14em;padding:7px 11px 6px}
}
@media (orientation:landscape) and (max-height:500px){
  .guide-back{padding:6px 12px 5px;font-size:9px;letter-spacing:.18em}
}

/* The masthead left group — IV mark + GUIDE wordmark + back
   button stay together, the clock floats off to the right via
   flex auto-margin. */
.guide-mast-left{
  display:flex;align-items:center;
  gap:clamp(14px,2.5vw,28px);
  flex-wrap:wrap;
}
@media (orientation:landscape) and (max-height:500px){
  /* Landscape phones — viewport is wide-but-short. Bump the
     inter-element gap so the IV mark, GUIDE wordmark, and back-
     to-programming pill have room to breathe rather than crowding
     each other at the top edge. */
  .guide-mast-left{gap:18px}
}

/* TV GUIDE wordmark — callback to the original red-bar TV Guide
   booklet logo. Tight Eurostile Wide caps, faint red underline
   echoes the iconic cover treatment without copying it. */
.guide-wordmark{
  display:flex;flex-direction:column;align-items:flex-start;
  line-height:1;
  flex-shrink:0;
}
.guide-wordmark span{
  font-family:"Eurostile Wide","Eurostile",sans-serif;
  font-weight:700;
  font-size:clamp(11px,1.1vw,13px);
  letter-spacing:.32em;
  text-transform:uppercase;
  color:rgba(255,255,255,.95);
  padding-bottom:5px;
  border-bottom:2px solid #ff0000;
}
@media (orientation:landscape) and (max-height:500px){
  .guide-wordmark span{font-size:10px;letter-spacing:.22em;padding-bottom:3px;border-bottom-width:1.5px}
}
@media (max-width:640px){
  .guide-wordmark span{font-size:10px;letter-spacing:.22em;padding-bottom:3px}
}

/* (The masthead's "Back to TV" tooltip moved onto the dedicated
   `.guide-back` button — see `.guide-back-tip` above.) */

/* Day · Date · Time on one line — wire-service ticker layout.
   Each segment carries its own letter-spacing; a thin · separator
   sits between them via the gap. Aligned to the right edge of the
   masthead so it baselines with the bottom of the IV mark on tall
   viewports and centers cleanly on short ones. */
.guide-clock{
  display:flex;flex-direction:row;align-items:baseline;
  gap:14px;flex-wrap:nowrap;
  font-family:"Eurostile",sans-serif;
  text-align:right;
}
.guide-clock > *{position:relative}
.guide-clock > *:not(:last-child)::after{
  content:"·";
  position:absolute;
  right:-10px;top:0;
  opacity:.4;
  pointer-events:none;
}
.guide-clock .day{
  font-weight:700;
  font-size:clamp(12px,1.2vw,14px);
  letter-spacing:.26em;text-transform:uppercase;
  opacity:.95;
}
.guide-clock .date{
  font-weight:400;
  font-size:clamp(11px,1.1vw,13px);
  letter-spacing:.18em;text-transform:uppercase;
  opacity:.7;
}
.guide-clock .time{
  font-weight:700;
  font-size:clamp(14px,1.6vw,18px);
  letter-spacing:.08em;
  color:#fff;
  /* Tabular figures so the seconds digits don't shift the layout
     each tick — proportional Eurostile would otherwise jitter
     the whole right-aligned cluster. */
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum";
}
@media (orientation:landscape) and (max-height:500px){
  .guide-clock{gap:10px}
  .guide-clock > *:not(:last-child)::after{right:-7px}
  .guide-clock .day,
  .guide-clock .date{font-size:10px;letter-spacing:.16em}
  .guide-clock .time{font-size:12px;letter-spacing:.06em}
}

/* Grid: rows = days, cols = ALL 48 time slots of the channel day
   (11:00–22:45). Horizontally scrollable inside .guide-grid-wrap.
   Day-label column is sticky-left so it stays visible while
   scrolling through the schedule; time-header row is sticky-top
   for the same reason on vertical scroll. */
/* Scrolling viewport for the schedule. Both axes scroll inside
   this box; sticky cells inside the rows pin to its edges.
   `overscroll-behavior: contain` keeps mobile touch scrolling
   inside the grid — without it, an upward swipe at the top of the
   grid would chain to the document and bounce the whole guide.
   `-webkit-overflow-scrolling: touch` enables momentum scrolling
   on iOS. */
.guide-grid-wrap{
  flex:1;
  margin-top:clamp(10px,2vh,18px);
  overflow:auto;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
  border:1px solid rgba(255,255,255,.35);
  border-radius:2px;
  background:transparent; /* let the wash from #guide come through */
  position:relative;      /* containing block for the now-line */
}
/* Inner stack — the rows are flex containers; this wrapper sets
   the intrinsic width and is the containing block for the
   absolutely-positioned now-line. Without an explicit
   min-width:max-content, the rows would shrink to the wrap's
   width and overflow:auto would do nothing. */
.guide-grid{
  position:relative;
  min-width:max-content;
}
/* One row = one flex container. Sticky cells inside rows stick to
   .guide-grid-wrap's edges reliably — unlike CSS-Grid sticky-items,
   which use the grid track as the containing block and scroll with
   the grid. (That was the bug — day labels disappeared on
   horizontal scroll because they were tied to the grid track, not
   the wrap.) The row's min-width:max-content guarantees the row is
   wider than the wrap so sticky has somewhere to work. */
.guide-row{
  display:flex;
  min-width:max-content;
}
/* Headers row pins to the top so time labels are always readable
   when the user scrolls down through 30 days. z-index above
   regular cells; the corner cell (top-left, sticky on BOTH axes)
   wins over both. */
.guide-row-head{
  position:sticky;top:0;
  z-index:3;
}
/* Shared base. Explicit flex-basis on each cell variant below
   keeps columns aligned across rows even though there's no shared
   grid template. */
.guide-cell,
.guide-header,
.guide-row-label,
.guide-corner{
  border-right:1px solid rgba(255,255,255,.25);
  border-bottom:1px solid rgba(255,255,255,.25);
  padding:clamp(8px,1.4vh,14px) clamp(8px,1.2vw,16px);
  font-size:clamp(11px,1.2vw,13px);
  display:flex;flex-direction:column;justify-content:center;
  min-height:46px;
  box-sizing:border-box;
}
/* Hour-slot column header. Near-solid dark — sticky cells need to
   obscure content scrolling underneath them, not let it bleed
   through. The light translucency still picks up a hint of the
   wash from #guide for visual cohesion. Cells are sized for an
   hour's worth of programming (one cell per broadcast hour). */
.guide-header{
  flex:0 0 180px;
  background:rgba(8,8,12,.92);
  text-transform:uppercase;letter-spacing:.18em;
  font-weight:700;font-size:clamp(10px,1.1vw,12px);
  opacity:.95;
}
/* Day-row label cell — sticks to the left edge of the wrap on
   horizontal scroll. The `clamp(...)` flex-basis tracks the
   viewport width like the old grid template did, so the column
   auto-sizes from 68 to 108 px. Near-solid background obscures
   any cell content that scrolls behind it. */
.guide-row-label{
  flex:0 0 clamp(68px,8vw,108px);
  position:sticky;left:0;z-index:2;
  background:rgba(8,8,12,.94);
  font-weight:700;letter-spacing:.18em;text-transform:uppercase;
}
/* Top-left corner — sticky on BOTH axes. Sits above row labels
   (z:2) and headers (z:3) so the inner stickies tuck under it.
   Slightly darker than the other stickies — it's the only cell
   over which BOTH the header row AND the day labels can scroll. */
.guide-corner{
  flex:0 0 clamp(68px,8vw,108px);
  position:sticky;left:0;top:0;z-index:4;
  background:rgba(8,8,12,.97);
}
/* Today's label — red wash, red text. Layered over a dark base so
   the cell content scrolling underneath still doesn't bleed
   through. Sticky inherits from the base rule above. */
.guide-row-label.today{
  background:
    linear-gradient(rgba(255,0,0,.22), rgba(255,0,0,.22)),
    rgba(8,8,12,.94);
  color:#ff5a5a;
}
/* Day label internals — DOW on top, date below. Every row now
   carries both lines so a viewer scrolling through 30 days always
   knows the calendar date, not just "FRIDAY". */
.guide-row-label .label-dow{
  font-size:clamp(11px,1.2vw,13px);
}
.guide-row-label .label-date{
  font-size:clamp(9px,1vw,10px);
  font-weight:400;
  letter-spacing:.08em;
  opacity:.7;
  margin-top:3px;
  text-transform:uppercase;
}
.guide-row-label.today .label-date{opacity:.85}

/* Cell content + state styling. Cells stay mostly translucent so
   the wash + the soft blurred channel still come through, just
   enough hint to remind the viewer the channel is live. One cell
   per broadcast hour. */
.guide-cell{flex:0 0 180px;background:rgba(0,0,0,.35);cursor:default}
.guide-cell.now-col{flex:0 0 240px}
/* Hover preview — only on mouse devices (touch sticks :hover after
   a tap). Subtle background lightening + cursor:pointer so cells
   feel selectable. The JS paired with this updates the description
   strip below as the cursor moves through the grid. */
@media (hover: hover){
  .guide-cell{cursor:pointer}
  .guide-cell:hover{
    background:rgba(255,255,255,.07);
  }
  .guide-cell:hover .title{
    color:#fff;
  }
  .guide-cell.guide-end-cell:hover{
    background:rgba(0,0,0,.78);
  }
  /* "now" cell stays in its red wash even on hover. */
  .guide-cell.now:hover{
    background:linear-gradient(90deg, rgba(255,0,0,.4), rgba(255,0,0,.18));
  }
}
.guide-cell .title{
  font-weight:700;font-size:clamp(11px,1.2vw,13px);
  letter-spacing:.04em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.guide-cell .meta{
  font-size:clamp(9px,1vw,11px);
  opacity:.55;margin-top:2px;letter-spacing:.06em;
  text-transform:uppercase;
}
.guide-cell.now{
  background:linear-gradient(90deg, rgba(255,0,0,.32), rgba(255,0,0,.12));
  color:#fff;
  box-shadow:inset 0 0 0 2px #ff0000;
}
.guide-cell.now .title{color:#fff}
.guide-cell.static-slot{
  background:rgba(255,255,255,.02);
  opacity:.45;
}
.guide-cell.static-slot .title{font-weight:400}

/* End-of-broadcast-day marker — last cell of each row + the
   corresponding header. Wider than a regular cell so the time +
   "Off air" / "Resumes 6:00 AM" text reads cleanly; dim background
   so it visually closes the day without competing with the
   schedule. The header is two-line: the broadcast END time on top
   (9:00 P / 21:00), the OFF AIR label below — so viewers see
   exactly when programming stops. */
.guide-cell.guide-end-cell,
.guide-header.guide-end-cell{
  flex:0 0 clamp(140px,16vw,200px);
  background:rgba(0,0,0,.65);
  border-right:none;
}
.guide-header.guide-end-cell{
  color:rgba(255,255,255,.55);
  align-items:flex-start;
  gap:2px;
  padding-top:clamp(6px,1vh,10px);
}
.guide-header.guide-end-cell .end-time{
  font-size:clamp(10px,1.1vw,12px);
  letter-spacing:.18em;
  color:rgba(255,255,255,.95);
  font-weight:700;
}
.guide-header.guide-end-cell .end-label{
  font-size:clamp(9px,1vw,11px);
  letter-spacing:.32em;
  color:rgba(255,255,255,.6);
  font-weight:700;
}
.guide-cell.guide-end-cell .title{
  font-weight:700;
  color:rgba(255,255,255,.75);
  text-transform:uppercase;
  letter-spacing:.18em;
  font-size:clamp(10px,1.1vw,12px);
}
.guide-cell.guide-end-cell .meta{
  opacity:.5;
  text-transform:none;
  letter-spacing:.06em;
}

/* (The vertical "now" line is gone. Reads too "modern live TV"
   for a TV-Guide-booklet aesthetic — the original guides marked
   the current show by highlighting its cell, not by drawing a
   real-time creep line through the schedule. The today row's
   red-bordered .guide-cell.now is the now-marker. */

/* Show description strip */
.guide-desc{
  margin-top:clamp(10px,2vh,18px);
  border:1px solid rgba(255,255,255,.5);
  padding:clamp(10px,1.6vh,16px) clamp(12px,1.4vw,20px);
  display:grid;
  grid-template-columns:1fr auto;
  gap:18px;align-items:center;
}
.guide-desc .desc-title{
  font-family:"Eurostile Wide","Eurostile",sans-serif;
  font-weight:700;letter-spacing:.04em;
  font-size:clamp(16px,2vw,22px);
  text-transform:uppercase;
}
.guide-desc .desc-body{
  font-size:clamp(11px,1.2vw,14px);
  opacity:.75;margin-top:4px;line-height:1.45;
}
.guide-desc .desc-tag{
  font-size:clamp(9px,1vw,11px);
  letter-spacing:.32em;text-transform:uppercase;
  border:1px solid rgba(255,255,255,.5);
  padding:8px 12px 6px;
  opacity:.8;
}

/* (The standalone close button has been folded INTO the masthead
   IV mark — see `.guide-logo` above. The whole brand mark is the
   "Back to TV" action now. No more × in the top-right corner.) */

/* Mobile: tighter padding. Hourly cells are wider here too since
   each represents an hour of programming. Sticky day-label column
   shrinks for screen real estate. */
@media (max-width:640px){
  #guide{padding:18px 16px}
  .guide-cell,
  .guide-header{flex-basis:140px}
  .guide-cell.now-col{flex-basis:200px}
  .guide-row-label,
  .guide-corner{flex-basis:62px}
  .guide-mast{gap:12px;padding-bottom:8px}
  .guide-desc{grid-template-columns:1fr;gap:8px}
}

/* Mobile landscape — viewport height is the constraint. Squeeze
   every chrome surrounding the grid so the schedule gets multiple
   rows visible without scrolling. */
@media (orientation:landscape) and (max-height:500px){
  #guide{padding:10px 14px}
  .guide-mast{
    padding-bottom:6px;
    gap:10px;
    flex-wrap:nowrap;
  }
  .guide-desc{
    margin-top:6px;
    padding:6px 10px;
    gap:8px;
    grid-template-columns:1fr auto;
  }
  .guide-desc .desc-title{font-size:13px}
  .guide-desc .desc-body{font-size:10px;margin-top:1px;line-height:1.35}
  .guide-desc .desc-tag{font-size:8px;letter-spacing:.22em;padding:5px 8px 3px}
  .guide-grid-wrap{margin-top:6px}
  .guide-cell,
  .guide-header,
  .guide-row-label,
  .guide-corner{
    padding:4px 8px;
    font-size:10px;
    min-height:30px;
  }
  .guide-cell,
  .guide-header{flex-basis:120px}
  .guide-cell.now-col{flex-basis:170px}
  .guide-row-label,
  .guide-corner{flex-basis:54px}
  .guide-cell .title{font-size:11px}
  .guide-cell .meta{font-size:8px;margin-top:1px}
  .guide-row-label{font-size:10px;letter-spacing:.14em}
  .guide-row-label .label-dow{font-size:10px}
  .guide-row-label .label-date{font-size:8px;margin-top:1px}
}
</style>
</head>
<body>

<!--
  VOD playback from Mux via Video.js v10. The video preloads
  silently while the intro overlay is up; on the first user gesture
  it unmutes, sets volume, and starts playback with sound.

  No `src` attribute here — JS owns asset selection. We have two
  Mux playback IDs (horizontal 12:5 cut and vertical 9:16 reframe)
  and the renderer picks one based on viewport orientation, then
  swaps reactively if the user rotates. Both assets are the same
  content + duration, so the wall-clock sync (currentTime =
  tInShow) keeps the channel position continuous across swaps.

  Manifest query params (appended in JS):
    rendition_order=desc        — order the master manifest top-down
                                  so hls.js opens at 1080p; ABR
                                  steps down only if bandwidth
                                  forces it
    max_resolution_tier=1080p   — caps the ladder; documents intent
                                  for the 4K-tier swap (→ 2160p)
-->
<video-player>
  <media-container>
    <mux-video
      metadata-video-title="tears_of_steel"
      muted
      preload="auto"
      playsinline
      crossorigin="anonymous"
    ></mux-video>
  </media-container>

</video-player>

<!-- Cold-start overlay — identical brand identity to the between-
     show interlude: dim CRT snow + radial vignette + centered IV
     logo + top-right red-dot badge. Only difference vs the
     interlude is the badge content: a play-button icon (the click
     target) instead of "LIVE IN mm:ss".

     The play icon, the FS button (top-left), and the WATCH pill
     (when returning from the guide) are the three first-click
     entry points — each triggers the full activate() flow:
     fullscreen, audio gate, intro animation, then live channel. -->
<div id="intro" class="intro" role="button" aria-label="Play to begin" tabindex="0">
  <canvas id="introNoise" class="intro-noise" aria-hidden="true"></canvas>
  <div class="intro-vignette" aria-hidden="true"></div>
  <div class="intro-logo" aria-hidden="true">
