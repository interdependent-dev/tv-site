<!-- ── Video.js v10 (beta) ──────────────────────────────────────────
     v10 is a full rewrite published under a new package, @videojs/html,
     organized as web components. The main bundle registers the
     <video-player> state store (used even without a UI, so the skin can
     be slotted back in trivially). The mux-video media element is a
     separate module — it wraps Mux's delivery stack so playback-id /
     stream-type / rendition-order / max-resolution become native
     attributes.

     Pinned to an exact beta because the API is still evolving; bump
     deliberately when you want to track upstream.
-->
<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html@10.0.0-beta.23/cdn/video.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html@10.0.0-beta.23/cdn/media/mux-video.js"></script>

<style>
/* ── Eurostile Next Pro ──────────────────────────────────────────────
   Embedded TTF (Adobe-licensed, user-supplied via the project's
   approved font collection). Two weights for body + one wide-bold
   cut for the masthead. Browsers handle TTF natively for @font-face;
   sacrificing ~30% over woff2 for build-step simplicity. */
@font-face{
  font-family:"Eurostile";
  src:url("fonts/EurostileNextPro-Regular.ttf") format("truetype");
  font-weight:400;font-style:normal;font-display:swap;
}
@font-face{
  font-family:"Eurostile";
  src:url("fonts/EurostileNextPro-Bold.ttf") format("truetype");
  font-weight:700;font-style:normal;font-display:swap;
}
@font-face{
  font-family:"Eurostile Wide";
  src:url("fonts/EurostileNextPro-WideBold.ttf") format("truetype");
  font-weight:700;font-style:normal;font-display:swap;
}

*{margin:0;box-sizing:border-box}
html,body{
  height:100%;width:100%;
  background:#000;color:#fff;
  font-family:"Eurostile",-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;
}

/* Chrome-less full-bleed playback. <media-container> is the v10
   interaction surface — it provides the mediaContext that <mux-video>
   needs to actually render. We give it no UI children (no controls,
   no poster, no buffering indicator), so all that draws is the video
   itself. 12:5 asset letterboxes via object-fit:contain on any aspect. */
media-container{
  display:block;
  position:fixed;inset:0;
  width:100vw;height:100vh;
  height:100dvh; /* dvh tracks the live visible viewport — when
                    iOS Safari/Chrome retracts its URL bar, the
                    media surface grows to fill the new area
                    without us needing a Fullscreen API call. */
  background:#000;
}
mux-video{
  display:block;
  width:100%;height:100%;
  object-fit:contain;
  background:#000;
}

/* ── Intro overlay ────────────────────────────────────────────────
   Black backdrop with a centered play button. Click anywhere on
   the overlay fires the user-gesture activation: fullscreen, audio
   gate open, intro plays WITH sound (gesture authorizes autoplay-
   with-sound, no MEI lottery), mux-video seeks to the live offset
   and plays silently behind. When intro.ended fires, the overlay
   fades and the channel is revealed mid-show, audible. */
.intro{
  position:fixed;inset:0;z-index:20;
  height:100vh;
  height:100dvh;
  background:#000;
  display:grid;place-items:center;
  /* Default cursor on the snow; the PUSH PLAY button has its own
     pointer cursor as the only click target. Clicks elsewhere on
     the cold-start screen are intentionally inert. */
  cursor:default;
  user-select:none;-webkit-user-select:none;
  transition:opacity .6s ease;
  overflow:hidden;
}
.intro.done{opacity:0;pointer-events:none}

/* Pre-rendered intro animation. Hidden pre-click (opacity:0) so it
   doesn't paint its solid black background over the snow canvas;
   the canvas + vignette + IV logo + PUSH PLAY badge all need to
   show through. On .activated, fades in over 350ms to take the
   screen for the catalyst animation. object-fit:contain so the
   16:9 source letterboxes gracefully on any aspect ratio. */
.intro-video{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:contain;
  background:#000;
  pointer-events:none;
  opacity:0;
  transition:opacity .35s ease;
}
.intro.activated .intro-video{opacity:1}

/* V1 cold-start snow — half-res canvas of *60 greyscale noise. No
   opacity override here so it renders at native brightness; the
   *60 baked into the renderer is the only dimming, matching V1
   verbatim and matching the interlude canvas. */
.intro-noise{
  position:absolute;inset:0;z-index:0;
  width:100%;height:100%;
  image-rendering:pixelated;
  pointer-events:none;
}
.intro-vignette{
  position:absolute;inset:0;z-index:1;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.7) 100%);
  pointer-events:none;
}

/* Centered IV logo — identical to the between-show interlude. */
.intro-logo{
  position:absolute;inset:0;z-index:2;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.intro-logo svg{
  width:min(45vw,420px);height:auto;
  opacity:0;
  filter:drop-shadow(0 0 30px rgba(255,255,255,.15));
  animation:intro-fade-in 2.5s ease-in forwards .3s;
}
@keyframes intro-fade-in{ to{opacity:.6} }

/* ── Shared "LIVE" badge (top-right pulsing red dot + label) ─────
   Used on both #intro (label is a play-icon button) and #static
   (label is the "LIVE IN mm:ss" countdown). Matches the V1 PLAY
   badge geometry: gap 10px, top/right safe-area-aware insets. */
.live-badge{
  position:absolute;z-index:3;
  top:max(env(safe-area-inset-top,0px), clamp(20px,4vh,40px));
  right:max(env(safe-area-inset-right,0px), clamp(20px,4vw,48px));
  display:flex;align-items:center;gap:10px;
  opacity:0;
  animation:intro-fade-in 2s ease-in forwards 1s;
}
.live-dot{
  width:14px;height:14px;border-radius:50%;
  background:#ff0000;
  box-shadow:0 0 12px rgba(255,0,0,.7);
  animation:live-dot-pulse 2s ease-in-out infinite;
}
@keyframes live-dot-pulse{
  0%,100%{opacity:1}
  50%    {opacity:.3}
}

/* Cold-start CTA — pill-shaped button that replaces the interlude
   "LIVE IN mm:ss" with "PUSH PLAY" + outline play triangle. Shares
   the .live-badge positioning + .live-dot pulse with the interlude.
   This is the ONE click target that starts the channel; FS and
   GUIDE pills don't trigger activation. */
.intro-cta{
  appearance:none;background:transparent;border:none;
  color:#fff;cursor:pointer;
  padding:6px 4px 6px 0;
  font-family:inherit;
}
.intro-cta .play-icon{
  width:clamp(18px,2.2vw,24px);height:auto;display:block;
  margin-left:4px;
  filter:drop-shadow(0 0 8px rgba(255,255,255,.2));
  transition:transform .15s ease, filter .15s ease;
}
.intro-cta:hover .play-icon,
.intro-cta:focus-visible .play-icon{
  transform:scale(1.15);
  filter:drop-shadow(0 0 10px rgba(255,255,255,.6));
}
.intro-cta:hover .live-label,
.intro-cta:focus-visible .live-label{
  text-shadow:0 0 12px rgba(255,255,255,.45), 0 0 12px rgba(0,0,0,.8);
}
.intro-cta:focus-visible{outline:none}

/* Activated → fade out the centerpiece logo + the cta badge so
   the intro video has the screen to itself. */
.intro.activated{cursor:default}
.intro.activated .intro-logo,
.intro.activated .intro-cta{
  animation:intro-out .35s ease forwards;
  pointer-events:none;
}
@keyframes intro-out{
  to{opacity:0}
}
@media (prefers-reduced-motion:reduce){
  .intro-logo svg,
  .live-badge{animation:intro-fade-in 1.2s ease-in forwards .2s}
  .intro.activated .intro-logo,
  .intro.activated .intro-cta{animation:none;opacity:0}
}

/* Watermark — bottom-right. Now a <button> doubling as the
   "enter fullscreen" CTA: the big white disc inside the IV mark
   carries a subtle corner-brackets icon (`.logo-fs-icon`) that
   shows the action; clicking the watermark toggles fullscreen.
   z-index 21 so it paints above the intro overlay (z:20) and is
   visible from page load. max() against safe-area-inset so it
   doesn't slide under the iPhone home indicator or notch. */
.logo{
  position:fixed;
  bottom:max(env(safe-area-inset-bottom,0px), clamp(12px,3vh,32px));
  right:max(env(safe-area-inset-right,0px), clamp(12px,3vw,40px));
  z-index:21;
  /* Button reset */
  appearance:none;background:transparent;border:none;padding:0;
  /* Pointer-events only when the watermark is visible (.show) AND
     fullscreen is supported (set via the no-fs JS feature gate). */
  pointer-events:none;
  cursor:pointer;
  display:block;
  line-height:0; /* eat any inline-baseline gap under the SVG */
}
.logo.show{pointer-events:auto}
.logo:focus-visible{outline:2px solid rgba(255,255,255,.8);outline-offset:6px;border-radius:6px}

.logo svg{
  width:min(20vw,120px);height:auto;
  opacity:0;
  filter:drop-shadow(0 0 16px rgba(255,255,255,.3));
  transition:opacity .4s ease;
  display:block;
}
.logo.show svg{opacity:.7}

/* Fullscreen-enter icon overlaid inside the big white disc. Stroke
   stays in viewBox units (8 of 394) so it scales naturally with
   the watermark. ~50% black by default for a subtle hint;
   brightens on hover/focus. */
.logo-fs-icon{
  opacity:.5;
  transform-origin:99.54px 73.97px; /* center of the big disc */
  transform-box:fill-box;
  transition:opacity .15s ease, transform .15s ease;
}
.logo:hover .logo-fs-icon,
.logo:focus-visible .logo-fs-icon{
  opacity:.9;
  transform:scale(1.06);
}
/* In fullscreen mode → hide the icon entirely. Logo reverts to its
   clean decorative form ("you've entered"). Class is added on
   `fullscreenchange` by JS. */
body.in-fs .logo-fs-icon{visibility:hidden}
body.in-fs .logo{cursor:default}
/* Platforms without Fullscreen API support (iOS Safari / iPhone
   Chrome) — keep the watermark non-interactive and hide the icon
   so there's no dead affordance. JS adds `.no-fs` to <body> when
   document.documentElement.requestFullscreen is undefined. */
body.no-fs .logo-fs-icon{display:none}
body.no-fs .logo{cursor:default}
body.no-fs .logo.show{pointer-events:none}

/* Portrait phones — shrink the mark and pad it away from the iPhone
   Chrome / Safari bottom toolbar (which is shown when scroll is at top
   on iPhone Chrome and overlaps fixed-position elements). */
@media (max-width:480px) and (orientation:portrait){
  .logo{
    bottom:max(env(safe-area-inset-bottom,0px), 16px);
    right:max(env(safe-area-inset-right,0px), 14px);
  }
  .logo svg{width:min(26vw,72px)}
}

/* Landscape phones — wide-but-short. Keep the logo tight to the
   corner; horizontal real estate is precious. */
@media (max-height:480px) and (orientation:landscape){
  .logo{
    bottom:max(env(safe-area-inset-bottom,0px), 10px);
    right:max(env(safe-area-inset-right,0px), 12px);
  }
  .logo svg{width:min(14vh,64px)}
}

/* ─────────────────────────────────────────────────────────────────────
   ── LINEAR CHANNEL UX ────────────────────────────────────────────────
   ─────────────────────────────────────────────────────────────────────
   The site is a deterministic linear channel: every 15 minutes a new
   slot starts (00 / 15 / 30 / 45 past the hour) between 11:00–23:00
   local time. Each slot = 12:14 of Tears of Steel + 2:46 of static.
   Every viewer worldwide computes the same in-slot position from
   their wall clock, so the channel is "live" without a server.

   Three full-bleed states sit on top of the mux-video and toggle via
   JS visibility:
     1. movie       (default — the mux-video shows through)
     2. #static     (the 2:46 "no signal" interlude between slots)
     3. #offair     (outside channel hours, 23:00–11:00)

   A fourth overlay, #guide, slides in when the user hits the GUIDE
   button bottom-left. None of these affect playback timing — the
   mux-video keeps playing whether or not it's visible. */

/* ── Between-show interlude ───────────────────────────────────────
   Same V1 cold-start identity as the page-load screen: dim CRT
   snow + radial vignette + a big centered IV logo (~60% opacity,
   subtle white drop-shadow). Top-right carries a "LIVE IN mm:ss"
   countdown to the next slot with a pulsing red dot — the brand
   "you're still on this channel" signal. No scan lines, no NO
   SIGNAL wordmark — the logo is the message. */
#static{
  position:fixed;inset:0;z-index:15;
  background:#000;
  display:none;
}
#static.on{display:block}
#static canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  image-rendering:pixelated;
  /* Native opacity — *60 in the renderer does the dimming; this
     matches the cold-start canvas exactly so the brand identity
     reads the same across both screens. */
}
.static-vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.7) 100%);
  pointer-events:none;z-index:1;
}
.static-logo{
  position:absolute;inset:0;z-index:2;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.static-logo svg{
  width:min(45vw,420px);height:auto;
  opacity:0;
  filter:drop-shadow(0 0 30px rgba(255,255,255,.15));
  animation:static-fade-in 2.5s ease-in forwards .3s;
}
@keyframes static-fade-in{ to{opacity:.6} }

/* The static interlude uses the shared .live-badge slot (defined
   above) with a text label instead of the play-icon button. */
.live-label{
  font:700 clamp(14px,2.2vw,22px)/1 "Eurostile","Eurostile Wide",sans-serif;
  color:#fff;letter-spacing:.18em;text-transform:uppercase;
  text-shadow:0 0 12px rgba(0,0,0,.8);
}

/* ── "OFF AIR" screen (outside 11:00–23:00 local) ────────────────── */
#offair{
  position:fixed;inset:0;z-index:14;
  background:#000;
  display:none;
  flex-direction:column;
  align-items:center;justify-content:center;
  gap:18px;
}
#offair.on{display:flex}
#offair .offair-title{
  font-family:"Eurostile Wide","Eurostile",sans-serif;
  font-weight:700;letter-spacing:.4em;
  font-size:clamp(28px,5vw,56px);
}
#offair .offair-sub{
  font-family:"Eurostile",sans-serif;
  font-weight:400;letter-spacing:.25em;
  font-size:clamp(11px,1.4vw,13px);
  text-transform:uppercase;opacity:.6;
}

/* ── GUIDE button (toggle pill, bottom-left) ─────────────────────── */
#guide-button{
  position:fixed;
  bottom:max(env(safe-area-inset-bottom,0px), clamp(14px,3vh,28px));
  left:max(env(safe-area-inset-left,0px),  clamp(14px,3vw,28px));
  z-index:21; /* above intro (z:20), below guide (z:25) */
  appearance:none;border:1px solid rgba(255,255,255,.35);
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:#fff;cursor:pointer;
  font:700 12px/1 "Eurostile",sans-serif;
  letter-spacing:.32em;text-transform:uppercase;
  padding:11px 18px 10px;border-radius:999px;
  opacity:0;transform:translateY(8px);
  transition:opacity .4s ease, transform .4s ease, background .15s ease, border-color .15s ease;
}
#guide-button.show{opacity:1;transform:translateY(0)}
#guide-button:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.8)}

/* (FS toggle now lives inside the IV watermark as the big white
   disc's interior — see `.logo` + `.logo-fs-icon` rules below.
   ESC handles fullscreen exit via the browser's native UI.) */

/* (Mute/unmute button removed — users control audio via their
   device volume; the channel starts at a slightly above-average
   volume of 0.65 once the user activates the first click.) */

/* ── TV GUIDE overlay ─────────────────────────────────────────────
   White gridlines on near-black, retro cable-EPG layout. Masthead +
   live clock at top; 7-day × 5-slot grid; description strip at
   bottom. Slides in via opacity + tiny translate. */
#guide{
  position:fixed;inset:0;z-index:25;
  background:radial-gradient(ellipse at top, #0a1830 0%, #000 70%);
  display:none;
  flex-direction:column;
  padding:clamp(16px,3.5vh,32px) clamp(16px,3vw,40px);
  opacity:0;transform:translateY(8px);
  transition:opacity .35s ease, transform .35s ease;
  overflow:hidden;
  font-family:"Eurostile",sans-serif;
}
#guide.on{display:flex;opacity:1;transform:translateY(0)}

.guide-mast{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding-bottom:clamp(12px,2vh,20px);
  /* Right padding clears the absolute-positioned close button so
     the day/date/time cluster never slides under the × hit area.
     Generous min (72px) so the clearance survives small viewports
     where the close-button position clamp hits its 14px floor and
     leaves only ~50px between the X's left edge and the screen
     edge. */
  padding-right:clamp(72px,8vw,108px);
  border-bottom:1px solid rgba(255,255,255,.5);
  gap:24px;flex-wrap:wrap;
}
/* Masthead — the IV logo SVG (matches the watermark). Scales down
   on mobile so the right-side date/time block has room. */
.guide-logo{display:flex;align-items:flex-end}
.guide-logo svg{
  width:clamp(180px,22vw,300px);
  height:auto;display:block;
  filter:drop-shadow(0 0 18px rgba(180,200,255,.18));
}
@media (max-width:640px){
  .guide-logo svg{width:clamp(90px,28vw,140px)}
}
.guide-clock{
  text-align:right;
  font-family:"Eurostile",sans-serif;
}
.guide-clock .day{
  font-weight:700;
  font-size:clamp(13px,1.6vw,18px);
  letter-spacing:.32em;text-transform:uppercase;
  opacity:.95;
}
.guide-clock .date{
  font-weight:400;
  font-size:clamp(11px,1.2vw,13px);
  letter-spacing:.22em;text-transform:uppercase;
  opacity:.6;margin-top:4px;
}
.guide-clock .time{
  font-weight:700;
  font-size:clamp(22px,3vw,32px);
  letter-spacing:.1em;
  margin-top:6px;
  color:#fff;
}

/* Grid: rows = days, cols = ALL 48 time slots of the channel day
   (11:00–22:45). Horizontally scrollable inside .guide-grid-wrap.
   Day-label column is sticky-left so it stays visible while
   scrolling through the schedule; time-header row is sticky-top
   for the same reason on vertical scroll. */
.guide-grid-wrap{
  /* Block-level scroll container — NOT a flex container. A previous
     `display:flex; flex-direction:column` here was making the grid
     a flex item, which constrained its width and broke the
     scrolling/sticky relationship `position:sticky` depends on.
     Removed: the grid sizes from its own template, the wrap
     scrolls when content overflows, sticky cells stick to the
     wrap's left edge. */
  flex:1;
  margin-top:clamp(10px,2vh,18px);
  overflow:auto;
  border:1px solid rgba(255,255,255,.5);
  border-radius:2px;
  background:#000;
}
.guide-grid{
  display:grid;
  /* grid-template-columns is set imperatively in buildGuideGrid()
     so the current slot's column can be widened (200px vs 130px).
     Fallback here for first paint before JS runs. */
  grid-template-columns:clamp(68px,8vw,108px) repeat(48,130px);
  position:relative; /* containing block for .now-line */
}
.guide-header,
.guide-cell{
  border-right:1px solid rgba(255,255,255,.4);
  border-bottom:1px solid rgba(255,255,255,.4);
  padding:clamp(8px,1.4vh,14px) clamp(8px,1.2vw,16px);
  font-size:clamp(11px,1.2vw,13px);
  display:flex;flex-direction:column;justify-content:center;
  min-height:46px;
}
.guide-header{
  background:#0a1830;
  text-transform:uppercase;letter-spacing:.18em;
  font-weight:700;font-size:clamp(10px,1.1vw,12px);
  opacity:.95;
  position:sticky;top:0;z-index:2;
}
.guide-row-label{
  font-weight:700;letter-spacing:.22em;text-transform:uppercase;
  background:#000;
  /* !important here is intentional: this column MUST stay pinned
     to the left edge of the scroll container regardless of any
     future cell-state rule (e.g. `.today` background) that might
     shadow `position`. Sticky cells in grids are still finicky in
     some engines, so we lock the three properties hard. */
  position:sticky !important;
  left:0 !important;
  z-index:1;
}
/* Top-left corner: needs to win both stickys. */
.guide-header.corner{
  left:0 !important;z-index:3;background:#0a1830;
  position:sticky !important;
}
.guide-row-label.today{
  background:#1a0000;
  color:#ff5a5a;
  /* Re-assert sticky for the "today" variant — same specificity
     as `.guide-row-label` plus one extra class, so without the
     re-assert the longhand `background` override would never
     touch `position`, but cascade engines have surprised us
     before. Belt + braces. */
  position:sticky !important;
  left:0 !important;
}
/* Today's label shows two lines: the day-of-week + the calendar
   date ("TUE" / "MAY 12"). Sub-line is smaller and slightly
   dimmer for hierarchy. */
.guide-row-label .label-date{
  font-size:clamp(9px,1vw,10px);
  font-weight:400;
  letter-spacing:.08em;
  opacity:.75;
  margin-top:4px;
  text-transform:uppercase;
}
/* (Removed a stale `.guide-cell { position: relative }` rule that
   was overriding the sticky positioning on `.guide-row-label` —
   identical specificity, later rule won, day labels weren't
   sticking on horizontal scroll. Cells don't need relative
   positioning; the `.guide-grid` parent is the containing block
   for `.now-line`.) */
.guide-cell .title{
  font-weight:700;font-size:clamp(11px,1.2vw,13px);
  letter-spacing:.04em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.guide-cell .meta{
  font-size:clamp(9px,1vw,11px);
  opacity:.55;margin-top:2px;letter-spacing:.06em;
  text-transform:uppercase;
}
.guide-cell.now{
  background:linear-gradient(90deg, rgba(255,0,0,.35), rgba(255,0,0,.15));
  color:#fff;
  box-shadow:inset 0 0 0 2px #ff0000;
}
.guide-cell.now .title{color:#fff}
.guide-cell.static-slot{
  background:rgba(255,255,255,.02);
  opacity:.4;
}
.guide-cell.static-slot .title{font-weight:400}

/* Vertical red "now" line — moves through the wider current-slot
   column as the minutes tick. Like Apple Calendar's red "now" line
   but rotated 90° (our time axis is horizontal). z-index above all
   cells, pointer-events:none so it doesn't intercept clicks. */
.now-line{
  position:absolute;
  top:0;bottom:0;
  width:2px;
  background:#ff0000;
  z-index:5;
  pointer-events:none;
  box-shadow:0 0 10px rgba(255,0,0,.65);
}
.now-line::before{
  /* Dot at the very top, matching Apple Calendar's pill marker. */
  content:"";
  position:absolute;
  top:-5px;left:-4px;
  width:10px;height:10px;
  border-radius:50%;
  background:#ff0000;
  box-shadow:0 0 8px rgba(255,0,0,.85);
}

/* Show description strip */
.guide-desc{
  margin-top:clamp(10px,2vh,18px);
  border:1px solid rgba(255,255,255,.5);
  padding:clamp(10px,1.6vh,16px) clamp(12px,1.4vw,20px);
  display:grid;
  grid-template-columns:1fr auto;
  gap:18px;align-items:center;
}
.guide-desc .desc-title{
  font-family:"Eurostile Wide","Eurostile",sans-serif;
  font-weight:700;letter-spacing:.04em;
  font-size:clamp(16px,2vw,22px);
  text-transform:uppercase;
}
.guide-desc .desc-body{
  font-size:clamp(11px,1.2vw,14px);
  opacity:.75;margin-top:4px;line-height:1.45;
}
.guide-desc .desc-tag{
  font-size:clamp(9px,1vw,11px);
  letter-spacing:.32em;text-transform:uppercase;
  border:1px solid rgba(255,255,255,.5);
  padding:8px 12px 6px;
  opacity:.8;
}

/* Close button — circle X in the top-right of the guide. The
   masthead has a clamp(72px,8vw,108px) padding-right so the
   day/date/time cluster never slides under this hit area. */
.guide-close{
  position:absolute;
  top:clamp(14px,2.4vh,24px);right:clamp(14px,2vw,24px);
  z-index:26; /* above #guide (z:25) */
  appearance:none;background:rgba(0,0,0,.45);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.4);
  color:#fff;cursor:pointer;
  width:36px;height:36px;border-radius:50%;
  display:grid;place-items:center;
  font:400 22px/1 "Eurostile",sans-serif;
  line-height:.85;
  transition:background .15s ease, border-color .15s ease, transform .15s ease;
}
.guide-close:hover{background:rgba(255,255,255,.12);border-color:#fff;transform:rotate(90deg)}

/* Mobile: tighter padding, smaller font scales. Columns stay 48
   wide (full schedule) but each column is narrower so swiping
   feels brisk. The sticky day-label column shrinks too. */
@media (max-width:640px){
  #guide{padding:18px 16px}

}

  swaps reactively if the user rotates. Both assets are the same
  content + duration, so the wall-clock sync (currentTime =
  tInShow) keeps the channel position continuous across swaps.

                                  steps down only if bandwidth
                                  forces it
    max_resolution_tier=1080p   — caps the ladder; documents intent
                                  for the 4K-tier swap (→ 2160p)
-->

<script>
// ─────────────────────────────────────────────────────────────────────
// INTERDEPENDENT TV — linear channel runtime
// ─────────────────────────────────────────────────────────────────────
//
// Schedule semantics
//   - Channel operates 11:00–23:00 local time.
//   - Slot length: 15 min (900s). Movie: 12:14 (734s). Static gap: 2:46.
//   - Slot starts on every quarter-hour boundary: :00, :15, :30, :45.
//   - The "live position" inside a slot is t = (now - slotStart)/1000.
//     If t < SHOW_SECS, the mux-video is playing at currentTime = t.
//     If t ≥ SHOW_SECS, the #static overlay is up until the next slot.
//
// Sync model
//   Pure client-side, deterministic. Every browser computes the same
//   in-slot offset from its own wall-clock, so all viewers worldwide
//   land on the same frame at the same minute without any server.
//   No Mux Live, no ffmpeg loop, no scheduling service.
//
// Lifecycle
//   load → intro overlay visible, mux-video preloads silently.
//   click → unmute prep (muted=false, volume=0), play movie at
//           the live offset, play intro.webm (now with audio).
//   intro.ended → ramp volume to 0.5, fade intro overlay.
//   after fade → handleState() takes over: ensures the movie is
//           seeked to the live position, then schedules the next
//           transition (show→static or static→show) precisely at
//           its quarter-hour boundary.
//
// ─────────────────────────────────────────────────────────────────────

const CHANNEL = {
  startHour: 11,   // 11:00 — first slot of the day starts at 11:00
  endHour:   23,   // 23:00 — last slot starts at 22:45, ends at 23:00
  slotSec:   900,  // 15 min per slot
  showSec:   734,  // Tears of Steel: 12:14 = 734s
};
CHANNEL.staticSec = CHANNEL.slotSec - CHANNEL.showSec;

const SHOW = {
  title: 'TEARS OF STEEL',
  duration: '12:14',
  description:
    'Open-source 4K sci-fi short — a fractured science team races ' +
    'to undo a future that was never theirs to write. Directed by ' +
    'Ian Hubert · Blender Foundation, 2012.',
};

// ── Wall-clock slot math ────────────────────────────────────────────
// Returns the current slot state for a given (or now) timestamp.
function getSlotInfo(now) {
  now = now || Date.now();
  const d = new Date(now);
  const hour = d.getHours();

  // Off-air outside CHANNEL.startHour ≤ hour < CHANNEL.endHour
  if (hour < CHANNEL.startHour || hour >= CHANNEL.endHour) {
    const next = new Date(d);
    next.setHours(CHANNEL.startHour, 0, 0, 0);
    if (next.getTime() <= now) next.setDate(next.getDate() + 1);
    return { offAir: true, nextOnAir: next.getTime() };
  }

  // Round down to the quarter hour
  const slotMin = Math.floor(d.getMinutes() / 15) * 15;
  const slotStart = new Date(
    d.getFullYear(), d.getMonth(), d.getDate(), hour, slotMin, 0, 0
  ).getTime();
  const tInSlot = (now - slotStart) / 1000;
  const inShow = tInSlot < CHANNEL.showSec;

  return {
    offAir: false,
    inShow,
    slotStart,
    nextSlotStart: slotStart + CHANNEL.slotSec * 1000,
    showEnd:       slotStart + CHANNEL.showSec * 1000,
    tInSlot,
    tInShow:    inShow ? tInSlot : CHANNEL.showSec,
    tInStatic:  inShow ? 0       : tInSlot - CHANNEL.showSec,
  };
}

function fmtClock(d){
  let h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;
}
function fmtSlot(d){
  let h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? 'p' : 'a';
  h = h % 12 || 12;
  return h + ':' + (m < 10 ? '0' + m : m) + ampm;
}
const DAYS_SHORT = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const DAYS_LONG  = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];

// ── Defer everything until mux-video is upgraded ────────────────────
customElements.whenDefined('mux-video').then(function(){
  const mv         = document.querySelector('mux-video');
  const intro      = document.getElementById('intro');
  const introVideo = document.getElementById('introVideo');
  const staticEl   = document.getElementById('static');
  const offairEl   = document.getElementById('offair');
  const offairNext = document.getElementById('offairNext');
  const staticCountdown = document.getElementById('staticCountdown');
  const guideBtn   = document.getElementById('guide-button');
  const watermark  = document.getElementById('logoFs');
  const guideEl    = document.getElementById('guide');
  const guideClose = document.getElementById('guideClose');
  const guideGrid  = document.getElementById('guideGrid');
  const guideDay   = document.getElementById('guideDay');
  const guideDate  = document.getElementById('guideDate');
  const guideTime  = document.getElementById('guideTime');
  const guideDescTag = document.getElementById('guideDescTag');
  const canvas     = staticEl.querySelector('canvas');
  if (!mv) return;

  // ── Fullscreen helpers ────────────────────────────────────────────
  function isFullscreen(){
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }
  function enterFullscreen(){
    const candidates = [document.documentElement, document.body];
    for (let i = 0; i < candidates.length; i++) {
      const el = candidates[i];
      if (!el) continue;
      const fn = el.requestFullscreen || el.webkitRequestFullscreen;
      if (typeof fn !== 'function') continue;
      try {
        const p = fn.call(el, { navigationUI: 'hide' });
        if (p && p.catch) p.catch(function(){});
        return;
      } catch (_) {
        try {
          const p2 = fn.call(el);
          if (p2 && p2.catch) p2.catch(function(){});
          return;
        } catch (__) {}
      }
    }
  }
  function exitFullscreen(){
    const fn = document.exitFullscreen || document.webkitExitFullscreen;
    if (typeof fn === 'function') {
      try {
        const p = fn.call(document);
        if (p && p.catch) p.catch(function(){});
      } catch (_) {}
    }
  }
  function toggleFullscreen(){
    isFullscreen() ? exitFullscreen() : enterFullscreen();
  }
  // Toggle body.in-fs based on the current fullscreen state. CSS
   // hides the .logo-fs-icon (and changes the cursor) while in FS,
   // so the watermark reads as the clean logo — the user has
   // "entered" the channel.
  function syncFsIcon(){
    document.body.classList.toggle('in-fs', isFullscreen());
  }
  document.addEventListener('fullscreenchange', syncFsIcon);
  document.addEventListener('webkitfullscreenchange', syncFsIcon);

  // ── Auto-hide on-screen controls ──────────────────────────────────
  // FS (top-left), mute (top-right), GUIDE (bottom-left), IV
  // watermark (bottom-right) all share one 5-second idle timer.
  // pingControls() runs on every mousemove / touch / keydown after
  // channelLive flips true (intro finished). The timer resets on
  // each ping; controls fade together when it expires.
  let channelLive = false;
  let hideTimer   = 0;
  function showAllControls(on){
    // GUIDE button reveals/hides on its own. The IV watermark
    // (which now doubles as the fullscreen CTA) is gated
    // separately — only shows when the channel is on the actual
    // movie surface. Cold-start (intro), the between-show
    // interlude (#static), and OFF AIR (#offair) each already
    // display the IV logo centered, so a corner watermark would
    // be a duplicate brand mark.
    if (guideBtn) guideBtn.classList.toggle('show', on);
    const centerLogoShowing =
      !channelLive
      || staticEl.classList.contains('on')
      || offairEl.classList.contains('on');
    watermark.classList.toggle('show', on && !centerLogoShowing);
  }
  function pingControls(){
    // Not gated on channelLive — FS and GUIDE need to be discoverable
    // from the cold-start too. showAllControls() internally keeps the
    // bottom-right watermark suppressed until the movie surface is
    // actually showing, so the brand-mark redundancy is still avoided.
    showAllControls(true);
    clearTimeout(hideTimer);
    hideTimer = setTimeout(function(){ showAllControls(false); }, 5000);
  }
  document.addEventListener('mousemove',  pingControls);
  document.addEventListener('touchstart', pingControls, { passive: true });
  document.addEventListener('keydown',    pingControls);
  // The watermark IS the fullscreen toggle. Clicking the IV mark
  // toggles fullscreen (icon inside the big white disc fades on
  // hover to advertise the action). Does NOT start the channel —
  // only the PUSH PLAY button does that.
  watermark.addEventListener('click', function(e){
    e.stopPropagation();
    toggleFullscreen();
    pingControls();
  });

  // Feature-gate for iOS — Fullscreen API doesn't apply to non-
  // <video> elements on iPhone Safari/Chrome, so we'd be offering
  // a dead affordance. Adding body.no-fs hides the icon overlay
  // and makes the watermark non-interactive (it stays as
  // decoration only). The current FS button used to feature-gate
  // itself; the gate now lives on <body>.
  const fsApiAvailable =
    (typeof document.documentElement.requestFullscreen === 'function') ||
    (typeof document.documentElement.webkitRequestFullscreen === 'function');
  if (!fsApiAvailable) {
    document.body.classList.add('no-fs');
  }


  // ── Noise renderer (V1) ──────────────────────────────────────────
  // Port of the original index.html cold-start snow: half-resolution
  // canvas of `Math.random() * 60` greyscale pixels, redrawn every
  // 66ms via setTimeout. ImageData is freshly allocated each frame
  // (V1 did it that way and the GC cost is negligible — ~32 KB at
  // 15fps). Canvas dimensions follow window size; resizes on window
  // resize so the texture stays at the right density. Both the
  // cold-start (#introNoise) and the between-show interlude (#static
  // > canvas) use the same renderer so the brand identity reads the
  // same across both states.
  function makeNoiseRenderer(cnv){
    const ctx = cnv.getContext('2d');
    let alive = false;
    let timer = 0;
    function resize(){
      cnv.width  = Math.max(1, innerWidth  >> 1);
      cnv.height = Math.max(1, innerHeight >> 1);
    }
    function tick(){
      if (!alive) return;
      const w = cnv.width, h = cnv.height;
      const d = ctx.createImageData(w, h);
      const p = d.data;
      let i = p.length;
      while (i) {
        i -= 4;
        const v = (Math.random() * 60) | 0;
        p[i] = p[i+1] = p[i+2] = v;
        p[i+3] = 255;
      }
      ctx.putImageData(d, 0, 0);
      timer = setTimeout(tick, 66);
    }
    resize();
    window.addEventListener('resize', resize);
    return {
      start(){ if (!alive) { alive = true; tick(); } },
      stop() { alive = false; clearTimeout(timer); timer = 0; },
    };
  }

  // Between-show interlude — same V1 snow as the cold-start.
  const staticNoise = makeNoiseRenderer(canvas);
  function startNoise(){ staticNoise.start(); }
  function stopNoise(){  staticNoise.stop();  }

  // Cold-start backdrop — same V1 snow, always running on the intro
  // overlay until the user clicks PUSH PLAY (the intro video then
  // covers it).
  const introNoiseCanvas = document.getElementById('introNoise');
  const introNoise = introNoiseCanvas ? makeNoiseRenderer(introNoiseCanvas) : null;
  if (introNoise) introNoise.start();

  // ── Channel state machine ────────────────────────────────────────
  // Applies the right surface (movie, static, or off-air) for the
  // current wall-clock moment, then schedules a precise setTimeout
  // to the next transition. Re-entrant safe: any caller can request
  // a re-sync (e.g. visibilitychange) and we'll re-compute.
  let nextTransitionId = 0;
  function showSurface(which){
    // which ∈ 'movie' | 'static' | 'offair'
    staticEl.classList.toggle('on', which === 'static');
    offairEl.classList.toggle('on', which === 'offair');
    if (which === 'static') startNoise(); else stopNoise();
    // Re-evaluate watermark visibility: it's shown only on the
    // movie surface (cold-start, #static, and #offair each
    // display the centered IV logo, which would clash with a
    // corner watermark). Mirrors the GUIDE pill's current show
    // state — both pills + the watermark cycle in lockstep via
    // pingControls.
    const wantShown = guideBtn.classList.contains('show');
    showAllControls(wantShown);
  }

  function applyState(){
    const info = getSlotInfo();

    if (info.offAir) {
      try { mv.pause(); } catch (_) {}
      const t = new Date(info.nextOnAir);
      offairNext.textContent =
        'CHANNEL RESUMES AT ' + fmtClock(t).toUpperCase();
      showSurface('offair');
      scheduleNext(info.nextOnAir - Date.now());
      return;
    }

    if (info.inShow) {
      // Seek to the live offset and play. Use a small drift tolerance
      // so we don't keep nudging the video with seeks every tick.
      const target = info.tInShow;
      const drift = Math.abs(mv.currentTime - target);
      if (drift > 0.6) {
        try { mv.currentTime = target; } catch (_) {}
      }
      if (mv.paused) {
        const p = mv.play();
        if (p && p.catch) p.catch(function(){});
      }
      showSurface('movie');
      // Next event: show ends at info.showEnd
      scheduleNext(info.showEnd - Date.now());
    } else {
      // Static interlude until next slot
      try { mv.pause(); } catch (_) {}
      showSurface('static');
      scheduleNext(info.nextSlotStart - Date.now());
    }
  }

  function scheduleNext(ms){
    clearTimeout(nextTransitionId);
    // Add a small guard so we always fire just-past the boundary
    // rather than just-before (clock skew, monotonic adjustments).
    const wait = Math.max(50, ms + 60);
    nextTransitionId = setTimeout(applyState, wait);
  }

  // If the tab was hidden across a transition, re-sync on return.
  document.addEventListener('visibilitychange', function(){
    if (!document.hidden && finished) applyState();
  });

  // Per-second countdown on the static screen.
  setInterval(function(){
    if (!staticEl.classList.contains('on')) return;
    const info = getSlotInfo();
    if (info.offAir || info.inShow) return;
    const secs = Math.max(0, Math.ceil((info.nextSlotStart - Date.now()) / 1000));
    const mm = String(Math.floor(secs / 60)).padStart(2, '0');
    const ss = String(secs % 60).padStart(2, '0');
    staticCountdown.textContent = 'LIVE IN ' + mm + ':' + ss;
  }, 1000);

  // ── EPG (TV Guide overlay) ───────────────────────────────────────
  // Renders a 7-day × 48-slot grid covering the full broadcast day
  // (11:00–22:45). Horizontally scrollable; the user's current slot
  // is centered on open. Day labels (left col) and time headers
  // (top row) are sticky so they stay visible while scrolling.
  // The clock + "now" highlighting update every 1s; the grid
  // structure is rebuilt only when the slot index changes (so
  // scroll position survives ticks).
  const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const SLOTS_PER_DAY = (CHANNEL.endHour - CHANNEL.startHour) * 4; // 48

  function slotForCol(col){
    const totalMin = CHANNEL.startHour * 60 + col * 15;
    return { hour: Math.floor(totalMin / 60), minute: totalMin % 60 };
  }
  function nowSlotCol(d){
    if (d.getHours() < CHANNEL.startHour || d.getHours() >= CHANNEL.endHour) return -1;
    return (d.getHours() - CHANNEL.startHour) * 4 + Math.floor(d.getMinutes() / 15);
  }

  // Column widths: current slot is 200px (wider, so the red
   // now-line moving through it is easier to read); all others
   // are 130px. The label column is sized via clamp().
  const COL_WIDTH        = 130;
  const COL_WIDTH_NOW    = 200;
  const COL_WIDTH_LABEL  = 'clamp(68px,8vw,108px)';

  function buildGuideGrid(){
    const now = new Date();
    const todayDow = now.getDay();
    const nowCol = nowSlotCol(now);

    // Apply column template: label col + 48 time cols, current
    // slot widened. Rebuilt on every open / slot change so the
    // wider column moves with "now".
    const cols = [COL_WIDTH_LABEL];
    for (let c = 0; c < SLOTS_PER_DAY; c++) {
      cols.push((c === nowCol ? COL_WIDTH_NOW : COL_WIDTH) + 'px');
    }
    guideGrid.style.gridTemplateColumns = cols.join(' ');

    guideGrid.innerHTML = '';

    const corner = document.createElement('div');
    corner.className = 'guide-header corner';
    corner.textContent = '';
    guideGrid.appendChild(corner);

    for (let c = 0; c < SLOTS_PER_DAY; c++) {
      const s = slotForCol(c);
      const t = new Date(now.getFullYear(), now.getMonth(), now.getDate(), s.hour, s.minute);
      const h = document.createElement('div');
      h.className = 'guide-header';
      h.textContent = fmtSlot(t).toUpperCase();
      guideGrid.appendChild(h);
    }

    for (let r = 0; r < 7; r++) {
      const dow = (todayDow + r) % 7;
      const isToday = r === 0;
      const label = document.createElement('div');
      label.className = 'guide-cell guide-row-label' + (isToday ? ' today' : '');
      if (isToday) {
        // Today gets the date inline so the user sees "TUE · MAY 12"
        // and knows which week-day belongs to which calendar date.
        const dateRow = document.createElement('div');
        dateRow.className = 'label-date';
        dateRow.textContent = MONTHS[now.getMonth()] + ' ' + now.getDate();
        const dowRow = document.createElement('div');
        dowRow.textContent = DAYS_SHORT[dow];
        label.appendChild(dowRow);
        label.appendChild(dateRow);
      } else {
        label.textContent = DAYS_SHORT[dow];
      }
      guideGrid.appendChild(label);
      for (let c = 0; c < SLOTS_PER_DAY; c++) {
        const cell = document.createElement('div');
        cell.className = 'guide-cell';
        cell.dataset.row = String(r);
        cell.dataset.col = String(c);
        if (!isToday) cell.style.opacity = '.65';
        cell.innerHTML =
          '<div class="title">' + SHOW.title + '</div>' +
          '<div class="meta">' + SHOW.duration + '</div>';
        guideGrid.appendChild(cell);
      }
    }

    // Red "now" line — vertical bar marking the live wall-clock
    // position inside the current slot's wider column. Appended
    // last so it stacks above the cell backgrounds.
    const line = document.createElement('div');
    line.className = 'now-line';
    line.id = 'nowLine';
    guideGrid.appendChild(line);
    updateNowLine();
  }

  function updateNowLine(){
    const line = document.getElementById('nowLine');
    if (!line) return;
    const info = getSlotInfo();
    if (info.offAir) { line.style.display = 'none'; return; }
    const now = new Date();
    const col = nowSlotCol(now);
    // Find the today row's now-cell to get its actual offsetLeft +
    // offsetWidth (sticky positioning + clamp() label width make
    // pure arithmetic unreliable across viewports).
    const nowCell = guideGrid.querySelector(
      '.guide-cell[data-row="0"][data-col="' + col + '"]'
    );
    if (!nowCell) { line.style.display = 'none'; return; }
    const fraction = info.tInSlot / CHANNEL.slotSec; // 0..1
    const x = nowCell.offsetLeft + fraction * nowCell.offsetWidth;
    line.style.left = x + 'px';
    line.style.display = 'block';
  }

  // Tracks the slot index the grid was built for. When the live
  // slot crosses a quarter-hour boundary, we rebuild so the wider
  // "current" column moves to the new slot. In between, only the
  // clock + now-cell highlight + red line are updated, so the
  // user's horizontal scroll position survives the tick.
  let lastBuiltSlot = -2;

  function updateGuideClockAndNow(){
    const now = new Date();
    const todayDow = now.getDay();
    guideDay.textContent  = DAYS_LONG[todayDow];
    guideDate.textContent = MONTHS[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
    guideTime.textContent = fmtClock(now);

    const col = nowSlotCol(now);
    // Slot rolled over → rebuild grid so the wider column moves.
    if (col !== lastBuiltSlot) {
      lastBuiltSlot = col;
      buildGuideGrid();
    }

    // Refresh "now" highlight on the today row.
    const prev = guideGrid.querySelector('.guide-cell.now');
    if (prev) prev.classList.remove('now');
    if (col >= 0) {
      const nowCell = guideGrid.querySelector(
        '.guide-cell[data-row="0"][data-col="' + col + '"]'
      );
      if (nowCell) nowCell.classList.add('now');
    }

    // Update the red vertical line position (moves through the
    // wider current-slot column as seconds tick).
    updateNowLine();

    // Description strip changes with channel state so users don't
    // see "TEARS OF STEEL · NOW PLAYING" between airings.
    const live = getSlotInfo();
    if (live.offAir) {
      guideDescTitle.textContent = 'CHANNEL OFF AIR';
      guideDescBody.textContent  = 'Programming returns at 11:00 AM local. The lineup below shows the day.';
      guideDescTag.textContent   = 'OFF AIR';
    } else if (live.inShow) {
      guideDescTitle.textContent = SHOW.title;
      guideDescBody.textContent  = SHOW.description;
      guideDescTag.textContent   = 'NOW PLAYING · ' + SHOW.duration;
    } else {
      // Between-show interlude — show countdown like the badge does.
      const secs = Math.max(0, Math.ceil((live.nextSlotStart - Date.now()) / 1000));
      const mm = String(Math.floor(secs / 60)).padStart(2, '0');
      const ss = String(secs % 60).padStart(2, '0');
      guideDescTitle.textContent = 'BETWEEN SHOWS';
      guideDescBody.textContent  = SHOW.title + ' returns in ' + mm + ':' + ss + ' — see the lineup below for what airs next.';
      guideDescTag.textContent   = 'LIVE IN ' + mm + ':' + ss;
    }
  }

  let guideTick = 0;
  function openGuide(){
    // Reset the build-cache so opening always rebuilds with the
    // current slot widened (the slot may have changed since the
    // last open).
    lastBuiltSlot = -2;
    buildGuideGrid();
    updateGuideClockAndNow();
    guideEl.classList.add('on');

    // Pin the current slot to the LEFT of the visible grid, right
    // after the sticky day-label column. Past slots are reachable
    // by scrolling left (toward 11:00 AM), future slots by
    // scrolling right (toward 10:45 PM). Uses setTimeout(0) rather
    // than requestAnimationFrame because hidden tabs throttle rAF
    // to ~500ms intervals; the macrotask queue fires reliably.
    setTimeout(function(){
      const wrap = document.querySelector('.guide-grid-wrap');
      const nowCell = guideGrid.querySelector('.guide-cell.now');
      const labelCol = guideGrid.querySelector('.guide-row-label');
      if (!wrap || !nowCell) return;
      const labelW = labelCol ? labelCol.offsetWidth : 0;
      wrap.scrollLeft = Math.max(0, nowCell.offsetLeft - labelW);
    }, 0);

    clearInterval(guideTick);
    guideTick = setInterval(updateGuideClockAndNow, 1000);
  }
  function closeGuide(){
    guideEl.classList.remove('on');
    clearInterval(guideTick); guideTick = 0;
  }
  guideBtn.addEventListener('click', openGuide);
  // Close button — JUST closes the guide. Does NOT trigger channel
  // activation; user returns to whatever state they came from
  // (cold-start if pre-activation, or live channel if mid-show).
  guideClose.addEventListener('click', closeGuide);
  guideEl.addEventListener('click', function(e){
    // Click on the overlay backdrop (not on its children) closes.
    if (e.target === guideEl) closeGuide();
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') closeGuide();
  });

  // ── Channel boot sequence ──────────────────────────────────────
  //
  // The user lands on a black surface with a centered play button.
  // The intro video is preloaded (preload="auto") and the mux-
  // video is preloading too — neither plays yet. Nothing requires
  // a gesture-gated permission at this stage.
  //
  // On click (anywhere on the intro overlay):
  //   (1) enterFullscreen() — within the gesture, so it sticks.
  //   (2) Intro plays WITH sound: the gesture authorizes autoplay-
  //       with-sound deterministically (no Media-Engagement-Index
  //       guessing), so first-visit users get audio reliably.
  //   (3) Movie audio gate opens (mv.muted=false, mv.volume=0 to
  //       hold silent until intro ends without losing the gesture
  //       authorization for subsequent volume changes).
  //   (4) Movie seeks to the live wall-clock offset and plays
  //       silently behind the intro overlay.
  //
  // On intro.ended:
  //   (5) Movie volume ramps to 0.65 (slightly above average).
  //   (6) applyState() reveals the right channel surface.
  //   (7) Overlay fades over 600ms and is removed from the DOM.
  //
  // Safety net: 8s after activation, finish() is called even if
  // the intro never fires `ended` (codec / network failure).

  function startMovieAtLive(){
    const info = getSlotInfo();
    if (!info.offAir && info.inShow) {
      try { mv.currentTime = info.tInShow; } catch (_) {}
    }
    const p = mv.play();
    if (p && p.catch) p.catch(function(){
      const once = function(){
        mv.removeEventListener('canplay', once);
        mv.play().catch(function(){});
      };
      mv.addEventListener('canplay', once);
    });
  }

  let userActivated = false;
  let finished      = false;

  function activate(e){
    if (userActivated) return;
    userActivated = true;

    // Stop the cold-start noise — the intro video covers it now.
    if (introNoise) introNoise.stop();

    // (1) Fullscreen — gesture-required, sync inside the click.
    enterFullscreen();

    // (2) Intro WITH sound — gesture authorizes autoplay-with-sound.
    introVideo.muted = false;
    introVideo.volume = 0.85;
    const ip = introVideo.play();
    if (ip && ip.catch) ip.catch(finish); // codec/network → skip to finish

    // (3) Movie audio gate opens. Held silent at volume:0 until
    //     intro.ended, then ramped to 0.65 in finish(). Setting
    //     muted=false inside the gesture preserves "unmuted with
    //     volume control" for subsequent state changes.
    mv.muted = false;
    mv.volume = 0;

    // (4) Seek + play movie silently at the live wall-clock offset.
    startMovieAtLive();

    intro.classList.add('activated');
    // Arm the safety net once we're actually committed.
    setTimeout(finish, 8000);
  }
  function onActivateKey(e){
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      activate(e);
    }
  }

  function finish(){
    if (finished) return;
    if (!userActivated) return; // shouldn't be reachable; defensive
    finished = true;

    // Movie volume ramps to listening level. 0.65 = slightly above
    // average; user adjusts via device controls from there.
    mv.volume = 0.65;

    applyState();
    guideBtn.classList.add('show');
    channelLive = true;
    syncFsIcon();
    pingControls();

    intro.classList.add('done');
    setTimeout(function(){
      if (intro.parentNode) intro.parentNode.removeChild(intro);
    }, 700);
  }

  // ── Orientation-aware asset selection ────────────────────────────
  //
  // The channel ships two playback IDs for the same content + same
  // duration:
  //   - Horizontal 12:5 cinema cut         → landscape viewports
  //   - Vertical 9:16 reframe              → portrait viewports
  //
  // Detection via `matchMedia('(orientation: portrait)')`. When the
  // user rotates their device, the matchMedia listener fires; we
  // swap mv.src to the orientation-appropriate manifest, wait for
  // canplay on the new source, then snap currentTime to the live
  // wall-clock position (computed AT canplay time, not at swap
  // time, so any time spent loading is accounted for). Mute / volume
  // / play state are captured before the swap and restored after,
  // so the audio doesn't reset and a playing channel keeps playing.
  //
  // If the user rotates twice quickly, the in-flight canplay handler
  // from the first swap is unregistered before attaching the new
  // one — no handler stacking, no double-seek.
  const HORIZONTAL_PB_ID = 'Apdb9mHDmGuMt00AVKNNVx6VZEXw7602eYCcTPJIFtpVE';
  const VERTICAL_PB_ID   = 'wdN5SRMPQ3Ql8L02Cpl5Fah5L3u00lqhY13EXcSP5x02AU';
  const muxHlsSrc = function(id){
    return 'https://stream.mux.com/' + id +
           '.m3u8?rendition_order=desc&max_resolution_tier=1080p';
  };
  const portraitMQ = window.matchMedia('(orientation: portrait)');
  let currentPbId = null;
  let pendingCanplay = null;

  function applyOrientationAsset(){
    const want = portraitMQ.matches ? VERTICAL_PB_ID : HORIZONTAL_PB_ID;
    if (currentPbId === want) return;

    // Snapshot state to restore after the source-swap reload.
    const wasPlaying = userActivated && !mv.paused && !mv.ended;
    const prevMuted  = mv.muted;
    const prevVolume = mv.volume;

    // Cancel any prior canplay handler still waiting (rapid double-
    // rotate races would otherwise stack handlers).
    if (pendingCanplay) {
      mv.removeEventListener('canplay', pendingCanplay);
      pendingCanplay = null;
    }

    currentPbId = want;
    mv.src = muxHlsSrc(want);

    // Wait for the new source to be playable, then re-sync to the
    // live wall-clock position and restore prior audio + play state.
    pendingCanplay = function onReady(){
      mv.removeEventListener('canplay', pendingCanplay);
      pendingCanplay = null;
      // Setting src on a video resets some state on the underlying
      // <video> element; re-apply the bits we care about.
      mv.muted  = prevMuted;
      mv.volume = prevVolume;
      const live = getSlotInfo();
      if (!live.offAir && live.inShow) {
        try { mv.currentTime = live.tInShow; } catch (_) {}
      }
      if (wasPlaying) {
        const p = mv.play();
        if (p && p.catch) p.catch(function(){});
      }
    };
    mv.addEventListener('canplay', pendingCanplay);
  }

  // Initial selection (sets mv.src before the user can even click
  // PUSH PLAY, so preload="auto" starts buffering immediately).
  applyOrientationAsset();
  // React to rotation. addEventListener('change',...) on the
  // MediaQueryList is the modern API; supported everywhere we care.
  if (portraitMQ.addEventListener) {
    portraitMQ.addEventListener('change', applyOrientationAsset);
  } else if (portraitMQ.addListener) {
    // Safari <14 fallback (deprecated but functional)
    portraitMQ.addListener(applyOrientationAsset);
  }

  syncFsIcon();

  // The ONLY click target that activates the channel is the
  // PUSH PLAY button. Native <button> handles Enter / Space /
  // touch tap for free. Clicks elsewhere on the cold-start screen
  // do nothing (cursor is default on the snow, pointer on the
  // button — clear affordance).
  const playButton = document.getElementById('playButton');
  if (playButton) playButton.addEventListener('click', activate);

  // FS + GUIDE pills start hidden. They reveal on any user activity
  // (mousemove / touchstart / keydown) and fade after 5s idle.
  // First-visit discovery: ping once at page load so they appear
  // briefly so users know they exist, then auto-hide kicks in.
  pingControls();

  introVideo.addEventListener('ended', finish);
  introVideo.addEventListener('error', finish);
});
</script>

<!-- Watermark — doubles as the "ENTER fullscreen" CTA. The whole
     mark is a <button>; clicking it (or the keyboard activation
     when focused) toggles fullscreen. A subtle black corner-brackets
     icon is overlaid inside the big white disc as a discoverability
     cue. When the user is already in fullscreen mode, the icon is
     hidden (body.in-fs class) — the logo reverts to its clean
     decorative form. On platforms where the Fullscreen API isn't
     available for non-<video> elements (iOS Safari / iPhone Chrome),
     JS adds body.no-fs which keeps the icon hidden + the button
     non-interactive (the logo is still rendered as decoration). -->
