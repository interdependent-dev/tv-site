<script>
(function(){
  // Two candidate stream sources, tried in order. Whichever answers first wins.
  //
  //  • TUNNEL: Cloudflare quick-tunnel URL. Ephemeral — rotates on cloudflared
  //    restart. Works for all remote viewers once DNS propagates.
  //  • LOCAL:  direct hit on the Mac Mini's MediaMTX. Only resolves when the
  //    page is opened *on the Mac Mini itself*, but browsers whitelist
  //    http://localhost and http://127.0.0.1 as secure origins, so mixed-
  //    content blocking on this HTTPS page does NOT apply to these URLs.
  //
  // Net effect: the studio operator can always preview on the Mac Mini even
  // if the tunnel is down, rotating, or not-yet-resolvable in local DNS.
  var CANDIDATES = [
    'https://nobody-beaver-replacement-build.trycloudflare.com/program/index.m3u8',
    'http://127.0.0.1:8888/program/index.m3u8'
  ];

  var video = document.getElementById('stream');
  var unmuteBtn = document.getElementById('unmute');

  // Probe each candidate with a short-timeout GET. HEAD on MediaMTX returns
  // 404 even for live streams, so we use GET with a Range: bytes=0-0 to
  // keep the transfer cheap. CORS is handled by `hlsAllowOrigins: ['*']`
  // in mediamtx.yml, so cross-origin fetch is allowed.
  function probe(url){
    var ctl = new AbortController();
    var t = setTimeout(function(){ ctl.abort(); }, 3000);
    return fetch(url, {
      method: 'GET',
      headers: { Range: 'bytes=0-0' },
      cache: 'no-store',
      signal: ctl.signal
    }).then(function(r){ clearTimeout(t); return r.ok ? url : null; })
      .catch(function(){ clearTimeout(t); return null; });
  }

  function load(url){
    // Prefer native HLS on Safari/iOS/Apple TV — the built-in decoder is more
    // efficient than MSE + hls.js on these platforms and supports LL-HLS
    // when served over HTTPS.
    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
    } else if (window.Hls && Hls.isSupported()) {
      // Everything else (Chrome, Firefox, Edge, Android) goes through hls.js.
      // lowLatencyMode enables LL-HLS part loading when the manifest advertises it.
      // liveSyncDurationCount: 2 → stay 2 parts behind live instead of the
      // default 3. With 100ms parts on MediaMTX, this pulls live latency from
      // ~2.5s down toward ~1.25s. Reduce to 1 for razor-thin latency at the
      // cost of rebuffering on any network blip.
      var hls = new Hls({ lowLatencyMode: true, liveSyncDurationCount: 2 });
      hls.loadSource(url);
      hls.attachMedia(video);
    }
  }

  // Sequentially probe. Promise.any would be faster, but we specifically want
  // tunnel-first so remote viewers don't accidentally try (and fail to reach)
  // a localhost URL that would never resolve for them.
  (async function(){
    for (var i = 0; i < CANDIDATES.length; i++){
      var ok = await probe(CANDIDATES[i]);
      if (ok) { load(ok); return; }
    }
    // Every candidate failed — load the primary anyway so the <video>'s own
    // error surface can show something useful in devtools.
    load(CANDIDATES[0]);
  })();

  // Autoplay policy: browsers require muted for unprompted play. This button
  // converts a user gesture into the "real" unmute so audio kicks in.
  unmuteBtn.addEventListener('click', function(){
    video.muted = false;
    video.play().catch(function(){ /* already playing or blocked — either is fine */ });
    unmuteBtn.classList.add('hidden');
  });
  video.addEventListener('volumechange', function(){
    if (!video.muted) unmuteBtn.classList.add('hidden');
  });
})();
</script>
