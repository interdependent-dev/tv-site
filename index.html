-->

<style>
*{margin:0;box-sizing:border-box}
html,body{
  height:100%;width:100%;
  overflow:hidden;
  background:#000;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}

#stream{position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover;background:#000}

.v{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.5) 100%);z-index:1;pointer-events:none}

/* Whole-screen tap layer — every pixel is a "tap to unmute" target */
.tap-zone{position:fixed;inset:0;z-index:3;cursor:pointer;background:transparent}
.tap-zone.gone{pointer-events:none}

/* Watermark — bottom right */
.logo{position:fixed;bottom:clamp(20px,4vh,40px);right:clamp(20px,4vw,48px);z-index:4;pointer-events:none}
.logo svg{
  width:min(28vw,180px);height:auto;
  opacity:0;animation:f 2.5s ease-in forwards .5s;
  filter:drop-shadow(0 0 20px rgba(255,255,255,.35));
}
@keyframes f{to{opacity:.75}}

/* Sound-hint pill — fades in after the warmup, gentle ambient pulse,
   not aggressive. Sits bottom-left where Twitch / YouTube put their
   chrome so users instinctively look there. */
.sound-hint{
  position:fixed;bottom:clamp(20px,4vh,40px);left:clamp(20px,4vw,48px);z-index:4;
  display:flex;align-items:center;gap:10px;
  font:500 14px/1 inherit;color:#fff;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.25);
  padding:12px 18px;border-radius:24px;cursor:pointer;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  opacity:0;
  animation:hint-in .6s ease forwards 1.6s, hint-pulse 2.4s ease-in-out infinite 2.4s;
  transition:opacity .4s ease,transform .15s ease;
  font-family:inherit;
}
.sound-hint .icon{font-size:16px}
.sound-hint:active{transform:scale(.96)}
.sound-hint.hidden{opacity:0!important;pointer-events:none;animation:none}
@keyframes hint-in{to{opacity:1}}
@keyframes hint-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

/* Mute toggle — small, persistent once unmuted, allows re-muting */
.mute-toggle{
  position:fixed;bottom:clamp(20px,4vh,40px);left:clamp(20px,4vw,48px);z-index:4;
  width:44px;height:44px;border-radius:50%;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.25);color:#fff;
  font-size:18px;cursor:pointer;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
  transition:opacity .3s ease,background .2s ease,transform .15s ease;
  font-family:inherit;
}
.mute-toggle.show{display:flex}
.mute-toggle:hover{background:rgba(0,0,0,.8)}
.mute-toggle:active{transform:scale(.93)}

/* Warmup overlay — branded fade during cold start. Looks like a CRT
   warming up: wordmark fades in, audio-spectrum bars pulse, all gone
   the moment the first real frame plays. */
.warmup{
  position:fixed;inset:0;z-index:5;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  background:#000;pointer-events:none;
  transition:opacity .5s ease;
}
.warmup.gone{opacity:0}
.warmup-mark{display:block;margin-bottom:26px;opacity:0;animation:warmup-in .7s ease forwards .1s}
.warmup-mark svg{
  width:min(45vw,260px);height:auto;
  filter:drop-shadow(0 0 24px rgba(255,255,255,.35));
}
.warmup-bars{display:flex;gap:5px;opacity:0;animation:warmup-in .5s ease forwards .35s}
.warmup-bars span{
  width:3px;height:14px;background:rgba(255,255,255,.85);
  animation:warmup-bar 1.1s ease infinite;transform-origin:center;
}
.warmup-bars span:nth-child(2){animation-delay:.12s}
.warmup-bars span:nth-child(3){animation-delay:.24s}
.warmup-bars span:nth-child(4){animation-delay:.36s}
.warmup-bars span:nth-child(5){animation-delay:.48s}
@keyframes warmup-in{to{opacity:1}}
@keyframes warmup-bar{
  0%,100%{opacity:.3;transform:scaleY(.5)}
  50%{opacity:1;transform:scaleY(1.6)}
}

/* Mobile: bigger tap targets, slightly larger fonts */
@media (max-width:640px){
  .sound-hint{font-size:15px;padding:14px 22px;border-radius:28px}
  .mute-toggle{width:48px;height:48px;font-size:20px}
}
</style>

<script>
(function(){
  // Stream sources. Tunnel-first because most viewers are remote;
  // localhost is for the studio operator previewing on the Mac mini.
  // Hostname-based selection avoids the probe round-trip the old code
  // did, saving ~100–300ms on cold start.
  var TUNNEL_URL = 'https://live.interdependent.dev/program/index.m3u8';
  var LOCAL_URL  = 'http://127.0.0.1:8888/program/index.m3u8';

  var video      = document.getElementById('stream');
  var warmup     = document.getElementById('warmup');
  var tapZone    = document.getElementById('tap-zone');
  var soundHint  = document.getElementById('sound-hint');
  var muteToggle = document.getElementById('mute-toggle');

  var isMobile   = /Android|iPhone|iPad|Mobile/i.test(navigator.userAgent);
  var url = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? LOCAL_URL : TUNNEL_URL;

  // ── Player init ────────────────────────────────────────────────
  function load(u){
    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Native HLS on Safari / iOS / Apple TV — most efficient path,
      // hardware decode, native LL-HLS support.
      video.src = u;
    } else if (window.Hls && Hls.isSupported()) {
      var hls = new Hls({
        lowLatencyMode: true,
        // 2 parts behind live on desktop (fastest), 3 on mobile (more
        // forgiving on cellular which has higher RTT variance and
        // higher rates of preload cancellations).
        liveSyncDurationCount: isMobile ? 3 : 2,
        // Start fetching the first fragment immediately while metadata
        // is still being parsed — shaves ~100ms off cold start.
        startFragPrefetch: true,
        // Resilience: cellular hiccups should not black-screen the
        // player. Defaults are too conservative for live.
        manifestLoadingMaxRetry: 6, manifestLoadingRetryDelay: 500,
        fragLoadingMaxRetry: 6,     fragLoadingRetryDelay: 500,
        levelLoadingMaxRetry: 6,    levelLoadingRetryDelay: 500,
        backBufferLength: 30
      });
      hls.loadSource(u);
      hls.attachMedia(video);

      hls.on(Hls.Events.ERROR, function(_, data){
        if (!data.fatal) return;
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR)      hls.startLoad();
        else if (data.type === Hls.ErrorTypes.MEDIA_ERROR)   hls.recoverMediaError();
        else                                                 hls.destroy();
      });
    }
  }
  load(url);

  // ── Warmup → out as soon as we have frames ─────────────────────
  function dismissWarmup(){
    if (warmup.classList.contains('gone')) return;
    warmup.classList.add('gone');
    setTimeout(function(){ warmup.style.display = 'none'; }, 600);
  }
  // Multiple signals; whichever fires first wins.
  video.addEventListener('playing',    dismissWarmup);
  video.addEventListener('loadeddata', dismissWarmup);
  // Hard ceiling: 4s. If the stream genuinely cannot start we still
  // want to surface the underlying state instead of holding the
  // warmup forever.
  setTimeout(dismissWarmup, 4000);

  // ── Sound: tap-anywhere + best-effort auto-unmute for returning visitors
  //
  // Browsers will not let JS unmute audio without a user gesture on
  // the FIRST visit — that policy is rigid and intentional. What we
  // CAN do is:
  //   1. Make the unavoidable tap feel deliberate, not buggy
  //      (whole-screen target, branded warmup before it appears).
  //   2. Save unmute state to localStorage and silently retry on
  //      future visits. Once Chrome's Media Engagement Index
  //      crosses its threshold, autoplay-with-sound is granted
  //      automatically and the page becomes truly tap-free for
  //      repeat viewers. Same for iOS PWA mode (added to home
  //      screen) after first launch.
  var unmuted = false;

  function reflectUnmuted(){
    unmuted = true;
    soundHint.classList.add('hidden');
    muteToggle.classList.add('show');
    muteToggle.textContent = '🔊';
    tapZone.classList.add('gone');
    try { localStorage.setItem('id-tv-unmute', '1'); } catch (e) {}
  }

  function tryUnmute(){
    if (unmuted) return;
    video.muted = false;
    var p = video.play();
    if (p && p.then) {
      p.then(reflectUnmuted).catch(function(){
        // Browser still requires a real gesture; revert and keep hint.
        video.muted = true;
      });
    } else {
      reflectUnmuted();
    }
  }

  // Whole-screen tap target — much bigger than a tiny button.
  tapZone.addEventListener('click', tryUnmute);
  soundHint.addEventListener('click', function(e){ e.stopPropagation(); tryUnmute(); });

  // Once unmuted, the small toggle lets viewers re-mute.
  muteToggle.addEventListener('click', function(){
    if (video.muted) {
      video.muted = false;
      muteToggle.textContent = '🔊';
      try { localStorage.setItem('id-tv-unmute', '1'); } catch (e) {}
    } else {
      video.muted = true;
      muteToggle.textContent = '🔇';
      try { localStorage.removeItem('id-tv-unmute'); } catch (e) {}
    }
  });

  // Reflect any external mute change (e.g. browser policy granting auto-unmute)
  video.addEventListener('volumechange', function(){
    if (!video.muted && !unmuted) reflectUnmuted();
  });

  // Returning-visitor auto-unmute attempt. Silently no-ops if the
  // browser's autoplay policy still requires a gesture.
  try {
    if (localStorage.getItem('id-tv-unmute') === '1') {
      var tryOnce = function(){
        video.removeEventListener('playing', tryOnce);
        setTimeout(tryUnmute, 80);
      };
      video.addEventListener('playing', tryOnce);
    }
  } catch (e) {}
})();
</script>
</body>
</html>
