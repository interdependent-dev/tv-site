<style>
*{margin:0;box-sizing:border-box}
html,body{
  height:100%;width:100%;
  overflow:hidden;
  background:#000;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}

/* Dual-pane container — flex row on wide screens, column on narrow */
.dual{
  position:fixed;inset:0;
  display:flex;
  flex-direction:row;
  gap:2px;
  background:#0a0a0a;
}
@media (max-width:900px){
  .dual{flex-direction:column;}
}

/* Each cam pane — both flex 1 by default; when dropped, collapses to 0
   with a smooth transition so the surviving cam fluidly grows to fill. */
.pane{
  position:relative;
  flex:1 1 0;
  min-width:0;min-height:0;
  background:#000;
  overflow:hidden;
  transition:flex 0.6s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.4s ease;
}
.pane.dropped{
  flex:0 0 0;
  opacity:0;
}

mux-video{
  display:block;
  width:100%;height:100%;
  object-fit:cover;
  background:#000;
}

/* Per-pane corner label */
.pane-label{
  position:absolute;
  top:clamp(12px,2vh,20px);
  left:clamp(12px,2vw,20px);
  font:600 11px/1 inherit;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:#fff;
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.25);
  padding:6px 10px;
  border-radius:14px;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:3;
  pointer-events:none;
  opacity:.85;
}

/* Per-pane audio toggle (mutually exclusive — only one cam unmuted at a time) */
.audio-toggle{
  position:absolute;
  bottom:clamp(12px,2vh,20px);
  right:clamp(12px,2vw,20px);
  width:42px;height:42px;border-radius:50%;
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.25);
  color:#fff;
  font-size:16px;cursor:pointer;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  z-index:3;
  transition:background .2s ease,transform .15s ease,border-color .2s ease;
  font-family:inherit;
}
.audio-toggle:hover{background:rgba(0,0,0,.8);}
.audio-toggle:active{transform:scale(.92);}
.audio-toggle.active{
  background:rgba(0,229,212,.22);
  border-color:rgba(0,229,212,.55);
  color:#00e5d4;
}

/* Per-pane warmup overlay — fades when first frame arrives */
.warmup{
  position:absolute;inset:0;
  background:#000;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  z-index:2;
  pointer-events:none;
  transition:opacity .5s ease;
}
.warmup.gone{opacity:0;}
.warmup-mark{
  display:block;margin-bottom:18px;
  opacity:0;animation:warmup-in .7s ease forwards .1s;
}
.warmup-mark svg{
  width:min(38vw,180px);height:auto;
  filter:drop-shadow(0 0 18px rgba(255,255,255,.3));
}
.warmup-bars{display:flex;gap:4px;opacity:0;animation:warmup-in .5s ease forwards .35s;}
.warmup-bars span{
  width:2.5px;height:11px;background:rgba(255,255,255,.85);
  animation:warmup-bar 1.1s ease infinite;transform-origin:center;
}
.warmup-bars span:nth-child(2){animation-delay:.12s;}
.warmup-bars span:nth-child(3){animation-delay:.24s;}
.warmup-bars span:nth-child(4){animation-delay:.36s;}
.warmup-bars span:nth-child(5){animation-delay:.48s;}
@keyframes warmup-in{to{opacity:1;}}
@keyframes warmup-bar{
  0%,100%{opacity:.3;transform:scaleY(.5);}
  50%{opacity:1;transform:scaleY(1.5);}
}

/* Reconnect banner — top-center pill notifying which cam(s) are down.
   Doesn't block content, just a subtle informational chip. */
.reconnect-banner{
  position:fixed;
  top:clamp(16px,2.5vh,28px);
  left:50%;
  transform:translateX(-50%) translateY(-8px);
  z-index:10;
  background:rgba(255,200,87,.18);
  border:1px solid rgba(255,200,87,.5);
  color:#ffe4a3;
  font:500 12px/1 inherit;
  letter-spacing:.04em;
  padding:10px 16px;
  border-radius:20px;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;gap:8px;
  opacity:0;
  pointer-events:none;
  transition:opacity .4s ease, transform .4s ease;
  white-space:nowrap;
}
.reconnect-banner.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
.reconnect-banner.both{
  background:rgba(255,91,91,.22);
  border-color:rgba(255,91,91,.55);
  color:#ffaaaa;
}
.reconnect-banner .pulse{
  width:8px;height:8px;border-radius:50%;
  background:#ffc857;
  animation:pulse 1.4s ease-in-out infinite;
}
.reconnect-banner.both .pulse{background:#ff5b5b;animation-duration:1s;}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.4;transform:scale(.7);}
}

/* Tap-to-start fallback — only shown if autoplay-muted gets blocked.
   We surface it after a 7s grace period if neither cam has reached 'live'. */
.tap-start{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  z-index:20;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  opacity:0;
  pointer-events:none;
  transition:opacity .4s ease;
}
.tap-start.show{opacity:1;pointer-events:auto;}
.tap-start-msg{
  font:600 13px/1 inherit;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:#fff;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.3);
  padding:16px 24px;
  border-radius:30px;
}

/* Brand wordmark — small, bottom-center, doesn't compete with cam content */
.brand{
  position:fixed;
  bottom:clamp(10px,1.5vh,16px);
  left:50%;
  transform:translateX(-50%);
  z-index:5;
  font-family:ui-monospace,"JetBrains Mono",Menlo,monospace;
  font-size:9px;
  letter-spacing:.28em;
  color:rgba(255,255,255,.35);
  text-transform:uppercase;
  pointer-events:none;
}
@media (max-width:900px){
  /* On stacked layout, hide the centerline brand to avoid overlapping the divider */
  .brand{bottom:auto;top:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.6);padding:4px 10px;border-radius:10px;}
}

<script>
(function(){
  // ── Architecture overview ──────────────────────────────────────
  //
  // mux-video@0.21 has an internal bug: when the HLS manifest returns
  // 412 (Mux's "live_stream_inactive" response), its retry loop calls
  // video.buffered.start(0) without checking length first, throwing
  // IndexSizeError repeatedly. To dodge that loop, we DO NOT attach a
  // playback-id attribute to <mux-video> until we've pre-confirmed
  // the stream is active via a manifest fetch. mux-video with no
  // playback-id is a no-op, so no retry, no error spam.
  //
  // Per-cam state:
  //   idle     — manifest pre-check returns 412; pane collapsed
  //   loading  — manifest just turned 200; playback-id attached;
  //              waiting for first frame
  //   live     — first frame arrived; pane filled
  //   dropped  — was live, then waiting/error/ended; pane collapsed
  //
  // The polling loop drives idle ↔ loading transitions. mux-video's
  // own events drive loading → live and live → dropped.

  var POLL_FAST_MS = 1500;     // poll every 1.5s while idle (snappier resume)
  var POLL_SLOW_MS = 4000;     // poll every 4s once live (lighter)
  var STALL_GRACE_MS = 5000;   // 'waiting' must persist this long before "dropped"
  var INIT_CEILING_MS = 8000;  // if nothing plays within this, surface tap-start

  function makeCam(camId, playbackId){
    return {
      id: camId,
      playbackId: playbackId,
      video: document.getElementById(camId),
      pane: document.getElementById(camId === 'cam1' ? 'pane1' : 'pane2'),
      audioBtn: document.getElementById(camId === 'cam1' ? 'audio1' : 'audio2'),
      warmup: document.getElementById(camId === 'cam1' ? 'warmup1' : 'warmup2'),
      label: camId === 'cam1' ? 'Cam 1' : 'Cam 2',
      state: 'idle',
      stallTimer: null,
      pollTimer: null,
    };
  }

  var cams = {
    cam1: makeCam('cam1', 'P3juo8srQDibzTGEy7HzTUUmPVR9RvQmTlIqZj8KzOI'),
    cam2: makeCam('cam2', 'Gbr8YKpVoCYSlvLRZZuDwWahJECZg8lmVBZ37d00z00qk'),
  };
  var banner = document.getElementById('reconnect-banner');
  var bannerText = document.getElementById('reconnect-text');
  var tapStart = document.getElementById('tap-start');

  // Safety net: if any IndexSizeError still slips through (race
  // between pre-check and 412), swallow it silently so the console
  // doesn't fill up. This is a known mux-video@0.21 issue; if a
  // newer release fixes it, this becomes a no-op.
  window.addEventListener('error', function(e){
    if (e && e.message && e.message.indexOf('IndexSizeError') >= 0) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }, true);

  function dismissWarmup(c){
    if (c.warmup.classList.contains('gone')) return;
    c.warmup.classList.add('gone');
    setTimeout(function(){ c.warmup.style.display = 'none'; }, 600);
  }

  function showWarmup(c){
    c.warmup.style.display = '';
    c.warmup.classList.remove('gone');
  }

  function setState(camId, newState){
    var c = cams[camId];
    if (c.state === newState) return;
    var prev = c.state;
    c.state = newState;

    if (newState === 'live') {
      c.pane.classList.remove('dropped');
      dismissWarmup(c);
    } else if (newState === 'loading') {
      c.pane.classList.remove('dropped');
      showWarmup(c);
    } else if (newState === 'idle' || newState === 'dropped') {
      c.pane.classList.add('dropped');
    }
    updateBanner();
  }

  function updateBanner(){
    var down = [];
    Object.keys(cams).forEach(function(k){
      var s = cams[k].state;
      if (s === 'idle' || s === 'dropped') down.push(cams[k].label);
    });
    banner.classList.remove('both');
    if (down.length === 0) {
      banner.classList.remove('show');
    } else if (down.length === 2) {
      bannerText.textContent = 'Waiting for streams…';
      banner.classList.add('both');
      banner.classList.add('show');
    } else {
      bannerText.textContent = 'Waiting for ' + down[0] + '…';
      banner.classList.add('show');
    }
  }

  // ── Manifest pre-check ─────────────────────────────────────────
  // Mux returns:
  //   200 + application/x-mpegURL → publisher connected, stream active
  //   412 + application/json     → "live_stream_inactive" (no publisher)
  //   404                         → wrong playback-id
  // We treat anything other than 200 as "not active right now".
  function checkManifest(playbackId){
    var url = 'https://stream.mux.com/' + playbackId + '.m3u8';
    return fetch(url, { method: 'GET', cache: 'no-store' })
      .then(function(r){ return r.ok; })
      .catch(function(){ return false; });
  }

  function attachStream(c){
    // mux-video observes attribute changes — setting playback-id
    // here triggers manifest load, ABR ladder discovery, and playback.
    if (c.video.getAttribute('playback-id') === c.playbackId) return;
    c.video.setAttribute('playback-id', c.playbackId);
    c.video.setAttribute('autoplay', '');
    setState(c.id, 'loading');
  }

  function detachStream(c){
    if (!c.video.hasAttribute('playback-id')) return;
    c.video.removeAttribute('playback-id');
    c.video.removeAttribute('autoplay');
    // Force the inner <video> to release its source so it doesn't
    // keep retrying against the now-stale manifest URL.
    try { c.video.pause(); } catch (e) {}
  }

  function scheduleNextPoll(c){
    var delay = (c.state === 'live') ? POLL_SLOW_MS : POLL_FAST_MS;
    c.pollTimer = setTimeout(function(){ pollCam(c.id); }, delay);
  }

  async function pollCam(camId){
    var c = cams[camId];
    var active = await checkManifest(c.playbackId);

    var stateIsActive = (c.state === 'live' || c.state === 'loading');

    if (active && !stateIsActive) {
      // Stream is up but UI is showing dropped/idle — re-attach.
      // Detach first so mux-video's MutationObserver sees a clean
      // remove → set cycle and reloads the manifest fresh.
      if (c.video.hasAttribute('playback-id')) detachStream(c);
      setTimeout(function(){ attachStream(c); }, 80);
    } else if (!active && stateIsActive) {
      // Stream went idle while UI was showing it — detach + collapse pane.
      detachStream(c);
      setState(camId, 'dropped');
    } else if (!active && c.video.hasAttribute('playback-id')) {
      // Belt-and-suspenders: detached state should never have playback-id.
      detachStream(c);
    }
    scheduleNextPoll(c);
  }

  function wireCam(camId){
    var c = cams[camId];

    c.video.addEventListener('playing', function(){
      clearTimeout(c.stallTimer);
      c.stallTimer = null;
      setState(camId, 'live');
    });
    c.video.addEventListener('waiting', function(){
      clearTimeout(c.stallTimer);
      c.stallTimer = setTimeout(function(){
        if (c.video.readyState < 3) setState(camId, 'dropped');
      }, STALL_GRACE_MS);
    });
    c.video.addEventListener('error', function(){
      clearTimeout(c.stallTimer);
      setState(camId, 'dropped');
    });
    c.video.addEventListener('ended', function(){ setState(camId, 'dropped'); });

    // Per-cam audio toggle. Mutually exclusive: unmuting cam1 mutes cam2 and
    // vice versa — otherwise audio doubles up. Click again to mute.
    c.audioBtn.addEventListener('click', function(e){
      e.stopPropagation();
      var wasUnmuted = !c.video.muted;
      Object.keys(cams).forEach(function(k){
        cams[k].video.muted = true;
        cams[k].audioBtn.textContent = '🔇';
        cams[k].audioBtn.classList.remove('active');
      });
      if (!wasUnmuted) {
        c.video.muted = false;
        c.audioBtn.textContent = '🔊';
        c.audioBtn.classList.add('active');
        try { c.video.play().catch(function(){}); } catch (err) {}
      }
    });
  }

  wireCam('cam1');
  wireCam('cam2');

  // Initial state: both idle, panes collapsed (well, they start full-width
  // by CSS default; setState will collapse them on the first 'idle' tick).
  setState('cam1', 'idle');
  setState('cam2', 'idle');

  // Kick off polling for both cams. They'll attach playback-id when
  // their respective Mux Live Stream becomes active.
  pollCam('cam1');
  pollCam('cam2');

  // Tap-to-start fallback: only matters once at least one cam is live
  // but the browser blocked autoplay. Surface after a grace period if
  // we have an attached stream that isn't playing.
  setTimeout(function(){
    var anyLoadingButNotPlaying = Object.keys(cams).some(function(k){
      return cams[k].state === 'loading';
    });
    if (anyLoadingButNotPlaying) tapStart.classList.add('show');
  }, INIT_CEILING_MS);

  tapStart.addEventListener('click', function(){
    Object.keys(cams).forEach(function(k){
      try { cams[k].video.play().catch(function(){}); } catch (e) {}
    });
    tapStart.classList.remove('show');
    setTimeout(function(){ tapStart.style.display = 'none'; }, 500);
  });
})();
</script>
</body>
</html>
